<style>
/* v10 MOBIUS rework — tokens: cambiar identidad = solo :root.
   Contenido: /v10-mobius/content.json · principles/V10-MOBIUS.md */
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --white:#FFFFFF;
  --black:#000000;
  --panel:#F7F7F7;
  --chip:#EEEEEE;
  --gray:#999999;
  --gray2:#666666;
  --line:#E4E4E4;
  --red:#FF0000;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{
  background:var(--white);color:var(--black);
  font-family:'Inter Tight',sans-serif;
  font-size:18px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow-x:clip;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--black);color:var(--white)}
.wrap{max-width:1400px;margin:0 auto;padding:0 40px}

/* ---------- display type — natural proportions, tight tracking, heavy weight ---------- */
.mark{
  font-weight:800;letter-spacing:-.05em;line-height:.78;
  font-size:clamp(88px,16.6vw,240px);
  white-space:nowrap;
}
h2.mega{
  font-weight:800;letter-spacing:-.05em;line-height:.95;
  font-size:clamp(56px,11vw,160px);
}
h3.state{
  font-weight:700;letter-spacing:-.03em;line-height:1.08;
  font-size:clamp(30px,4.4vw,64px);
}
.quote-l{
  font-weight:500;letter-spacing:-.03em;line-height:1.18;
  font-size:clamp(26px,3.3vw,48px);
}
.label{
  font-size:14px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--gray);
}
.slab{font-size:clamp(24px,2.2vw,32px);font-weight:700;letter-spacing:-.01em}
.prefix{
  font-weight:700;letter-spacing:-.03em;line-height:1;
  font-size:clamp(30px,4.4vw,64px);color:var(--chip);
  -webkit-text-stroke:1px #DDD;
}

/* ---------- nav ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;background:rgba(255,255,255,.9);backdrop-filter:blur(10px)}
.navin{max-width:1400px;margin:0 auto;padding:22px 40px;display:flex;justify-content:space-between;align-items:center}
.nbrand{font-size:19px;font-weight:800;letter-spacing:-.02em}
.nlinks{display:flex;gap:56px}
.nlinks a{font-size:14px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;position:relative}
.nlinks a::after{content:'';position:absolute;left:0;bottom:-4px;width:0;height:2px;background:var(--red);transition:width .3s var(--ease-quick)}
.nlinks a:hover::after{width:100%}

/* ---------- hero ---------- */
.hero{min-height:100vh;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding-top:110px;overflow:hidden}
.hero .intro{max-width:360px;margin-left:40px;font-size:21px;line-height:1.5;font-weight:500;letter-spacing:-.01em}
.hero .intro b{font-weight:800}
.stack{
  position:absolute;top:48%;left:50%;transform:translate(-50%,-52%);
  width:min(34vw,470px);aspect-ratio:3/4;z-index:2;pointer-events:none;
}
.stack .card{position:absolute;inset:0;border-radius:2px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.18)}
.stack .card img{width:100%;height:100%;object-fit:cover}
.stack .c1{transform:rotate(9deg) translate(6%,-3%);background:#111}
.stack .c2{transform:rotate(-7deg) translate(-5%,2%);background:var(--chip)}
.stack .c3{transform:rotate(2.5deg)}
.hero .copyright{position:absolute;top:47%;right:48px;font-size:clamp(20px,2.4vw,34px);font-weight:800;letter-spacing:-.02em}
.hero .loc{position:absolute;bottom:26px;right:48px;font-size:14px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gray2)}
.hero .markrow{position:relative;z-index:1;margin-bottom:-8px;padding:0 24px}
.hero .mark sup{font-size:.32em;vertical-align:super;letter-spacing:0}

/* ---------- section scaffolding ---------- */
section{padding:150px 0}
.split{display:grid;grid-template-columns:1fr 1.05fr;gap:60px;align-items:start}
.split .left{position:sticky;top:120px}
.split .left .hint{margin-top:46vh;max-width:280px;font-size:15px;color:var(--gray2);line-height:1.5}
.arrowlink{display:inline-flex;align-items:center;gap:12px;font-size:clamp(22px,2vw,30px);font-weight:700;letter-spacing:-.02em;margin-top:16px;transition:gap .3s}
.arrowlink:hover{gap:20px}
.arrowlink span{font-weight:400}

/* ---------- expertise (services pattern) ---------- */
.egroup{margin-bottom:110px}
.egroup .pre{display:flex;gap:18px;align-items:flex-start}
.egroup h3{max-width:22ch}
.chips{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px}
.chip{background:var(--chip);border-radius:100px;padding:12px 22px;font-size:16px;font-weight:500;letter-spacing:-.01em;transition:background .3s,color .3s}
.chip:hover{background:var(--black);color:var(--white)}

/* ---------- giant stats ---------- */
.bignum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;align-items:end;border-top:1px solid var(--line);padding-top:70px}
.bignum .n{font-weight:900;letter-spacing:-.045em;line-height:.8;font-size:clamp(90px,12vw,200px)}
.bignum .n i{font-style:normal;color:var(--red)}
.bignum .l{margin-top:20px;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--gray2);max-width:26ch}

/* ---------- record (awards table pattern) ---------- */
.record .split2{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;align-items:start}
.rrow{display:grid;grid-template-columns:1fr 1.4fr auto;gap:24px;padding:26px 0;border-top:1px solid var(--line);align-items:baseline}
.rrow:last-child{border-bottom:1px solid var(--line)}
.rrow .a{font-size:18px;font-weight:700;letter-spacing:-.01em}
.rrow .b{font-size:17px;color:var(--gray2)}
.rrow .c{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
.rrow .c em{font-style:normal;color:var(--red)}

/* ---------- photo band ---------- */
.band{padding:0}
.band img{width:100%;height:76vh;object-fit:cover}

/* ---------- process ---------- */
.process .sub{max-width:400px;margin-top:26px;font-size:17px;color:var(--gray2)}
.timeline{margin-top:80px;border-top:1px solid var(--line);position:relative}
.tl-grid{display:grid;grid-template-columns:repeat(5,1fr)}
.tl-cell{border-right:1px solid var(--line);padding:26px 22px 90px;position:relative;min-height:280px}
.tl-cell:first-child{border-left:1px solid var(--line)}
.tl-cell .step{display:inline-block;background:var(--black);color:var(--white);font-size:17px;font-weight:700;letter-spacing:-.01em;padding:14px 22px;white-space:nowrap}
.tl-cell .num{position:absolute;top:30px;right:22px;font-size:14px;font-weight:700;color:var(--gray)}
.tl-cell p{margin-top:22px;font-size:14.5px;line-height:1.5;color:var(--gray2)}

/* ---------- quote ---------- */
.bigquote{max-width:1100px}
.bigquote .attr{margin-top:36px;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--gray2)}
.bigquote .word{display:inline-block;overflow:hidden;vertical-align:bottom}
.bigquote .word i{display:inline-block;font-style:normal;transform:translateY(110%);transition:transform .8s var(--ease-quick)}
.bigquote.in .word i{transform:none}

/* ---------- voices (testimonials) ---------- */
.voices .grid{display:grid;grid-template-columns:repeat(3,1fr);margin-top:80px;border-top:1px solid var(--line);border-left:1px solid var(--line)}
.vcell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:38px 32px;display:flex;flex-direction:column;gap:26px;min-height:300px;transition:background .35s}
.vcell:hover{background:var(--panel)}
.vcell .q{font-size:18px;font-weight:500;letter-spacing:-.015em;line-height:1.45}
.vcell .q b{font-weight:700}
.vcell .who{margin-top:auto}
.vcell .who .nm{font-size:15px;font-weight:700}
.vcell .who .rl{font-size:13.5px;color:var(--gray);margin-top:2px;text-transform:uppercase;letter-spacing:.02em;font-weight:700}
.vcell.dark{background:var(--black);color:var(--white)}
.vcell.dark:hover{background:#111}
.vcell.dark .q{font-size:21px;font-weight:700;letter-spacing:-.02em}
.vcell.dark .rl{color:#888}

/* ---------- contact (pricing pattern) ---------- */
.talk .lay{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;align-items:end}
.talk .num{font-weight:800;letter-spacing:-.045em;line-height:.95;font-size:clamp(44px,7vw,104px)}
.talk .num span{color:var(--gray);font-weight:700}
.talk .old{font-size:clamp(22px,2.4vw,34px);font-weight:700;color:var(--gray);margin-top:18px}
.talk p.note{margin-top:26px;font-size:16px;color:var(--gray2);max-width:44ch}

/* ---------- journal ---------- */
.journal .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;margin-top:80px}
.jcard .ph{aspect-ratio:4/3;overflow:hidden;background:var(--panel)}
.jcard .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.05);transition:transform .8s var(--ease-quick),filter .8s}
.jcard:hover .ph img{transform:scale(1.04);filter:grayscale(0) contrast(1)}
.jcard .tag{margin-top:24px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--gray)}
.jcard h3{font-size:clamp(22px,2vw,30px);font-weight:700;letter-spacing:-.025em;line-height:1.1;margin-top:10px}
.jcard p{margin-top:12px;font-size:15px;color:var(--gray2)}
.jcard .rd{margin-top:16px;font-size:15px;font-weight:700;border-bottom:2px solid var(--black);display:inline-block;padding-bottom:2px}
.jcard:hover .rd{border-color:var(--red)}

/* ---------- FAQ ---------- */
.faq .frow{display:grid;grid-template-columns:110px 1fr;gap:30px;padding:60px 0;border-top:1px solid var(--line);cursor:pointer}
.faq .frow:last-of-type{border-bottom:1px solid var(--line)}
.faq .frow .qq{font-weight:700;letter-spacing:-.03em;line-height:1.05;font-size:clamp(26px,3.6vw,54px);max-width:18ch;transition:color .3s}
.faq .frow:hover .qq{color:var(--gray2)}
.faq .ans{grid-column:2;max-width:56ch;font-size:16.5px;color:var(--gray2);overflow:hidden;max-height:0;transition:max-height .6s var(--ease-quick),margin .6s}
.faq .frow.open .ans{max-height:300px;margin-top:22px}
.faq .frow .prefix{transition:color .3s}
.faq .frow.open .prefix{color:var(--red);-webkit-text-stroke:0}

/* ---------- guide strip ---------- */
.guide{background:var(--black);color:var(--white);padding:120px 0}
.guide .lay{display:grid;grid-template-columns:1.2fr 1fr;gap:70px;align-items:start}
.guide h2{font-weight:800;letter-spacing:-.04em;line-height:.98;font-size:clamp(38px,5.4vw,78px)}
.guide .label{color:#888}
.guide ul{list-style:none;margin-top:34px;display:flex;flex-direction:column;gap:14px}
.guide li{display:flex;gap:14px;font-size:16.5px;color:#CCC}
.guide li::before{content:'→';font-weight:700;color:var(--white)}
.gform{display:flex;flex-direction:column;gap:14px}
.gform input,.gform textarea{
  background:transparent;border:none;border-bottom:1px solid #333;color:var(--white);
  font-family:'Inter Tight',sans-serif;font-size:17px;padding:16px 2px;outline:none;resize:none;
}
.gform input:focus,.gform textarea:focus{border-color:var(--white)}
.gform ::placeholder{color:#777}
.gform button{
  margin-top:22px;background:var(--white);color:var(--black);border:none;cursor:pointer;
  font-family:'Inter Tight',sans-serif;font-size:17px;font-weight:700;padding:20px 34px;
  display:inline-flex;justify-content:center;transition:background .3s,color .3s;
}
.gform button:hover{background:var(--red);color:var(--white)}
.gform .fine{font-size:12.5px;color:#777}

/* ---------- footer ---------- */
footer{padding:130px 0 0;overflow:hidden}
.fcols{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:44px;padding-bottom:90px}
.fcols .fb p{margin-top:14px;font-size:15px;color:var(--gray2);max-width:30ch}
.fcols .h{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--gray);margin-bottom:18px}
.fcols a{display:block;padding:4px 0;font-size:16px;font-weight:500}
.fcols a:hover{color:var(--red)}
.fmark{margin:0 -6px -2vw;line-height:.74}
.fbottom{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:26px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--gray2);font-weight:500}

/* ---------- reveals ---------- */

           /* ---------- responsive ---------- */
@media (max-width:1080px){
  .voices .grid{grid-template-columns:1fr 1fr}
  .tl-grid{grid-template-columns:1fr 1fr}
  .tl-cell{min-height:auto;padding-bottom:50px}
  .journal .grid{grid-template-columns:1fr 1fr}
}
@media (max-width:860px){
  .wrap{padding:0 22px}
  body{font-size:16px}
  section{padding:100px 0}
  .nlinks{display:none}
  .hero .intro{margin-left:22px;max-width:300px;font-size:18px}
  .stack{position:relative;top:auto;left:auto;transform:none;width:74vw;margin:60px auto 40px}
  .hero .copyright{position:static;text-align:right;padding:0 22px}
  .hero .loc{position:static;text-align:right;padding:12px 22px 0}
  .split{grid-template-columns:1fr;gap:36px}
  .split .left{position:static}
  .split .left .hint{margin-top:20px}
  .record .split2,.talk .lay,.guide .lay{grid-template-columns:1fr;gap:44px}
  .bignum-row{grid-template-columns:1fr;gap:64px}
  .voices .grid,.journal .grid{grid-template-columns:1fr}
  .tl-grid{grid-template-columns:1fr}
  .tl-cell{border-left:1px solid var(--line)}
  .faq .frow{grid-template-columns:1fr;gap:14px;padding:40px 0}
  .faq .ans{grid-column:1}
  .fcols{grid-template-columns:1fr 1fr}
  .rrow{grid-template-columns:1fr;gap:6px}
}

.wr{opacity:0}
html.no-motion .wr{opacity:1}
:focus-visible{outline:2px solid var(--red);outline-offset:3px}
.phx{position:relative;width:100%;background:#ECECEC;display:grid;place-items:center;overflow:hidden;border-radius:inherit}
.phx::after{content:attr(data-label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.35);text-align:center;padding:12px;line-height:1.7}
.phx>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* R5: banda que se expande con clip-path (paint, no layout) */
.band .bx{will-change:clip-path;clip-path:inset(0 7% round 24px)}
html.no-motion .band .bx{clip-path:inset(0 0 round 0)}

var partials={

function boot(data){
  window.__B=data.brand||{};
  if(data.meta){document.title=data.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  document.getElementById('brandMark').textContent=(data.brand||{}).mark+'®';
  document.getElementById('navLinks').innerHTML=((data.nav||{}).links||[]).map(function(l){return'<a href="'+esc(l[1])+'">'+esc(l[0])+'</a>'}).join('');
  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('site').innerHTML=html;
  initMotion();
}

function initMotion(){
  if(!MOTION)return;
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();if(lenis)lenis.scrollTo(t);else document.querySelector(t).scrollIntoView({behavior:'smooth'})}});
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[120,80,60][Math.min(i,2)]});
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});
  gsap.utils.toArray('[data-cards]').forEach(function(grid){
    var cards=grid.querySelectorAll('.wr');var d=0,steps=[90,70,55,45,40,40];
    cards.forEach(function(c,i){
      gsap.fromTo(c,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:d/1000,clearProps:'transform',
        scrollTrigger:{trigger:grid,start:'top 84%',once:true}});
      d+=steps[Math.min(i,5)]})});
  gsap.utils.toArray('[data-rule]').forEach(function(el){
    var line=document.createElement('div');
    line.style.cssText='height:1px;background:currentColor;opacity:.12;transform-origin:left center;transform:scaleX(0)';
    el.insertBefore(line,el.firstChild);
    gsap.to(line,{scaleX:1,duration:.8,ease:'expo.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}})});
  /* R5 BANDA-EXPAND: clip-path inset 7%+radio → full-bleed, mapeado (paint) */
  var bx=document.querySelector('#bandX .bx');
  if(bx){ScrollTrigger.create({trigger:'#bandX',start:'top 85%',end:'top 25%',scrub:.4,
    onUpdate:function(self){var p=self.progress;
      bx.style.clipPath='inset(0 '+(7*(1-p))+'% round '+(24*(1-p))+'px)'}})}
}

fetch('/v10-mobius/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">No se pudo cargar content.json ('+esc(err.message)+')</div>'});
})();
</script>
