<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marlow Marketing Co. — Bold Brands, Built on Purpose</title>
<meta name="description" content="A high-fashion marketing studio template concept: electric red, ballet pink, and editorial serif display. Placeholder content.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Pinyon+Script&family=Archivo:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(96px,13vh,152px);

  --red:#FF3D33; --pink:#FCC1FF; --violet:#8C52FF; --paper:#F9F8F3; --ink:#111;
  --display:'Italiana',serif; --script:'Pinyon Script',cursive;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--red);color:var(--pink);font-family:'Archivo',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--pink);color:var(--red)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}

/* ---------- nav ---------- */
.nav{position:sticky;top:0;z-index:60;background:var(--red);display:flex;align-items:center;
  justify-content:space-between;padding:14px 26px}
.nav .lg{font-family:var(--display);font-size:22px;letter-spacing:.04em;color:var(--pink)}
.nav .links{display:flex;gap:26px}
.nav .links a{font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--pink);opacity:.92;transition:opacity .3s}
.nav .links a:hover{opacity:.6}
.nav .dots{display:grid;grid-template-columns:repeat(3,4px);gap:3px}
.nav .dots i{width:4px;height:4px;background:var(--pink);border-radius:50%}

/* ---------- hero ---------- */
.hero{padding:26px 5vw 90px;position:relative}
.hero .stage{position:relative;margin:0 auto;max-width:1200px}
.hero .ph{aspect-ratio:16/10;overflow:hidden;background:#D9CCC2;position:relative}
.hero .ph img{width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.02)}
.hero .wm{position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);width:110%;text-align:center;
  font-family:var(--display);font-size:clamp(72px,13.5vw,200px);line-height:.9;letter-spacing:.02em;
  color:var(--pink);text-transform:uppercase;pointer-events:none;mix-blend-mode:normal}
.hero .sub{position:absolute;right:6%;bottom:10%;font-family:var(--script);
  font-size:clamp(30px,4vw,58px);color:var(--pink)}
.hero .side{position:absolute;left:-4vw;top:8%;bottom:8%;width:8vw;background:linear-gradient(180deg,#FF8177,#FF3D33);opacity:.6}

/* ---------- statement ---------- */
.state{background:var(--pink);color:var(--red);padding:var(--sec) 5vw;text-align:center}
.state h2{font-family:var(--display);font-size:clamp(38px,6vw,92px);line-height:1.02;max-width:1000px;margin:0 auto}
.state h2 .vio{color:var(--violet)}
.state .script{font-family:var(--script);font-size:clamp(34px,4.6vw,64px);color:var(--violet);display:block;margin-top:16px}
.state p{margin-top:36px;font-size:14.5px;line-height:1.75;color:#7A2A26;max-width:520px;margin-left:auto;margin-right:auto}

/* ---------- services ---------- */
.svc{background:var(--paper);color:var(--red);padding:var(--sec) 5vw}
.svc .head{max-width:1100px;margin:0 auto 60px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:14px}
.svc h2{font-family:var(--display);font-size:clamp(38px,5.4vw,76px);line-height:.98}
.svc .lbl{color:var(--violet)}
.svc .rows{max-width:1100px;margin:0 auto}
.srow{display:grid;grid-template-columns:auto 1fr auto;gap:26px;align-items:baseline;padding:30px 4px;
  border-top:1px solid rgba(255,61,51,.35);transition:background var(--dur-hover) var(--ease-quick)}
.srow:last-child{border-bottom:1px solid rgba(255,61,51,.35)}
.srow:hover{background:#F2F1ED}
.srow .rin2{display:contents}
.srow:hover .t{transform:translateX(12px)}
.srow .t{transition:transform var(--dur-hover) var(--ease-quick)}
.srow .n{font-family:var(--script);font-size:26px;color:var(--violet)}
.srow .t{font-family:var(--display);font-size:clamp(26px,4vw,56px);line-height:1}
.srow .t em{font-style:italic}
.srow .d{font-size:12.5px;font-weight:500;letter-spacing:.04em;color:#8A867C;max-width:220px;text-align:right;line-height:1.6}

/* ---------- editorial split ---------- */
.split{background:var(--red);padding:calc(var(--sec)*.9) 5vw}
.split .in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:.85fr 1.15fr;gap:70px;align-items:center}
.split .ph{aspect-ratio:3/4;overflow:hidden;background:#E8D8CE}
.split .ph img{width:100%;height:100%;object-fit:cover;filter:saturate(.85)}
.split h2{font-family:var(--display);font-size:clamp(34px,4.6vw,64px);line-height:1.04;color:var(--pink)}
.split .script{font-family:var(--script);font-size:clamp(30px,3.6vw,48px);color:var(--pink);opacity:.9;display:block;margin-top:8px}
.split p{margin-top:28px;font-size:14.5px;line-height:1.8;color:#FFD9D6;max-width:460px}
.split .cta{display:inline-block;margin-top:36px;font-size:11px;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);background:var(--pink);padding:16px 30px;border-radius:99px;
  transition:transform .3s}
.split .cta:hover{transform:translateY(-2px)}

/* ---------- vip day ---------- */
.vip{background:var(--violet);color:var(--pink);padding:calc(var(--sec)*1.15) 5vw;text-align:center;position:relative;overflow:hidden}
.vip .ghost{position:absolute;inset:auto 0 -4vw 0;font-family:var(--display);font-size:clamp(80px,15vw,220px);
  line-height:.8;text-transform:uppercase;color:rgba(252,193,255,.16);white-space:nowrap;pointer-events:none}
.vip .lbl{color:#D9C1FF}
.vip h2{font-family:var(--display);font-size:clamp(40px,6.4vw,96px);line-height:.98;margin-top:18px}
.vip h2 em{font-style:italic}
.vip p{margin-top:30px;font-size:14.5px;line-height:1.75;max-width:520px;margin-left:auto;margin-right:auto;color:#EBD9FF}
.vip .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;max-width:960px;margin:60px auto 0;text-align:left}
.vip .step{border:1px solid rgba(252,193,255,.4);padding:26px 24px 30px}
.vip .step .n{font-family:var(--script);font-size:30px}
.vip .step .t{font-family:var(--display);font-size:22px;margin-top:10px}
.vip .step p{margin-top:8px;font-size:12.5px;color:#EBD9FF;line-height:1.65;max-width:none}

/* ---------- voices ---------- */
.voices{background:var(--paper);color:var(--red);padding:130px 5vw;text-align:center}
.voices .script{font-family:var(--script);font-size:clamp(34px,4.6vw,60px);color:var(--violet)}
.voices q{display:block;font-family:var(--display);font-size:clamp(26px,3.6vw,48px);line-height:1.2;
  max-width:900px;margin:26px auto 0;quotes:'“' '”'}
.voices .who{margin-top:26px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8A867C}

/* ---------- close ---------- */
.close{background:var(--red);padding:150px 5vw 60px;text-align:center;position:relative;overflow:hidden}
.close .script{font-family:var(--script);font-size:clamp(40px,6vw,84px);color:var(--pink)}
.close h2{font-family:var(--display);font-size:clamp(52px,9.5vw,150px);line-height:.92;
  text-transform:uppercase;color:var(--pink);margin-top:6px}
.close .cta{display:inline-block;margin-top:44px;font-size:11px;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);background:var(--pink);padding:17px 34px;border-radius:99px;
  transition:transform .3s}
.close .cta:hover{transform:translateY(-2px)}
.close .fine{margin-top:110px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#FFB1AB}

/* ---------- reveals ---------- */
[data-hero]{opacity:0;}
[data-hero="2"]{animation-delay:.25s}


@media (max-width:920px){
  .nav .links{display:none}
  .split .in{grid-template-columns:1fr;gap:40px}
  .vip .steps{grid-template-columns:1fr}
  .srow{grid-template-columns:1fr;gap:8px}
  .srow .d{text-align:left;max-width:none}
}

/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid currentColor;outline-offset:3px}
[data-tilt]{will-change:transform}
html.no-motion [data-tilt]{transform:none!important}
.phx{display:flex;align-items:center;justify-content:center;background:#E8D8CE;color:#8A867C;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px;width:100%;height:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#8A867C;font-size:14px}
</style></head>
<body>
<nav class="nav"><span class="lg" id="nlogo"></span><div class="links" id="nlinks"></div><div class="dots" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Marlow Marketing Co. — template concept</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;v&gt;/g,'<span class="vio">').replace(/&lt;\/v&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<header class="hero"><div class="stage" data-r2>'+
  '<div class="side" aria-hidden="true"></div>'+
  '<div class="ph wr">'+img(s.img)+'</div>'+
  '<div class="wm wr">'+esc(s.wm)+'</div>'+
  '<div class="sub wr">'+esc(s.sub)+'</div>'+
  '</div></header>'},
state:function(s){
  return'<section class="state"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<span class="script wr">'+esc(s.script)+'</span>'+
  '<p class="wr">'+rich(s.body)+'</p>'+
  '</section>'},
svc:function(s){
  return'<section class="svc"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="head" data-r2><h2 class="wr">'+esc(s.title)+'</h2><span class="lbl script wr">'+esc(s.lbl)+'</span></div>'+
  '<div class="rows">'+(s.rows||[]).map(function(r,i){return'<div class="srow wr" data-tilt data-side="'+(i%2?'r':'l')+'">'+
    '<span class="n">'+esc(r.n)+'</span><span class="t">'+esc(r.t)+'</span><span class="d">'+rich(r.d)+'</span></div>'}).join('')+'</div>'+
  '</section>'},
split:function(s){
  return'<section class="split"><div class="in">'+
  '<div class="ph wr" data-r1>'+img(s.img)+'</div>'+
  '<div data-r2><span class="lbl wr">'+esc(s.lbl)+'</span>'+
  '<h2 class="script wr" style="display:block">'+esc(s.script)+'</h2>'+
  '<p class="wr">'+rich(s.body)+'</p>'+
  '<p class="wr" style="margin-top:26px"><a class="cta" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a></p>'+
  '</div></div></section>'},
vip:function(s){
  return'<section class="vip"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="ghost" aria-hidden="true">'+esc(s.ghost)+'</div>'+
  '<div data-r2><span class="lbl wr">'+esc(s.lbl)+'</span>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<p class="sub wr">'+rich(s.body)+'</p></div>'+
  '<div class="steps">'+(s.steps||[]).map(function(st,i){return'<div class="step wr" data-tilt data-side="'+(i%2?'r':'l')+'">'+
    '<span class="n">'+('0'+(i+1)).slice(-2)+'</span><div class="t">'+esc(st.t)+'</div><p>'+rich(st.d)+'</p></div>'}).join('')+'</div>'+
  '</section>'},
voices:function(s){
  return'<section class="voices"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<span class="lbl script wr">'+esc(s.lbl)+'</span>'+
  '<h2 class="wr">'+esc(s.q)+'</h2>'+
  '<div class="who wr">'+esc(s.who)+'</div>'+
  '</section>'},
close:function(s){
  return'<section class="close"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<span class="script wr">'+esc(s.script)+'</span>'+
  '<h2 class="wr">'+esc(s.title)+'</h2>'+
  '<div class="wr"><a class="cta" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a></div>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v28-tuesday/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('nlinks').innerHTML=(c.nav.links||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });

  /* R5 nada llega recto: filas y pasos se enderezan con el scrub */
  document.querySelectorAll('[data-tilt]').forEach(function(el){
    var dir=el.getAttribute('data-side')==='r'?1:-1;
    el.style.opacity=0;
    ScrollTrigger.create({trigger:el,start:'top 96%',end:'top 55%',scrub:.4,
      onUpdate:function(self){var k=self.progress;
        el.style.opacity=Math.min(1,k*1.6);
        el.style.transform='rotate('+(dir*4*(1-k))+'deg) translateY('+((1-k)*26)+'px)';
      }});
  });
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
