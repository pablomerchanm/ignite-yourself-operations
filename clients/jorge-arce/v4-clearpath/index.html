<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · v4 ClearPath</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   v4 "CLEARPATH" — el sendero sage.
   TOKENS: cambiar identidad = editar SOLO este bloque.
   Contenido: /v4-clearpath/content.json · principles/V4-CLEARPATH.md
   ============================================================ */
:root{
  --white:#FFFFFF; --off:#FAFAFA; --sage:#7FA69B; --sage-soft:#EDF3F1;
  --slate:#2E3231; --gray:#535956; --line:rgba(0,0,0,.08);
  --f-sans:'Inter',sans-serif; --f-serif:'Crimson Text',serif;
  /* tipo ratio 1.25 base 16 */
  --t-lab:.8rem; --t-body:1rem; --t-sub:1.25rem;
  --t-display:clamp(2.5rem,4.2vw,4rem);
  --t-hero:clamp(4rem,9.4vw,8.5rem);
  --t-bignum:clamp(8.75rem,15.8vw,14.2rem);
  /* espacio base 8: tres alturas de sección */
  --sec:clamp(96px,13vh,160px);
  --sec-band:calc(var(--sec)*.85);
  --gut:clamp(24px,4.4vw,64px);
  --maxw:1312px;
  /* motion */
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s; --dur-nav:.35s;
  --r-card:20px; --r-pill:100px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--slate);font-family:var(--f-sans);font-size:var(--t-body);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--sage);color:#fff}
:focus-visible{outline:2px solid var(--sage);outline-offset:3px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut)}
.serif{font-family:var(--f-serif);font-weight:400;letter-spacing:-.03em}
.lab{font-size:.75rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--sage)}
.wr{opacity:0}
html.no-motion .wr{opacity:1}
.ph{position:relative;width:100%;background:#DCE7E3;display:grid;place-items:center;overflow:hidden}
.ph::after{content:attr(data-label);font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(46,50,49,.45);text-align:center;padding:14px;line-height:1.7}
.ph>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.pill{display:inline-flex;align-items:center;gap:10px;border-radius:var(--r-pill);padding:15px 30px;font-size:.75rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;cursor:pointer;border:none;transition:transform var(--dur-hover) var(--ease-quick),background var(--dur-hover) var(--ease-quick),box-shadow var(--dur-hover) var(--ease-quick)}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.pill.sage{background:var(--sage);color:#fff}
.pill.sage:hover{background:#6E958A;transform:translateY(-2px)}
.pill.white{background:#fff;color:var(--slate)}
.pill.white:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(46,50,49,.12)}
.pill:active{transform:scale(.97)}

.ellipse-note{position:relative;display:inline-block}
.ellipse-note svg{position:absolute;inset:-14px -20px;width:calc(100% + 40px);height:calc(100% + 28px);overflow:visible}
.ellipse-note svg path{fill:none;stroke:var(--sage);stroke-width:1.6}
.waves{color:var(--sage);letter-spacing:2px;font-size:1.375rem;line-height:1}

/* ---------- nav ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;transition:background var(--dur-nav) var(--ease-quick),box-shadow var(--dur-nav) var(--ease-quick)}
nav.scrolled{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);box-shadow:0 1px 0 var(--line)}
.navin{display:flex;justify-content:space-between;align-items:center;padding:20px var(--gut)}
.nlogo{display:flex;align-items:center;gap:10px;font-family:var(--f-serif);font-size:1.4375rem;letter-spacing:.02em;color:var(--slate)}
nav.onhero .nlogo,nav.onhero .nlinks a{color:#fff}
nav.onhero .nlinks a.pill.white,nav.scrolled .nlinks a.pill.white{color:var(--slate)}
nav.scrolled .nlogo,nav.scrolled .nlinks a{color:var(--slate)}
.nlogo .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.nlinks{display:flex;gap:44px;align-items:center}
.nlinks a{font-size:.75rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;opacity:.9;transition:opacity var(--dur-hover) var(--ease-quick)}
.nlinks a:hover{opacity:1}
@media(max-width:900px){.nlinks a:not(.pill){display:none}}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;color:#fff;overflow:hidden}
.hero .bgph{position:absolute;inset:0}
.hero .bgph .ph{position:absolute;inset:0;height:100%}
.hero .bgph img{object-position:50% 25%}
.hero .tint{position:absolute;inset:0;background:linear-gradient(160deg,rgba(127,166,155,.5) 0%,rgba(160,180,150,.28) 45%,rgba(46,50,49,.45) 100%)}
.hero .inner{position:relative;z-index:2;width:100%;display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:end;padding:0 var(--gut) 84px}
.hero h1{font-size:var(--t-hero);line-height:.94;max-width:11ch;text-shadow:0 2px 30px rgba(0,0,0,.15)}
.hero .right p{font-size:1rem;line-height:1.7;max-width:44ch;margin-bottom:28px;text-shadow:0 1px 14px rgba(0,0,0,.2)}
@media(max-width:900px){.hero .inner{grid-template-columns:1fr;padding-bottom:60px;gap:34px}}

/* ---------- about (respiro centrado — único junto a finale) ---------- */
.about{padding:calc(var(--sec)*1.3) 0 calc(var(--sec)*.6)}
.centerhead{text-align:center;max-width:640px;margin:0 auto}
.centerhead .waves{margin-bottom:18px}
.centerhead .lab{display:block;margin-bottom:16px}
.centerhead h2{font-size:var(--t-display);font-weight:500;letter-spacing:-.04em;line-height:1.12}
.centerhead p{margin-top:20px;color:var(--gray)}

/* ---------- journey — EL SENDERO (R5) ---------- */
.journey{position:relative;padding:var(--sec) 0;overflow:clip}
.trailsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.trailsvg path{fill:none;stroke:var(--sage);stroke-width:2;opacity:.5}
.jsteps{position:relative;z-index:1}
.jstep{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;padding:90px 0}
.jstep .txt h3{font-family:var(--f-serif);font-weight:400;font-size:clamp(2.75rem,5vw,4.5rem);letter-spacing:-.03em;line-height:.96;color:var(--sage);margin-bottom:26px}
.jstep .txt h3.ink{color:var(--slate)}
.jstep .txt p{color:var(--gray);max-width:46ch}
.jstep .bignum{font-weight:500;font-size:var(--t-bignum);letter-spacing:-.04em;line-height:.9;color:var(--sage);text-align:right;user-select:none;opacity:.18;transform:translateX(6%);will-change:opacity}
html.no-motion .jstep .bignum{opacity:1}
.jstep:nth-child(even) .bignum{order:-1;text-align:left;transform:translateX(-6%)}
@media(max-width:900px){
  .trailsvg{display:none}
  .jstep{grid-template-columns:1fr;gap:16px;padding:60px 0}
  .jstep .bignum{text-align:left;order:-1;font-size:6.875rem;transform:none}
}

/* ---------- services (banda sage, cabecera IZQUIERDA asimétrica) ---------- */
.services{background:var(--sage);color:#fff;padding:var(--sec-band) 0}
.services .shead{display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:end;margin-bottom:64px}
.services .lab{color:rgba(255,255,255,.85)}
.services h2{font-size:var(--t-display);font-weight:500;letter-spacing:-.04em;line-height:1.08;margin-top:14px}
.services .shead p{color:rgba(255,255,255,.85);max-width:38ch;justify-self:end}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.scard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:38px 34px;transition:background var(--dur-hover) var(--ease-quick),transform var(--dur-hover) var(--ease-quick)}
.scard:hover{background:rgba(255,255,255,.14);transform:translateY(-5px)}
.scard h3{font-family:var(--f-serif);font-weight:400;font-size:1.9375rem;letter-spacing:-.02em;line-height:1.05;margin-bottom:14px}
.scard p{font-size:.875rem;line-height:1.65;color:rgba(255,255,255,.85)}
@media(max-width:900px){.services .shead{grid-template-columns:1fr}.services .shead p{justify-self:start}.sgrid{grid-template-columns:1fr}}

/* ---------- impact ---------- */
.impact{padding:var(--sec) 0}
.impact .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:70px;align-items:start;margin-bottom:90px}
.state{font-size:clamp(1.75rem,3vw,2.75rem);font-weight:500;letter-spacing:-.04em;line-height:1.2}
.state .sg{color:var(--sage)}
.impact .side{color:var(--gray);font-size:.9375rem;max-width:38ch;padding-top:14px}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.stat .n{font-size:clamp(3rem,5vw,4.5rem);font-weight:600;letter-spacing:-.04em;color:var(--sage);line-height:1}
.stat .l{margin-top:12px;color:var(--gray);font-size:.9375rem;line-height:1.5;max-width:20ch}
@media(max-width:900px){.impact .grid{grid-template-columns:1fr;gap:40px}.statrow{grid-template-columns:1fr 1fr}}

/* ---------- begin ---------- */
.begin{background:var(--off);padding:var(--sec) 0}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:70px}
.bcard{background:#fff;border-radius:var(--r-card);padding:44px 40px;box-shadow:0 2px 20px rgba(46,50,49,.05);display:flex;flex-direction:column;transition:transform var(--dur-hover) var(--ease-quick),box-shadow var(--dur-hover) var(--ease-quick)}
.bcard:hover{transform:translateY(-6px);box-shadow:0 20px 44px rgba(46,50,49,.1)}
.bcard h3{font-family:var(--f-serif);font-weight:400;font-size:2.125rem;letter-spacing:-.02em;margin-bottom:8px}
.bcard .sub{color:var(--gray);font-size:.9rem;margin-bottom:26px}
.bcard ul{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:34px}
.bcard li{display:flex;gap:12px;font-size:.9rem}
.bcard li::before{content:'✓';flex:0 0 20px;height:20px;border-radius:50%;background:var(--sage-soft);color:var(--sage);display:flex;align-items:center;justify-content:center;font-size:.7rem;margin-top:2px}
.bcard .pill{margin-top:auto;align-self:flex-start}
.bcard.feature{background:var(--slate);color:#fff}
.bcard.feature .sub,.bcard.feature li{color:rgba(255,255,255,.85)}
.bcard.feature li::before{background:rgba(255,255,255,.12);color:#fff}
@media(max-width:900px){.bgrid{grid-template-columns:1fr}}

/* ---------- stories (cabecera izquierda) ---------- */
.stories{padding:var(--sec) 0}
.lhead{display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:end;margin-bottom:64px}
.lhead h2{font-size:var(--t-display);font-weight:500;letter-spacing:-.04em;line-height:1.08;margin-top:14px}
.lhead p{color:var(--gray);max-width:38ch;justify-self:end}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tcard{background:var(--sage-soft);border-radius:18px;padding:36px 32px;display:flex;flex-direction:column;gap:22px;transition:transform var(--dur-hover) var(--ease-quick)}
.tcard:hover{transform:translateY(-5px)}
.tcard .q{font-size:.97rem;line-height:1.65}
.tcard .q em{font-family:var(--f-serif);font-style:italic;color:var(--sage);font-size:1.1em}
.tcard .who{margin-top:auto}
.tcard .who .nm{font-weight:600;font-size:.9rem}
.tcard .who .rl{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:3px}
.tcard.pull{background:var(--sage);color:#fff;justify-content:center}
.tcard.pull .q{font-family:var(--f-serif);font-size:1.5rem;line-height:1.3;color:#fff}
.tcard.pull .who .nm{color:#fff}
.tcard.pull .who .rl{color:rgba(255,255,255,.8)}
@media(max-width:900px){.lhead{grid-template-columns:1fr}.lhead p{justify-self:start}.tgrid{grid-template-columns:1fr}}

/* ---------- faq (sin animar layout) ---------- */
.faq{padding:0 0 var(--sec)}
.faq .grid{display:grid;grid-template-columns:1fr 1.3fr;gap:70px;align-items:start}
.faq h2{font-size:clamp(2.25rem,3.6vw,3.25rem);font-weight:500;letter-spacing:-.04em;line-height:1.08}
.faq h2 .sg{color:var(--sage)}
.faq .left p{margin-top:22px;color:var(--gray);max-width:34ch}
.fitem{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 30px;margin-bottom:14px;cursor:pointer;transition:box-shadow var(--dur-hover) var(--ease-quick)}
.fitem:hover{box-shadow:0 8px 26px rgba(46,50,49,.06)}
.fitem .qq{display:flex;justify-content:space-between;align-items:center;gap:16px;font-weight:600;font-size:1.03rem;letter-spacing:-.01em}
.fitem .qq .tg{color:var(--sage);font-size:1.25rem;font-weight:400;transition:transform .3s var(--ease-quick)}
.fitem.open .qq .tg{transform:rotate(45deg)}
.fitem .ans{display:none;color:var(--gray);font-size:.9rem;margin-top:14px}
.fitem.open .ans{display:block}
@media(max-width:900px){.faq .grid{grid-template-columns:1fr;gap:40px}}

/* ---------- journal (cabecera izquierda) ---------- */
.journal{background:var(--off);padding:var(--sec) 0}
.jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.jpost{border-radius:var(--r-card);overflow:hidden;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;transition:transform var(--dur-hover) var(--ease-quick),box-shadow var(--dur-hover) var(--ease-quick)}
.jpost:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(46,50,49,.08)}
.jpost .phw{aspect-ratio:16/10;overflow:hidden}
.jpost .phw .ph{height:100%}
.jpost .phw img{transition:transform .7s var(--ease-out)}
.jpost:hover .phw img{transform:scale(1.04)}
.jpost .bd{padding:28px 30px 32px;display:flex;flex-direction:column;flex:1}
.jpost .lab{margin-bottom:12px}
.jpost h3{font-family:var(--f-serif);font-weight:400;font-size:1.75rem;letter-spacing:-.02em;line-height:1.1}
.jpost p{margin-top:10px;color:var(--gray);font-size:.9rem}
.jpost .rd{margin-top:auto;padding-top:20px;font-size:.75rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--sage)}
@media(max-width:900px){.jgrid{grid-template-columns:1fr}}

/* ---------- speak ---------- */
.speak{background:var(--off);padding:0 0 var(--sec)}
.speak .grid{display:grid;grid-template-columns:1fr 1.35fr;gap:70px;align-items:start}
.speak .photo{border-radius:22px;overflow:hidden}
.speak .photo .ph{aspect-ratio:4/5}
.speak h2{font-size:clamp(2rem,3.4vw,2.875rem);font-weight:500;letter-spacing:-.04em;line-height:1.12;margin:16px 0 18px}
.speak .lead{color:var(--gray);max-width:52ch;margin-bottom:38px}
.srow{display:grid;grid-template-columns:60px 1fr auto;gap:20px;align-items:center;padding:20px 0;border-top:1px solid var(--line)}
.srow:last-of-type{border-bottom:1px solid var(--line)}
.srow .yr{font-weight:600;color:var(--sage);font-size:.9rem}
.srow .tt{font-weight:600;font-size:1.05rem;letter-spacing:-.01em}
.srow .ww{font-size:.85rem;color:var(--gray)}
.srow .tp{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);border-radius:100px;padding:6px 14px}
@media(max-width:900px){.speak .grid{grid-template-columns:1fr;gap:40px}.srow{grid-template-columns:44px 1fr;row-gap:6px}.srow .tp{grid-column:2;justify-self:start}}

/* ---------- guide ---------- */
.guide{padding:var(--sec) 0}
.guide .card{display:grid;grid-template-columns:1.1fr .9fr;background:var(--slate);color:#fff;border-radius:26px;overflow:hidden}
.guide .gtxt{padding:clamp(44px,5vw,70px)}
.guide .gtxt h3{font-family:var(--f-serif);font-weight:400;font-size:clamp(1.9rem,3.2vw,2.75rem);letter-spacing:-.02em;line-height:1.06;margin:14px 0 26px}
.guide .gtxt .lab{color:#A8C6BE}
.guide li{display:flex;gap:12px;font-size:.9rem;color:rgba(255,255,255,.88);margin-bottom:12px;list-style:none}
.guide li::before{content:'✓';flex:0 0 20px;height:20px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.7rem;margin-top:2px}
.guide form{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
.guide input{flex:1;min-width:200px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);border-radius:100px;padding:14px 22px;font-family:var(--f-sans);font-size:.875rem;color:#fff}
.guide input::placeholder{color:rgba(255,255,255,.55)}
.guide input:focus{outline:none;border-color:var(--sage)}
.guide .fine{font-size:.69rem;color:rgba(255,255,255,.55);margin-top:16px;line-height:1.6}
.guide .gph{position:relative}
.guide .gph .ph{position:absolute;inset:0;height:100%}
@media(max-width:900px){.guide .card{grid-template-columns:1fr}.guide .gph{min-height:280px;order:-1}.guide .gph .ph{position:relative;aspect-ratio:16/9}}

/* ---------- finale + footer ---------- */
.finale{padding:var(--sec) 0 0;text-align:center}
.finale .waves{margin-bottom:18px}
.finale h2{font-size:clamp(2.5rem,5vw,4.25rem);font-weight:500;letter-spacing:-.04em;line-height:1.06;max-width:18ch;margin:0 auto}
.finale h2 .sg{color:var(--sage)}
.finale p{margin:22px auto 34px;color:var(--gray);max-width:44ch}
.finale .row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:90px}
.finale .tel{font-weight:600;color:var(--slate);display:inline-flex;align-items:center;padding:15px 10px}
footer{border-top:1px solid var(--line);padding:64px 0 44px}
footer .cols{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:54px}
footer .flogo{font-family:var(--f-serif);font-size:1.4375rem;display:flex;align-items:center;gap:10px}
footer .flogo .dot{width:7px;height:7px;border-radius:50%;background:var(--sage)}
footer .fabout{margin-top:14px;color:var(--gray);font-size:.9rem;max-width:30ch}
footer .h{font-size:.72rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--gray);margin-bottom:16px}
footer .col a,footer .col span{display:block;font-size:.9rem;margin-bottom:10px;color:var(--slate)}
footer .col a:hover{color:var(--sage)}
footer .legal{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:24px;font-size:.78rem;color:var(--gray)}
@media(max-width:900px){footer .cols{grid-template-columns:1fr 1fr}}
.load-error{min-height:60vh;display:grid;place-items:center;text-align:center;padding:var(--gut);font-size:.85rem;line-height:1.8;color:var(--gray)}
</style>
</head>
<body>

<nav id="nav" class="onhero"><div class="navin">
  <a class="nlogo" href="#"><span class="dot"></span><span id="brandLogo"></span></a>
  <div class="nlinks" id="navLinks"></div>
</div></nav>

<main id="site"></main>
<noscript><div class="load-error"><p>Este template renderiza su contenido desde content.json y requiere JavaScript.</p></div></noscript>

<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
'use strict';
var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&!!(window.gsap&&window.ScrollTrigger&&window.Lenis);
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rich(s){return esc(s)
  .replace(/&lt;s&gt;/g,'<span class="sg" style="color:var(--sage)">').replace(/&lt;\/s&gt;/g,'</span>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;e&gt;/g,'<span class="ellipse-note" data-ellipse>').replace(/&lt;\/e&gt;/g,'<svg viewBox="0 0 260 64" preserveAspectRatio="none"><path d="M18 40 C 30 12, 220 6, 244 26 C 258 40, 200 58, 96 58 C 40 58, 10 50, 18 38"/></svg></span>')
  .replace(/&lt;br&gt;/g,'<br>').replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img,ratio){if(!img)return'';var r=(img.ratio||ratio||'4:5').replace(':',' / ');
  return'<div class="ph" style="aspect-ratio:'+r+'" data-label="'+esc(img.src?'':img.label||'')+'">'+(img.src?'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'">':'')+'</div>'}
function lhead(s){return'<div class="lhead wr" data-r1><div><span class="lab">'+esc(s.lab||'')+'</span><h2 class="serif">'+rich(s.title)+'</h2></div><p>'+esc(s.text||'')+'</p></div>'}

var partials={
  hero:function(s){return'<header class="hero"><div class="bgph">'+ph(s.image,'16:9')+'</div><div class="tint"></div>'+
    '<div class="inner"><h1 class="serif wr" data-hero>'+esc(s.title)+'</h1>'+
    '<div class="right wr" data-hero><p>'+esc(s.text)+'</p><a class="pill sage" href="'+esc((s.cta||{}).href||'#')+'">'+esc((s.cta||{}).text||'')+' <span class="dot"></span></a></div></div></header>'},

  about:function(s){return'<section class="about"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap"><div class="centerhead wr" data-r1>'+
    '<div class="waves">≈</div><span class="lab">'+esc(s.lab)+'</span><h2 class="serif">'+rich(s.title)+'</h2><p>'+esc(s.text)+'</p></div></div></section>'},

  journey:function(s){return'<section class="journey" id="trail"><svg class="trailsvg" viewBox="0 0 1000 1400" preserveAspectRatio="none" aria-hidden="true">'+
    '<path id="trailPath" d="M 500 0 C 260 180, 180 300, 420 420 C 660 540, 820 620, 560 760 C 300 900, 200 1000, 470 1120 C 700 1220, 760 1300, 500 1400"/></svg>'+
    '<div class="wrap jsteps">'+(s.steps||[]).map(function(st,i){return'<div class="jstep wr" data-r1><div class="txt"><h3'+(st.ink?' class="ink"':'')+'>'+esc(st.t)+'</h3><p>'+esc(st.text)+'</p></div><div class="bignum" data-bignum>'+('0'+(i+1)).slice(-2)+'</div></div>'}).join('')+'</div></section>'},

  services:function(s){return'<section class="services"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
    '<div class="shead wr" data-r1><div><span class="lab">'+esc(s.lab)+'</span><h2>'+esc(s.title)+'</h2></div><p>'+esc(s.text)+'</p></div>'+
    '<div class="sgrid" data-cards>'+(s.cards||[]).map(function(c){return'<div class="scard wr"><h3>'+esc(c.t)+'</h3><p>'+esc(c.d)+'</p></div>'}).join('')+'</div></div></section>'},

  impact:function(s){return'<section class="impact"><div class="wrap">'+
    '<div class="grid"><div class="state wr" data-r1>'+rich(s.statement)+'</div><p class="side wr" data-r1>'+esc(s.side)+'</p></div>'+
    '<div class="statrow" data-cards>'+(s.stats||[]).map(function(x){return'<div class="stat wr"><div class="n">'+esc(x.n)+'</div><div class="l">'+esc(x.l)+'</div></div>'}).join('')+'</div></div></section>'},

  begin:function(s){return'<section class="begin"><div class="wrap"><div class="centerhead wr" data-r1><div class="waves">≈</div><span class="lab">'+esc(s.lab)+'</span><h2 class="serif">'+rich(s.title)+'</h2><p>'+esc(s.text)+'</p></div>'+
    '<div class="bgrid" data-cards>'+(s.cards||[]).map(function(c){return'<div class="bcard'+(c.feature?' feature':'')+' wr"><h3>'+esc(c.t)+'</h3><div class="sub">'+esc(c.sub)+'</div><ul>'+(c.items||[]).map(function(i){return'<li>'+esc(i)+'</li>'}).join('')+'</ul><a class="pill '+(c.feature?'white':'sage')+'" href="'+esc((c.cta||{}).href||'#')+'">'+esc((c.cta||{}).text||'')+' <span class="dot"></span></a></div>'}).join('')+'</div></div></section>'},

  stories:function(s){return'<section class="stories"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+lhead(s)+
    '<div class="tgrid" data-cards>'+(s.cards||[]).map(function(c){return'<div class="tcard'+(c.pull?' pull':'')+' wr"><div class="q">&ldquo;'+rich(c.q)+'&rdquo;</div><div class="who"><div class="nm">'+esc(c.nm)+'</div><div class="rl">'+esc(c.rl)+'</div></div></div>'}).join('')+'</div></div></section>'},

  faq:function(s){return'<section class="faq"><div class="wrap"><div class="grid">'+
    '<div class="left wr" data-r1><h2>'+rich(s.title)+'</h2><p>'+esc(s.text)+'</p></div>'+
    '<div class="wr" data-r1>'+(s.items||[]).map(function(f){return'<div class="fitem" data-faq><div class="qq">'+esc(f.q)+'<span class="tg">+</span></div><div class="ans">'+esc(f.a)+'</div></div>'}).join('')+'</div></div></div></section>'},

  journal:function(s){return'<section class="journal"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+lhead(s)+
    '<div class="jgrid" data-cards>'+(s.posts||[]).map(function(p){return'<article class="jpost wr"><div class="phw">'+ph(p.img,'16:10')+'</div><div class="bd"><span class="lab">'+esc(p.lab)+'</span><h3>'+esc(p.t)+'</h3><p>'+esc(p.d)+'</p><span class="rd">Read →</span></div></article>'}).join('')+'</div></div></section>'},

  speak:function(s){return'<section class="speak"><div class="wrap"><div class="grid">'+
    '<div class="photo wr" data-img>'+ph(s.photo,'4:5')+'</div>'+
    '<div><span class="lab wr" data-r1>'+esc(s.lab)+'</span><h2 class="wr" data-r1>'+esc(s.title)+'</h2><p class="lead wr" data-r1>'+esc(s.text)+'</p>'+
    '<div class="wr" data-r1>'+(s.rows||[]).map(function(r){return'<div class="srow"><span class="yr">'+esc(r.y)+'</span><span><span class="tt">'+esc(r.t)+'</span><br><span class="ww">'+esc(r.w)+'</span></span><span class="tp">'+esc(r.tp)+'</span></div>'}).join('')+'</div></div></div></div></section>'},

  guide:function(s){return'<section class="guide"><div class="wrap"><div class="card wr" data-r1>'+
    '<div class="gtxt"><span class="lab">'+esc(s.lab)+'</span><h3>'+rich(s.title)+'</h3><ul>'+(s.items||[]).map(function(i){return'<li>'+esc(i)+'</li>'}).join('')+'</ul>'+
    '<form onsubmit="return false"><input type="text" placeholder="Your name"><input type="email" placeholder="you@email.com"><button class="pill sage">'+esc(s.submit)+' <span class="dot"></span></button></form>'+
    '<p class="fine">'+esc(s.fine)+'</p></div>'+
    '<div class="gph">'+ph(s.photo,'4:5')+'</div></div></div></section>'},

  finale:function(s){var f=s.footer||{};
    return'<section class="finale"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
    '<div class="wr" data-r1><div class="waves">≈</div><h2 class="serif">'+rich(s.title)+'</h2><p>'+esc(s.text)+'</p>'+
    '<div class="row"><a class="pill sage" href="'+esc((s.cta||{}).href||'#')+'">'+esc((s.cta||{}).text||'')+' <span class="dot"></span></a><span class="tel">'+esc(s.phone||'')+'</span></div></div></div>'+
    '<footer><div class="wrap"><div class="cols">'+
    '<div><div class="flogo"><span class="dot"></span>'+esc(f.logo||'')+'</div><p class="fabout">'+esc(f.about||'')+'</p></div>'+
    (f.cols||[]).map(function(c){return'<div class="col"><div class="h">'+esc(c.h)+'</div>'+(c.links||[]).map(function(l){return'<span>'+esc(l)+'</span>'}).join('')+'</div>'}).join('')+
    '</div><div class="legal">'+(f.legal||[]).map(function(l){return'<span>'+esc(l)+'</span>'}).join('')+'</div></div></footer></section>'}
};

function boot(data){
  if(data.meta){document.title=data.meta.title||document.title;
    if(data.meta.lang)document.documentElement.lang=data.meta.lang;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  document.getElementById('brandLogo').textContent=(data.brand||{}).logo||'';
  var links=((data.nav||{}).links||[]).map(function(l){return'<a href="'+esc(l.href)+'">'+esc(l.text)+'</a>'}).join('');
  var nc=(data.nav||{}).cta;
  document.getElementById('navLinks').innerHTML=links+(nc?'<a class="pill white" href="'+esc(nc.href)+'">'+esc(nc.text)+' <span class="dot"></span></a>':'');

  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('site').innerHTML=html;

  /* faq toggle: cero animación de layout — display swap + fade del contenido */
  document.querySelectorAll('[data-faq]').forEach(function(el){
    el.addEventListener('click',function(){
      var open=el.classList.toggle('open');
      if(open&&MOTION){var a=el.querySelector('.ans');
        gsap.fromTo(a,{opacity:0,y:6},{opacity:1,y:0,duration:.3,ease:'expo.out',clearProps:'transform'})}
    })});

  initMotion();
}

function initMotion(){
  var nav=document.getElementById('nav');
  function onScroll(y){var past=y>innerHeight*.85;
    nav.classList.toggle('scrolled',past);nav.classList.toggle('onhero',!past)}
  if(!MOTION){addEventListener('scroll',function(){onScroll(scrollY)},{passive:true});
    document.querySelectorAll('.ellipse-note svg path').forEach(function(p){p.style.strokeDasharray='none'});
    return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:.8});
  lenis.on('scroll',function(e){ScrollTrigger.update();onScroll(e.scroll)});
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();lenis.scrollTo(t)}});

  /* R2 hero-stagger decreciente */
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[110,75,55][Math.min(i,2)]});

  /* R1 rise por grupo */
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R4 card-settle: stagger decreciente, máx 6 */
  gsap.utils.toArray('[data-cards]').forEach(function(grid){
    var cards=grid.querySelectorAll('.wr');var d=0,steps=[90,70,55,45,40,40];
    cards.forEach(function(c,i){
      gsap.fromTo(c,{opacity:0,y:14,scale:.985},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:d/1000,clearProps:'transform',
        scrollTrigger:{trigger:grid,start:'top 84%',once:true}});
      d+=steps[Math.min(i,5)]})});

  /* R3 ellipse-draw */
  gsap.utils.toArray('[data-ellipse] svg path').forEach(function(p){
    var len=p.getTotalLength();p.style.strokeDasharray=len;p.style.strokeDashoffset=len;
    gsap.to(p,{strokeDashoffset:0,duration:.9,ease:'expo.out',
      scrollTrigger:{trigger:p.closest('[data-ellipse]'),start:'top 82%',once:true}})});

  /* R4 img-settle */
  gsap.utils.toArray('[data-img]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,scale:1.03},{opacity:1,scale:1,duration:.9,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R5 path-scrub: el sendero se dibuja; bignums se encienden por cuartos */
  var trail=document.getElementById('trailPath');
  if(trail&&matchMedia('(min-width:901px)').matches){
    var len=trail.getTotalLength();
    trail.style.strokeDasharray=len;trail.style.strokeDashoffset=len;
    var nums=gsap.utils.toArray('[data-bignum]');
    ScrollTrigger.create({trigger:'#trail',start:'top 65%',end:'bottom 70%',scrub:.6,
      onUpdate:function(self){var p=self.progress;
        trail.style.strokeDashoffset=String(len*(1-p));
        nums.forEach(function(n,i){
          var lo=i/nums.length,hi=(i+1)/nums.length;
          var k=gsap.utils.clamp(0,1,(p-lo)/(hi-lo));
          n.style.opacity=(.18+.82*k).toFixed(3)})}});
  }else if(trail){trail.style.opacity=0;
    gsap.utils.toArray('[data-bignum]').forEach(function(n){n.style.opacity=1})}
}

fetch('/v4-clearpath/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div class="load-error"><p>No se pudo cargar content.json ('+esc(err.message)+').</p></div>'});
})();
</script>
