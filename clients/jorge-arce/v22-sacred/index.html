<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jorge Arce — Sacred Work · Oral &amp; Maxillofacial Surgery</title>
<meta name="description" content="Restoring the most precious function a person has. Twenty-seven years of careful oral & maxillofacial surgery — from Colombia to the South Bay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Figtree:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --forest:#16281B; --forest2:#1B301F; --deep:#101E14; --cream:#F5F0E7; --sand:#E5D3B2;
  --rust:#B4532D; --clay:#B0714A; --tan:#E9DCC0; --green:#2E4A33; --inkc:#2A3A2D;
  --serif:'Playfair Display',Georgia,serif; --mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--forest);color:var(--cream);font-family:'Figtree',system-ui,sans-serif;
  font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--sand);color:var(--forest)}
.wrap{max-width:1240px;margin:0 auto;padding:0 40px}
.mono{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:lowercase}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;justify-content:space-between;
  align-items:center;padding:26px 40px;mix-blend-mode:difference;color:#fff}
.nav .lg{font-family:var(--serif);font-size:19px;letter-spacing:.04em;line-height:1.1;text-align:left}
.nav .lg small{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;opacity:.7;margin-top:3px}
.nav .menu{font-family:var(--mono);font-size:13px;letter-spacing:.06em;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.5);padding-bottom:2px}
/* menu overlay */
.ovl{position:fixed;inset:0;z-index:70;background:var(--deep);display:flex;align-items:center;
  justify-content:center;opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
.ovl.open{opacity:1;visibility:visible}
.ovl .links{text-align:center}
.ovl .links a{display:block;font-family:var(--serif);font-size:clamp(30px,4.6vw,52px);
  padding:12px 0;color:var(--cream);transition:color .3s,letter-spacing .3s}
.ovl .links a:hover{color:var(--sand);letter-spacing:.03em}
.ovl .links .sm{font-family:var(--mono);font-size:12px;color:rgba(245,240,231,.5);margin-top:34px}
.ovl .x{position:absolute;top:26px;right:40px;font-family:var(--mono);font-size:13px;cursor:pointer;
  color:var(--cream);border-bottom:1px solid rgba(245,240,231,.5);padding-bottom:2px}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;padding:100px 20px 90px;
  background:radial-gradient(90% 70% at 50% 30%,#1B301F 0%,var(--forest) 60%,var(--deep) 100%)}
.masked{font-family:var(--serif);font-weight:500;text-transform:uppercase;line-height:.92;
  font-size:clamp(64px,11.4vw,164px);letter-spacing:.01em;
  background-image:url('../img/surgery.jpg');background-size:cover;background-position:center 30%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:brightness(1.5) contrast(1.12) saturate(1.1)}
.hero .tag{font-family:var(--serif);font-style:italic;font-size:clamp(22px,3vw,42px);
  color:#3E5A42;margin-top:26px;letter-spacing:.01em}
.hero .sub{margin-top:18px;font-family:var(--mono);font-size:12px;color:rgba(229,211,178,.75);letter-spacing:.12em}
.hero .scr{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;
  align-items:center;gap:12px;color:var(--sand)}
.hero .scr .mouse{width:15px;height:24px;border:1.5px solid var(--sand);border-radius:9px;position:relative}
.hero .scr .mouse::after{content:"";position:absolute;top:5px;left:50%;width:2px;height:5px;
  background:var(--sand);transform:translateX(-50%);border-radius:2px;}


/* ---------- poetic full-screens ---------- */
.poem{position:relative;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.poem img{position:absolute;inset:-8% 0;width:100%;height:116%;object-fit:cover;filter:brightness(.62) saturate(.9)}
.poem .line{position:relative;z-index:2;font-family:var(--serif);font-weight:400;
  font-size:clamp(26px,3.6vw,50px);color:var(--cream);text-align:center;padding:0 20px;max-width:900px}
.poem .who{position:absolute;bottom:34px;left:0;right:0;text-align:center;z-index:2;
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:rgba(245,240,231,.65)}

/* ---------- cream intro ---------- */
.intro{background:var(--cream);color:var(--inkc);padding:170px 0 150px;text-align:center}
.intro .lede{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.3vw,46px);
  line-height:1.38;max-width:980px;margin:0 auto}
.intro .lede em{font-style:italic;color:var(--green)}
.intro .lede .rust{font-style:italic;color:var(--rust)}
.intro .foot{margin-top:44px;font-family:var(--mono);font-size:11.5px;color:#8B8272;letter-spacing:.06em}
.intro .cols{display:grid;grid-template-columns:1fr 1fr;gap:70px;margin:90px auto 0;max-width:900px;text-align:left}
.intro .cols p{font-size:15.5px;line-height:1.75;color:#4A564C}
.intro .cols p strong{color:var(--inkc);font-weight:500}

/* ---------- map scrollytelling ---------- */
.mapscroll{background:var(--cream);color:var(--inkc);position:relative}
.mapscroll .steps{position:relative}
.mapstep{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;
  max-width:1240px;margin:0 auto;padding:60px 40px}
.mapstep .tx h3{font-family:var(--serif);font-weight:500;font-size:clamp(26px,2.9vw,40px);line-height:1.25}
.mapstep .tx h3 .g{color:var(--green)}
.mapstep .tx h3 .r{color:var(--clay)}
.mapstep .tx h3 em{font-style:italic}
.mapstep .tx .fn{margin-top:60px;font-family:var(--mono);font-size:10.5px;color:#8B8272}
.mapfig{position:relative}
.mapfig svg{width:100%;height:auto;display:block}
.steplist{margin-top:34px;display:flex;flex-direction:column;gap:14px}
.steprow{display:flex;align-items:flex-start;gap:14px}
.steprow .pill{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;border:1px solid rgba(42,58,45,.35);
  border-radius:99px;padding:6px 13px;color:var(--inkc)}
.steprow p{font-size:14.5px;line-height:1.55;color:#4A564C;padding-top:5px}
.maplink{display:inline-block;margin-top:36px;font-size:14px;color:var(--inkc);
  border-bottom:1px solid rgba(42,58,45,.4);padding-bottom:2px;transition:color .3s,border-color .3s}
.maplink:hover{color:var(--rust);border-color:var(--rust)}
.partners{margin-top:44px}
.partners .t{font-family:var(--mono);font-size:10.5px;color:#8B8272;margin-bottom:16px}
.partners .row{display:flex;gap:18px;align-items:center}
.pbadge{border:1px solid rgba(42,58,45,.3);padding:12px 16px;font-family:var(--mono);
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--inkc);text-align:center;line-height:1.7}

/* ---------- record ---------- */
.record{background:var(--deep);padding:150px 0}
.record .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:60px;text-align:center}
.record .n{font-family:var(--serif);font-weight:400;font-size:clamp(48px,6vw,84px);color:var(--sand)}
.record .n em{font-style:italic;font-size:.55em}
.record .l{margin-top:14px;font-size:14px;color:rgba(245,240,231,.6);line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto}

/* ---------- voices ---------- */
.voices{background:var(--cream);color:var(--inkc);padding:150px 0}
.voices .q{max-width:840px;margin:0 auto;text-align:center;padding:64px 0;border-top:1px solid rgba(42,58,45,.16)}
.voices .q:first-child{border-top:0;padding-top:0}
.voices .q p{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(21px,2.5vw,32px);line-height:1.45}
.voices .q .who{margin-top:24px;font-family:var(--mono);font-size:12px;color:var(--rust)}

/* ---------- contact band ---------- */
.band{position:relative;height:72vh;min-height:440px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.band img{position:absolute;inset:-8% 0;width:100%;height:116%;object-fit:cover;filter:brightness(.6) saturate(.92)}
.band .pill-cta{position:relative;z-index:2;font-family:var(--mono);font-size:13px;color:var(--cream);
  border:1.5px solid var(--cream);border-radius:99px;padding:16px 34px;transition:background .3s,color .3s}
.band .pill-cta:hover{background:var(--cream);color:var(--forest)}

/* ---------- footer ---------- */
.foot{background:var(--cream);color:var(--inkc);padding:90px 0 60px;position:relative;overflow:hidden}
.foot .grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1.2fr;gap:44px;position:relative;z-index:2}
.foot .mission{font-size:16px;line-height:1.6;color:#4A564C;max-width:280px}
.foot .h{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:#8B8272;margin-bottom:18px;text-transform:capitalize}
.foot a,.foot .col span{display:block;font-size:14px;color:#4A564C;line-height:2.2}
.foot .col a:hover{color:var(--rust)}
.foot .lgf{margin-top:80px;font-family:var(--serif);font-size:22px;letter-spacing:.04em;position:relative;z-index:2}
.foot .lgf small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:#8B8272;margin-top:4px}
.foot .critter{position:absolute;z-index:1;opacity:.85}
.foot .critter.frog{left:26%;bottom:40px;width:70px;transform:rotate(14deg)}
.foot .critter.leafy{right:8%;bottom:-30px;width:110px;transform:rotate(-8deg);opacity:.5}

/* ---------- reveals ---------- */
[data-hero]{opacity:0;transform:translateY(26px);}
[data-hero="2"]{animation-delay:.2s}
[data-hero="3"]{animation-delay:.45s}



/* ---------- mobile ---------- */
@media (max-width:900px){
  .wrap{padding:0 22px}
  .nav{padding:20px 22px}
  .intro .cols{grid-template-columns:1fr;gap:34px}
  .mapstep{grid-template-columns:1fr;gap:40px;padding:70px 22px}
  .record .grid{grid-template-columns:1fr;gap:44px}
  .foot .grid{grid-template-columns:1fr 1fr;gap:34px}
  .intro{padding:110px 0 90px}
  .record,.voices{padding:100px 0}
}

.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--green,#2E4A33);outline-offset:3px}
.mapfig svg>*{will-change:opacity}
html:not(.no-motion) .mapfig[data-chart] svg>*{opacity:0}
.poem,.band{overflow:hidden}
.phx{display:flex;align-items:center;justify-content:center;background:#1a2b1e;color:rgba(233,230,220,.5);font-family:var(--mono,ui-monospace);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.poem .phx{position:absolute;inset:0}
.band .phx{position:absolute;inset:0}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#8B8272;font-size:14px}
</style></head>

\"#4A564C\" stroke-width=\"1\" fill=\"none\" opacity=\".6\"/>\n        <text x=\"60\" y=\"70\" font-family=\"'Space Mono',monospace\" font-size=\"11\" fill=\"#4A564C\" letter-spacing=\"2\">THE CASE \u2014 RESTORED</text>\n      </svg>", "frog": "<svg class=\"critter frog\" viewBox=\"0 0 60 60\" fill=\"none\" aria-hidden=\"true\">\n    <path d=\"M30 14 q7 -8 12 -2 q4 5 -2 10 q8 2 8 10 q0 9 -9 10 q2 7 -4 9 q-6 2 -8 -5 q-2 7 -8 5 q-6 -2 -4 -9 q-9 -1 -9 -10 q0 -8 8 -10 q-6 -5 -2 -10 q5 -6 12 2 Z\" stroke=\"#2A3A2D\" stroke-width=\"1.6\"/>\n    <circle cx=\"24\" cy=\"26\" r=\"1.8\" fill=\"#2A3A2D\"/><circle cx=\"36\" cy=\"26\" r=\"1.8\" fill=\"#2A3A2D\"/>\n    <circle cx=\"22\" cy=\"38\" r=\"1.2\" fill=\"#2A3A2D\"/><circle cx=\"30\" cy=\"41\" r=\"1.2\" fill=\"#2A3A2D\"/><circle cx=\"38\" cy=\"38\" r=\"1.2\" fill=\"#2A3A2D\"/>\n  </svg>", "leafy": "<svg class=\"critter leafy\" viewBox=\"0 0 100 100\" fill=\"none\" aria-hidden=\"true\">\n    <path d=\"M50 90 Q46 60 50 30 Q54 14 50 6\" stroke=\"#B4532D\" stroke-width=\"1.6\"/>\n    <path d=\"M50 66 q-18 -4 -22 -20 q16 -2 22 12 M50 48 q18 -4 22 -20 q-16 -2 -22 12 M50 30 q-14 -4 -16 -16 q12 -1 16 8\" stroke=\"#B4532D\" stroke-width=\"1.4\"/>\n  </svg>"};

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;g&gt;/g,'<span class="g">').replace(/&lt;\/g&gt;/g,'</span>')
  .replace(/&lt;r&gt;/g,'<span class="r">').replace(/&lt;\/r&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt,attrs){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'"'+(attrs||'')+'>';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<header class="hero" id="top" data-r2>'+
  '<h1><span class="wr">'+esc(s.l1)+'</span> <span class="wr">'+esc(s.l2)+'</span></h1>'+
  '<div class="t2 wr">'+esc(s.title)+'</div>'+
  '<div class="sub wr">'+esc(s.sub)+'</div>'+
  '<div class="scr wr"><div class="mouse"></div>'+esc(s.scr)+'</div>'+
  '</header>'},
poems:function(s){
  return(s.items||[]).map(function(p){
    return'<section class="poem"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+img(p.img,'',' data-plx')+
    '<p class="line wr" data-r1>'+esc(p.line)+'</p>'+
    '<div class="who">'+esc(p.who)+'</div></section>'}).join('')},
intro:function(s){
  return'<section class="intro"><div class="wrap" data-r2>'+
  '<p class="big wr">'+rich(s.big)+'</p>'+
  '<div class="fn wr">'+esc(s.fn)+'</div>'+
  '<div class="cols wr">'+(s.cols||[]).map(function(p){return'<p>'+rich(p)+'</p>'}).join('')+'</div>'+
  '</div></section>'},
mapscroll:function(s){
  return'<section class="mapscroll"><div class="steps">'+
  (s.steps||[]).map(function(st){
    return'<div class="mapstep"><div class="tx" data-r2>'+
    '<h3 class="wr">'+rich(st.title)+'</h3>'+
    (st.fn?'<div class="fn wr">'+esc(st.fn)+'</div>':'')+
    (st.steps?'<div class="steplist wr">'+st.steps.map(function(x){return'<div class="steprow"><span class="pill">'+esc(x.pill)+'</span><p>'+rich(x.p)+'</p></div>'}).join('')+'</div>':'')+
    (st.partners?'<div class="partners wr"><div class="t">'+esc(st.partners.t)+'</div><div class="row">'+st.partners.badges.map(function(bd){return'<div class="pbadge">'+rich(bd)+'</div>'}).join('')+'</div></div>':'')+
    (st.link?'<a class="maplink wr" href="'+esc(st.link.h)+'">'+esc(st.link.t)+'</a>':'')+
    '</div>'+
    '<div class="mapfig" data-chart>'+(ART[st.map]||'')+'</div>'+
    '</div>'}).join('')+
  '</div></section>'},
record:function(s){
  return'<section class="record"><div class="wrap"><div class="inr" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="wr"><div class="n">'+esc(cl.n)+(cl.u?' <span>'+esc(cl.u)+'</span>':'')+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
voices:function(s){
  return'<section class="voices"><div class="wrap">'+
  (s.cards||[]).map(function(v){return'<div class="wr" data-r1 style="margin-bottom:40px"><p class="q" style="opacity:1">'+esc(v.q)+'</p><div class="who">'+esc(v.who)+'</div></div>'}).join('')+
  '</div></section>'},
band:function(s){
  return'<section class="band">'+img(s.img,'',' data-plx')+
  '<a class="pill-cta" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a></section>'},
foot:function(s){
  return'<footer class="foot"><div class="wrap"><div class="grid">'+
  '<div class="mission">'+rich(s.mission)+'</div>'+
  (s.cols||[]).map(function(col){return'<div class="col"><div class="h">'+esc(col.h)+'</div>'+
    (col.items||[]).map(function(it){return it.h?'<a href="'+esc(it.h)+'">'+esc(it.t)+'</a>':'<span>'+esc(it.t)+'</span>'}).join('')+'</div>'}).join('')+
  '</div>'+
  '<svg class="critter frog" viewBox="0 0 60 60" fill="none" aria-hidden="true">'+(ART.frog||'').replace(/^<svg[^>]*>|<\/svg>$/g,'')+'</svg>'+
  '<svg class="critter leafy" viewBox="0 0 100 100" fill="none" aria-hidden="true">'+(ART.leafy||'').replace(/^<svg[^>]*>|<\/svg>$/g,'')+'</svg>'+
  '<div class="legal">'+esc(s.legal)+'</div>'+
  '</div></footer>'}
};

fetch('/v22-sacred/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('ntag').textContent=c.nav.tag||'';
    document.getElementById('menuBtn').textContent=c.nav.menu||'menu'}
  if(c.overlay){document.getElementById('ovlin').innerHTML=
    (c.overlay.links||[]).map(function(l){return'<a href="'+esc(l.h)+'">'+esc(l.t)+'</a>'}).join('')+
    '<div class="fine">'+esc(c.overlay.fine)+'</div>'}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  var ovl=document.getElementById('ovl');
  document.getElementById('menuBtn').addEventListener('click',function(){ovl.classList.add('open')});
  document.getElementById('menuX').addEventListener('click',function(){ovl.classList.remove('open')});
  ovl.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){ovl.classList.remove('open')})});

  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({lerp:.25});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* parallax de poemas/banda al ticker */
  document.querySelectorAll('[data-plx]').forEach(function(im){
    var sec=im.parentElement;
    ScrollTrigger.create({trigger:sec,start:'top bottom',end:'bottom top',scrub:.4,
      onUpdate:function(self){im.style.transform='translateY('+((self.progress-.5)*60)+'px) scale(1.12)'}});
  });

  /* R5 cartografia por capas: cada mapa se dibuja capa a capa con el scrub */
  document.querySelectorAll('[data-chart]').forEach(function(fig){
    var svg=fig.querySelector('svg');
    if(!svg)return;
    var layers=Array.prototype.slice.call(svg.children);
    var n=layers.length;
    if(!n)return;
    ScrollTrigger.create({trigger:fig.closest('.mapstep'),start:'top 75%',end:'center 40%',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        layers.forEach(function(ly,j){
          var k=Math.max(0,Math.min(1,p*n-j));
          ly.style.opacity=k;
        })}});
  });
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
