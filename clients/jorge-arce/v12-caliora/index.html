<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · v12 Caliora</title>
<meta name="description" content="Board-certified oral & maxillofacial surgeon. Twenty-seven years between Colombia and California on the reconstructions other surgeons refer out.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(96px,13vh,152px);

  --cream:#F4F1F0;
  --taupe:#D8D0CA;
  --taupe2:#CDC2BB;
  --mocha:#8F7868;
  --tan:#B1A095;
  --espresso:#151210;
  --ink2:#2B241F;
  --navy:#0A2038;
  --navy2:#122C48;
  --white:#FFFFFF;
  --r:18px;
  --r-lg:26px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{
  background:var(--cream);color:var(--espresso);
  font-family:'Geist',sans-serif;font-weight:400;
  font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--mocha);color:#fff}
.wrap{max-width:1360px;margin:0 auto;padding:0 40px}
.mono{font-family:'Geist Mono',monospace;font-size:12px;font-weight:400;letter-spacing:.08em;text-transform:uppercase}

/* ---------- buttons ---------- */
.pill{display:inline-flex;align-items:center;gap:10px;border-radius:100px;padding:14px 26px;font-size:15px;font-weight:500;cursor:pointer;border:none;transition:transform var(--dur-hover) var(--ease-quick),background var(--dur-hover) var(--ease-quick)}
.pill.cream{background:var(--cream);color:var(--espresso)}
.pill.cream:hover{background:#fff;transform:translateY(-2px)}
.pill.dark{background:var(--espresso);color:var(--cream)}
.pill.dark:hover{background:var(--ink2);transform:translateY(-2px)}
.pill.mocha{background:var(--mocha);color:#fff}
.pill.mocha:hover{background:#7C6758;transform:translateY(-2px)}
.pill .ar{display:inline-flex;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.12);align-items:center;justify-content:center;font-size:12px;transition:transform .3s}
.pill:hover .ar{transform:translate(2px,-2px)}

/* ---------- hero (photo card in cream frame) ---------- */
.hero{padding:14px}
.herocard{
  position:relative;border-radius:var(--r-lg);overflow:hidden;
  min-height:calc(100vh - 28px);display:flex;flex-direction:column;justify-content:space-between;
}
.herocard .ph{position:absolute;inset:0}
.herocard .ph img{width:100%;height:100%;object-fit:cover;object-position:50% 24%;filter:sepia(.14) contrast(1.02)}
.herocard .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(21,18,16,.42) 0%,rgba(21,18,16,.05) 40%,rgba(21,18,16,.6) 100%)}
.hnav{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center;padding:26px 34px;color:#fff}
.hnav .brand{display:flex;align-items:center;gap:12px}
.hnav .brand svg{width:34px;height:34px}
.hnav .brand .t1{font-size:19px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.hnav .brand .t2{font-size:12px;color:rgba(255,255,255,.75)}
.hnav .navpills{display:flex;gap:10px}
.hnav .np{display:inline-flex;align-items:center;gap:10px;background:rgba(244,241,240,.14);border:1px solid rgba(244,241,240,.22);backdrop-filter:blur(10px);border-radius:100px;padding:11px 20px;font-size:13.5px;font-weight:500;color:#fff;transition:background var(--dur-hover) var(--ease-quick)}
.hnav .np:hover{background:rgba(244,241,240,.26)}
.hnav .np .chev{width:18px;height:18px;border-radius:50%;background:rgba(244,241,240,.25);display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.hnav .menu{display:inline-flex;align-items:center;gap:10px;background:var(--cream);color:var(--espresso);border-radius:14px;padding:13px 20px;font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.hnav .menu .bars{display:flex;flex-direction:column;gap:4px}
.hnav .menu .bars i{width:18px;height:1.6px;background:var(--espresso)}
.herobot{position:relative;z-index:3;display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:end;padding:0 34px 34px;color:#fff}
.herobot h1{font-weight:500;letter-spacing:-.025em;line-height:1;font-size:clamp(52px,6vw,86px);max-width:12ch}
.trust{display:flex;align-items:center;gap:16px;margin-top:26px}
.trust .avs{display:flex}
.trust .avs span{width:44px;height:44px;border-radius:50%;border:2px solid rgba(244,241,240,.9);margin-left:-10px;overflow:hidden;background:var(--mocha);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:12px}
.trust .avs span:first-child{margin-left:0}
.trust .avs img{width:100%;height:100%;object-fit:cover}
.trust .mono{color:rgba(255,255,255,.85);line-height:1.5}
.herobot .right{display:flex;flex-direction:column;align-items:flex-end;gap:22px;text-align:right}
.herobot .right p{font-size:17px;color:rgba(255,255,255,.92);max-width:38ch}
.herobot .ctas{display:flex;gap:12px;align-items:center}
.circ{width:52px;height:52px;border-radius:50%;border:1px solid rgba(244,241,240,.5);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:17px;transition:background var(--dur-hover) var(--ease-quick)}
.circ:hover{background:rgba(244,241,240,.15)}

/* ---------- sections ---------- */
section{padding:120px 0}
.shead{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;margin-bottom:64px}
.shead h2{font-weight:500;letter-spacing:-.02em;font-size:clamp(28px,3vw,40px)}
.shead .sub{color:var(--mocha);max-width:52ch;font-size:15.5px}

/* ---------- treatments ---------- */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:56px 32px}
.tcard{display:flex;flex-direction:column}
.tcard .phwrap{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:16/10}
.tcard .phwrap img{width:100%;height:100%;object-fit:cover;filter:sepia(.14) contrast(1.02);transition:transform .8s var(--ease-out)}
.tcard:hover .phwrap img{transform:scale(1.04)}
.tcard .tag{position:absolute;top:14px;left:14px;background:rgba(21,18,16,.78);backdrop-filter:blur(6px);color:var(--cream);border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:500}
.tcard .strip{position:absolute;left:0;right:0;bottom:0;display:flex;gap:36px;padding:14px 20px;background:linear-gradient(180deg,rgba(21,18,16,0),rgba(21,18,16,.72));color:var(--cream)}
.tcard .strip .c .k{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,241,240,.75)}
.tcard .strip .c .v{font-family:'Geist Mono',monospace;font-size:13px;margin-top:3px}
.tcard h3{font-weight:500;letter-spacing:-.015em;font-size:26px;margin:24px 0 10px}
.tcard p{color:var(--ink2);opacity:.75;font-size:15px;max-width:56ch}
.tcard .go{margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:var(--taupe);border-radius:100px;padding:10px 18px;font-size:13.5px;font-weight:500;align-self:flex-start;transition:background var(--dur-hover) var(--ease-quick)}
.tcard:hover .go{background:var(--taupe2)}
.tcard .go .ar{width:20px;height:20px;border-radius:50%;background:rgba(21,18,16,.12);display:inline-flex;align-items:center;justify-content:center;font-size:11px}

/* ---------- statement ---------- */
.statement{background:var(--taupe);border-radius:var(--r-lg);margin:0 14px;padding:130px 0}
.statement h2{font-weight:500;letter-spacing:-.03em;line-height:1.14;font-size:clamp(34px,4.4vw,65px);max-width:22ch}
.statement .dim{color:var(--mocha)}
.statement .lead{margin-top:28px;color:var(--ink2);opacity:.8;max-width:52ch;font-size:16.5px}

/* ---------- navy stats ---------- */
.stats{background:var(--navy);border-radius:var(--r-lg);margin:0 14px;color:var(--cream);padding:110px 0}
.stats .lay{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.stats .photos{display:flex;flex-direction:column;gap:22px}
.stats .photos img{border-radius:var(--r);width:100%;object-fit:cover;max-height:400px;filter:sepia(.1)}
.statrow{display:flex;flex-direction:column;gap:22px}
.scard{background:var(--navy2);border-radius:var(--r);padding:26px 30px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end}
.scard .glyph{width:34px;height:34px;opacity:.85}
.scard .cap{font-size:16px;margin-top:44px}
.scard .box{background:rgba(244,241,240,.06);border-radius:14px;padding:22px 26px;text-align:right;min-width:190px}
.scard .box .k{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,240,.65)}
.scard .box .n{font-weight:200;font-size:clamp(34px,3.4vw,48px);letter-spacing:-.01em;line-height:1.1;margin-top:8px}

/* ---------- voices ---------- */
.voices{padding-bottom:60px}
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.vcard{background:#fff;border-radius:var(--r);padding:32px 30px;display:flex;flex-direction:column;gap:20px;box-shadow:0 1px 10px rgba(21,18,16,.04);transition:transform .35s var(--ease-quick)}
.vcard:hover{transform:translateY(-4px)}
.vcard .rolet{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mocha)}
.vcard.navy .rolet{color:var(--tan,#CDC2BB)}
.vcard .q{font-size:15px;line-height:1.65;color:var(--ink2)}
.vcard .who{margin-top:auto;display:flex;align-items:center;gap:12px}
.vcard .av{width:40px;height:40px;border-radius:50%;background:var(--taupe);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:11px;flex:0 0 40px}
.vcard .nm{font-size:14px;font-weight:500}
.vcard .rl{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mocha);margin-top:2px}
.vcard.navy{background:var(--navy);color:var(--cream)}
.vcard.navy .q{color:rgba(244,241,240,.92);font-size:17px}
.vcard.navy .rl{color:var(--tan)}
.vcard.navy .av{background:var(--navy2)}

/* ---------- blog ---------- */
.blog{background:var(--taupe);border-radius:var(--r-lg);margin:0 14px;padding:110px 0}
.blog h2{font-weight:500;letter-spacing:-.02em;font-size:clamp(26px,2.6vw,34px);margin-bottom:52px}
.blog .lay{display:grid;grid-template-columns:1.15fr 1fr;gap:32px;align-items:start}
.feature{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:4/3.4}
.feature img{width:100%;height:100%;object-fit:cover;filter:sepia(.12)}
.feature .plate{position:absolute;left:0;bottom:0;background:var(--cream);border-radius:0 var(--r) 0 0;padding:26px 30px;max-width:78%}
.feature .plate h3{font-weight:500;letter-spacing:-.015em;font-size:24px;line-height:1.2}
.feature .plate .meta{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mocha);margin-top:12px;line-height:1.8}
.rows{display:flex;flex-direction:column;gap:16px}
.rowcard{display:grid;grid-template-columns:120px 1fr;gap:18px;background:var(--cream);border-radius:14px;overflow:hidden;transition:transform .35s}
.rowcard:hover{transform:translateX(6px)}
.rowcard img{width:120px;height:100%;min-height:96px;object-fit:cover;filter:sepia(.12)}
.rowcard .bd{padding:16px 18px 16px 0}
.rowcard h4{font-weight:500;font-size:16.5px;letter-spacing:-.01em;line-height:1.3}
.rowcard .cat{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mocha);margin-top:8px}

/* ---------- guide / booking ---------- */
.book .card{background:#fff;border-radius:var(--r-lg);display:grid;grid-template-columns:1.1fr 1fr;overflow:hidden;box-shadow:0 2px 24px rgba(21,18,16,.05)}
.book .form{padding:56px 54px}
.book h2{font-weight:500;letter-spacing:-.02em;font-size:clamp(26px,2.8vw,36px);margin-bottom:8px}
.book .sub{color:var(--mocha);font-size:15px;margin-bottom:30px}
.book input,.book textarea{width:100%;border:1px solid rgba(21,18,16,.1);border-radius:12px;background:var(--cream);padding:15px 16px;font-family:'Geist',sans-serif;font-size:14.5px;outline:none;resize:none;margin-bottom:12px}
.book input:focus,.book textarea:focus{border-color:var(--mocha)}
.book .fine{font-size:11.5px;color:var(--mocha);margin-top:10px}
.book .ph{position:relative;min-height:460px}
.book .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:sepia(.12)}
.book .featlist{margin:0 0 26px;display:flex;flex-direction:column;gap:10px}
.book .featlist div{display:flex;gap:10px;font-size:14.5px;color:var(--ink2)}
.book .featlist span{color:var(--mocha)}

/* ---------- footer ---------- */
footer{background:var(--navy);border-radius:var(--r-lg) var(--r-lg) 0 0;margin:60px 14px 0;color:var(--cream);padding:90px 0 30px}
.fgrid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:44px;padding-bottom:70px}
.fb .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.fb .brand svg{width:30px;height:30px}
.fb .t1{font-size:18px;font-weight:600}
.fb p{font-size:14px;color:rgba(244,241,240,.7);max-width:30ch}
.fcol .h{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--tan);margin-bottom:16px}
.fcol a{display:block;padding:4px 0;font-size:14.5px;color:rgba(244,241,240,.85)}
.fcol a:hover{color:#fff}
.fbot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid rgba(244,241,240,.12);padding-top:24px;font-size:12.5px;color:rgba(244,241,240,.6)}

/* ---------- reveals ---------- */

@media (max-width:860px){
  .wrap{padding:0 22px}
  section{padding:90px 0}
  .hnav .navpills{display:none}
  .herobot{grid-template-columns:1fr;gap:26px;padding:0 22px 26px}
  .herobot .right{align-items:flex-start;text-align:left}
  .heroinner{padding:0 22px}
  .vgrid{grid-template-columns:1fr}
  .book .card{grid-template-columns:1fr}
  .book .ph{min-height:280px;order:-1}
  .book .form{padding:36px 26px}
  .fgrid{grid-template-columns:1fr 1fr}
  .scard{grid-template-columns:1fr}
  .scard .box{text-align:left}
  .statement,.stats,.blog,footer{margin:0 8px}
}

/* ---------- rework: baraja sticky + placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--espresso,#2B241F);outline-offset:3px}
.pill:active,.np:active{transform:scale(.97)}
.phx{display:flex;align-items:center;justify-content:center;background:#e6e0db;color:#8F7868;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#8F7868;font-size:14px}
@media(min-width:901px){
  html:not(.no-motion) .tgrid{display:flex;flex-direction:column;gap:36px;padding-bottom:6vh}
  html:not(.no-motion) .tcard{position:sticky;background:#fff;border-radius:var(--r-lg);padding:26px;display:grid;grid-template-columns:.95fr 1.05fr;gap:6px 36px;box-shadow:0 12px 48px rgba(21,18,16,.09);align-content:start;will-change:transform}
  html:not(.no-motion) .tcard .phwrap{grid-row:1/6;align-self:stretch;aspect-ratio:auto;min-height:340px}
  html:not(.no-motion) .tcard .phwrap img,html:not(.no-motion) .tcard .phwrap .phx{height:100%}
  html:not(.no-motion) .tcard h3{margin-top:18px}
  html:not(.no-motion) .tcard .go{justify-self:start}
}
</style></head>
<body>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');
var BRAND='<svg viewBox="0 0 34 34" fill="none"><g stroke="#F4F1F0" stroke-width="1.4"><path d="M17 17 L17 3"/><path d="M17 17 L27 7"/><path d="M17 17 L31 13"/><path d="M17 17 L31 21"/><path d="M17 17 L27 27"/><path d="M17 17 L7 27"/><path d="M17 17 L3 21"/><path d="M17 17 L3 13"/><path d="M17 17 L7 7"/></g></svg>';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>')
  .replace(/&lt;d&gt;/g,'<span class="dim">').replace(/&lt;\/d&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx" style="width:100%;height:100%;min-height:200px">'+esc((im&&im.label)||'FOTO')+'</div>'}
var ROLE={patient:'Patient story',doctor:'Referring doctor',family:'Family of patient'};

var partials={
hero:function(s){
  return'<header class="hero"><div class="herocard">'+
  '<div class="ph">'+img(s.img)+'</div><div class="shade"></div>'+
  '<div class="hnav">'+
    '<div class="brand">'+BRAND+'<div><div class="t1">'+esc(s.brand.t1)+'</div><div class="t2">'+esc(s.brand.t2)+'</div></div></div>'+
    '<div class="navpills">'+(s.pills||[]).map(function(p){return'<a class="np" href="'+esc(p.h)+'">'+esc(p.t)+' <span class="chev">▾</span></a>'}).join('')+'</div>'+
    '<a class="menu" href="'+esc(s.menu.h)+'"><span class="bars"><i></i><i></i></span> '+esc(s.menu.t)+'</a>'+
  '</div>'+
  '<div class="herobot"><div data-r2 class="wr">'+
    '<h1>'+rich(s.h1)+'</h1>'+
    '<div class="trust"><div class="avs">'+
      (s.avs||[]).map(function(a){return'<span>'+img(a)+'</span>'}).join('')+
      '<span>'+esc(s.badge||'')+'</span></div>'+
    '<div class="mono">'+rich(s.trust)+'</div></div>'+
  '</div>'+
  '<div class="right wr" data-r1>'+
    '<p>'+rich(s.lead)+'</p>'+
    '<div class="ctas"><a class="circ" href="'+esc(s.ctas.circ)+'" aria-label="Scroll down">↓</a>'+
    '<a class="pill cream" href="'+esc(s.ctas.pill.h)+'">'+esc(s.ctas.pill.t)+' <span class="ar">↗</span></a></div>'+
  '</div></div>'+
  '</div></header>'},
treatments:function(s){
  return'<section id="'+esc(s.id||'treatments')+'"><div class="wrap">'+
  '<div class="shead" data-r2><h2 class="wr">'+esc(s.head)+'</h2><p class="sub wr">'+rich(s.sub)+'</p></div>'+
  '<div class="tgrid" id="tgrid">'+(s.cards||[]).map(function(c){return'<div class="tcard wr">'+
    '<div class="phwrap">'+img(c.img)+'<span class="tag">'+esc(c.tag)+'</span>'+
    '<div class="strip">'+(c.meta||[]).map(function(m){return'<div class="c"><div class="k">'+esc(m.k)+'</div><div class="v">'+esc(m.v)+'</div></div>'}).join('')+'</div></div>'+
    '<h3>'+esc(c.title)+'</h3><p>'+rich(c.body)+'</p>'+
    '<a class="go" href="#book">Treatment <span class="ar">↗</span></a>'+
  '</div>'}).join('')+'</div>'+
  '</div></section>'},
statement:function(s){
  return'<section class="statement"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap" data-r2>'+
  '<h2 class="wr">'+rich(s.title)+'</h2><p class="lead wr">'+rich(s.lead)+'</p>'+
  '</div></section>'},
stats:function(s){
  return'<section class="stats"><div class="wrap"><div class="lay">'+
  '<div class="photos wr" data-r4>'+(s.photos||[]).map(function(p){return img(p)}).join('')+'</div>'+
  '<div class="statrow" data-cards>'+(s.scards||[]).map(function(sc){return'<div class="scard wr">'+
    '<div><div class="cap">'+esc(sc.cap)+'</div></div>'+
    '<div class="box"><div class="k">'+esc(sc.k)+'</div><div class="n">'+esc(sc.v)+'</div></div>'+
  '</div>'}).join('')+'</div>'+
  '</div></div></section>'},
voices:function(s){
  return'<section class="voices"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<div class="shead" data-r2><h2 class="wr">'+esc(s.head)+'</h2><p class="sub wr">'+rich(s.sub)+'</p></div>'+
  '<div class="vgrid" data-cards>'+(s.cards||[]).map(function(v){return'<div class="vcard'+(v.navy?' navy':'')+' wr">'+
    '<div class="rolet">'+esc(ROLE[v.role]||'Patient story')+'</div>'+
    '<p class="q">'+esc(v.q)+'</p>'+
    '<div class="who"><span class="av">'+esc(v.init)+'</span><div><div class="nm">'+esc(v.n)+'</div><div class="rl">'+esc(v.r)+'</div></div></div>'+
  '</div>'}).join('')+'</div>'+
  '</div></section>'},
blog:function(s){
  return'<section class="blog"><div class="wrap">'+
  '<h2 class="wr" data-r1>'+esc(s.head)+'</h2>'+
  '<div class="lay">'+
  '<div class="feature wr" data-r4>'+img(s.feature.img)+
    '<div class="plate"><h3>'+esc(s.feature.title)+'</h3><div class="meta">'+esc(s.feature.meta)+'</div></div></div>'+
  '<div class="rows">'+(s.rows||[]).map(function(r){return'<a class="rowcard wr" data-r1 data-rule href="#book"><span>'+esc(r.t)+'</span><span class="cat">'+esc(r.cat)+'</span></a>'}).join('')+'</div>'+
  '</div></div></section>'},
book:function(s){
  var f=s.form||{};
  return'<section class="book"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap"><div class="card wr" data-r4>'+
  '<div class="form"><h2>'+esc(s.head)+'</h2><p class="sub">'+rich(s.sub)+'</p>'+
  '<div class="featlist">'+(s.points||[]).map(function(t){return'<div>✓ '+esc(t)+'</div>'}).join('')+'</div>'+
  '<form onsubmit="return false">'+(f.fields||[]).map(function(n){return'<input type="text" placeholder="'+esc(n)+'" aria-label="'+esc(n)+'">'}).join('')+
  '<button class="pill dark" type="submit">'+esc(f.btn||'Send')+'</button></form>'+
  '<p class="fine">'+esc(s.fine)+'</p></div>'+
  '<div class="bd">'+img(s.img)+'</div>'+
  '</div></div></section>'},
footer:function(s){
  return'<footer><div class="wrap"><div class="fgrid">'+
  '<div class="fb"><div class="brand">'+BRAND+'<span class="t1">'+esc(s.brand.t1)+'</span></div><p>'+rich(s.brand.p)+'</p></div>'+
  (s.cols||[]).map(function(col){return'<div class="fcol"><div class="h">'+esc(col.h)+'</div>'+(col.items||[]).map(function(it){return'<div>'+esc(it)+'</div>'}).join('')+'</div>'}).join('')+
  '</div><div class="fbot">'+(s.fbot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div></div></footer>'}
};

fetch('/v12-caliora/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({lerp:.25});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.classList.contains('wr')?[g]:g.querySelectorAll('.wr');var acc=0;
    Array.prototype.forEach.call(kids,function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.position='relative';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:0;height:1px;background:rgba(21,18,16,.1);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* tcards: fade sin transform (la baraja es dueña del transform) */
  document.querySelectorAll('#tgrid .tcard').forEach(function(el){
    gsap.fromTo(el,{opacity:0},{opacity:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 90%',once:true}});
  });

  /* R5 baraja de tratamientos (desktop) */
  if(window.innerWidth>900){
    var cards=Array.prototype.slice.call(document.querySelectorAll('#tgrid .tcard'));
    cards.forEach(function(c,i){
      c.style.top=(96+i*26)+'px';
      c.style.zIndex=String(10+i);
    });
    cards.forEach(function(c,i){
      if(i>=cards.length-1)return;
      var next=cards[i+1];
      ScrollTrigger.create({trigger:next,start:'top bottom',end:'top '+(96+i*26+40)+'px',scrub:.4,
        onUpdate:function(self){var k=self.progress;
          c.style.transform='scale('+(1-.045*k)+')';
          c.style.filter='brightness('+(1-.1*k)+')';
        }});
    });
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
