<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arce — Genesis · Every Restoration Is a Beginning</title>
<meta name="description" content="Dr. Jorge Arce, board-certified oral & maxillofacial surgeon. Twenty-seven years of restorations that give people their lives back. South Bay, California.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --cocoa:#1E0F0D; --cocoa2:#291513; --deep:#150A09; --lemon:#FCFFD1; --lemon-dim:rgba(252,255,209,.55);
  --rose:#C99A8E; --line:rgba(252,255,209,.14);
  --serif:'Gloock',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{background:var(--cocoa);color:var(--lemon);font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--lemon);color:var(--cocoa)}
.wrap{max-width:1200px;margin:0 auto;padding:0 40px}
.lbl{font-size:11.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--lemon-dim)}

/* ---------- preloader ---------- */
.pre{position:fixed;inset:0;z-index:100;background:var(--cocoa);display:flex;align-items:center;
  justify-content:center;transition:opacity .8s ease,visibility .8s}
.pre.done{opacity:0;visibility:hidden}
.pre .pct{font-family:var(--serif);font-size:clamp(54px,7vw,96px);color:var(--lemon)}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;
  align-items:center;padding:24px 40px;mix-blend-mode:difference;color:#fff}
.nav .lg{font-family:var(--serif);font-size:21px}
.nav .m{font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:120px 20px 90px;position:relative;overflow:hidden;
  background:radial-gradient(70% 55% at 50% 38%,var(--cocoa2) 0%,var(--cocoa) 62%,var(--deep) 100%)}
.hero .k{margin-bottom:30px}
.hero h1{font-family:var(--serif);font-size:clamp(44px,7.4vw,104px);line-height:1.04;letter-spacing:.005em;max-width:1060px}
.hero h1 .rose{color:var(--rose)}
.hero .sub{margin-top:32px;font-size:15.5px;line-height:1.7;color:var(--lemon-dim);max-width:520px}
.hero .dn{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);font-size:11px;
  font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--lemon-dim)}
.hero .halo{position:absolute;top:-160px;left:50%;transform:translateX(-50%);width:560px;height:560px;
  border-radius:50%;border:1px solid rgba(252,255,209,.1);pointer-events:none}
.hero .halo::after{content:"";position:absolute;inset:60px;border-radius:50%;border:1px solid rgba(252,255,209,.06)}

/* ---------- chapters ---------- */
.chap{padding:var(--sec) 0;border-top:1px solid var(--line)}
.chap .inr{display:grid;grid-template-columns:.9fr 1.1fr;gap:80px;align-items:center}
.chap.alt .inr .tx{order:2}
.chap .num{font-family:var(--serif);font-size:clamp(60px,7vw,104px);line-height:1;color:var(--rose)}
.chap h2{font-family:var(--serif);font-size:clamp(30px,3.8vw,52px);line-height:1.12;margin:20px 0 22px}
.chap h2 em{font-style:normal;color:var(--rose)}
.chap .k2{margin-bottom:6px}
.chap p{font-size:15.5px;line-height:1.75;color:var(--lemon-dim);max-width:460px;margin-bottom:14px}
.chap p strong{color:var(--lemon);font-weight:500}
.chap .ph{position:relative}
.chap .ph img{border-radius:14px;aspect-ratio:4/3;object-fit:cover;width:100%;
  filter:sepia(.35) hue-rotate(-18deg) saturate(.85) brightness(.9);box-shadow:0 40px 90px rgba(0,0,0,.5)}
.chap .ph .cap{position:absolute;bottom:14px;left:14px;font-size:10.5px;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;color:rgba(252,255,209,.85);
  background:rgba(21,10,9,.6);backdrop-filter:blur(6px);padding:8px 13px;border-radius:8px}

/* ---------- verse (serif interlude) ---------- */
.verse{padding:calc(var(--sec)*1.2) 0;text-align:center;border-top:1px solid var(--line)}
.verse p{font-family:var(--serif);font-size:clamp(28px,4vw,54px);line-height:1.25;max-width:940px;margin:0 auto}
.verse p .rose{color:var(--rose)}
.verse .who{margin-top:32px;font-size:11.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--lemon-dim)}

/* ---------- record ---------- */
.record{padding:calc(var(--sec)*.85) 0;border-top:1px solid var(--line)}
.record .inr{display:grid;grid-template-columns:repeat(3,1fr);gap:60px;text-align:center}
.record .n{font-family:var(--serif);font-size:clamp(48px,6vw,88px);line-height:.95}
.record .n span{font-size:.5em;color:var(--rose)}
.record .l{margin-top:16px;font-size:13.5px;color:var(--lemon-dim);line-height:1.65;max-width:250px;margin-left:auto;margin-right:auto}

/* ---------- voices ---------- */
.voices{padding:140px 0;border-top:1px solid var(--line)}
.voices .q{max-width:820px;margin:0 auto;text-align:center;padding:56px 0}
.voices .q+.q{border-top:1px solid var(--line)}
.voices .q p{font-family:var(--serif);font-size:clamp(21px,2.6vw,32px);line-height:1.45}
.voices .q .who{margin-top:24px;font-size:11.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--rose)}

/* ---------- close ---------- */
.close{padding:170px 0 50px;text-align:center;position:relative;overflow:hidden;
  background:radial-gradient(60% 50% at 50% 100%,var(--cocoa2) 0%,var(--cocoa) 70%)}
.close h2{font-family:var(--serif);font-size:clamp(40px,6.6vw,92px);line-height:1.05;max-width:960px;margin:0 auto}
.close h2 .rose{color:var(--rose)}
.close .cta{display:inline-block;margin-top:48px;background:var(--lemon);color:var(--cocoa);
  font-size:13.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  padding:18px 38px;border-radius:99px;transition:transform .3s,box-shadow .3s}
.close .cta:hover{transform:translateY(-2px);box-shadow:0 18px 44px rgba(252,255,209,.15)}
.close .fine{margin-top:130px;padding-top:26px;border-top:1px solid var(--line);display:flex;
  justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:11px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--lemon-dim)}

/* ---------- reveals ---------- */
.loaded .loaded .loaded }


/* ---------- mobile ---------- */
@media (max-width:900px){
  .wrap{padding:0 22px}
  .nav{padding:20px 22px}
  .chap .inr{grid-template-columns:1fr;gap:40px}
  .chap:nth-of-type(even) .inr .tx{order:0}
  .record .inr{grid-template-columns:1fr;gap:44px}
  .chap,.record,.voices{padding:95px 0}
  .verse{padding:110px 0}
  .close{padding:120px 0 40px}
}

/* ---------- rework: luz + placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--rose,#C99A8E);outline-offset:3px}
html.no-motion #pre{display:none}
.verse p.lum{background:linear-gradient(90deg,var(--lemon,#FCFFD1) 50%,rgba(252,255,209,.22) 50.001%);background-size:200% 100%;background-position:100% 0;-webkit-background-clip:text;background-clip:text;color:transparent;will-change:background-position}
html.no-motion .verse p.lum{background:none;color:var(--lemon,#FCFFD1)}
html.no-motion .verse p.lum em{color:var(--rose,#C99A8E)}
.phx{display:flex;align-items:center;justify-content:center;background:#231210;color:rgba(252,255,209,.4);font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px;border-radius:14px;aspect-ratio:4/3;width:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:rgba(252,255,209,.5);font-size:14px}
</style></head>
<body>
<div id="pre"><span class="pct" id="pct">0%</span></div>
<nav class="nav"><span class="lg" id="nlogo"></span><span class="m" id="nmenu"></span></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');
var ROM=['I','II','III','IV','V','VI'];

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<strong>').replace(/&lt;\/b&gt;/g,'</strong>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<header class="hero" id="top"><div class="halo" id="halo" aria-hidden="true"></div>'+
  '<div data-r2><div class="k lbl wr">'+esc(s.k)+'</div>'+
  '<h1 class="wr">'+rich(s.title).replace(/<em>/g,'<span class="rose">').replace(/<\/em>/g,'</span>')+'</h1>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '<div class="dn wr">'+esc(s.dn||'Scroll')+'</div></div>'+
  '</header>'},
chapters:function(s){
  return(s.items||[]).map(function(ch,i){
    return'<section class="chap'+(i%2?' alt':'')+'"><div class="wrap"><div class="inr">'+
    '<div class="tx" data-r2>'+
      '<div class="num wr" data-num>'+ROM[i]+'.</div>'+
      '<div class="k2 lbl wr">'+esc(ch.k)+'</div>'+
      '<h2 class="wr">'+rich(ch.title)+'</h2>'+
      (ch.paras||[]).map(function(p){return'<p class="wr">'+rich(p)+'</p>'}).join('')+
    '</div>'+
    '<div class="ph wr" data-r4>'+img(ch.img)+'<span class="cap">'+esc(ch.cap)+'</span></div>'+
    '</div></div></section>'}).join('')},
verse:function(s){
  return'<section class="verse" data-r1><p class="lum wr" id="verse" style="opacity:1">'+rich(s.q).replace(/<em>/g,'<span class="rose">').replace(/<\/em>/g,'</span>')+'</p>'+
  '<div class="who">'+esc(s.who)+'</div></section>'},
record:function(s){
  return'<section class="record"><div class="wrap"><div class="inr" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="wr"><div class="n">'+esc(cl.n)+(cl.u?'<span class="rose">'+esc(cl.u)+'</span>':'')+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
voices:function(s){
  return'<section class="voices"><div class="wrap">'+
  (s.cards||[]).map(function(v){return'<div class="wr" data-r1 style="margin-bottom:44px"><p class="q" style="opacity:1">'+esc(v.q)+'</p><div class="who">'+esc(v.who)+'</div></div>'}).join('')+
  '</div></section>'},
close:function(s){
  return'<section class="close" data-r2>'+
  '<h2 class="wr">'+rich(s.title).replace(/<em>/g,'<span class="rose">').replace(/<\/em>/g,'</span>')+'</h2>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v27-genesis/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('nmenu').textContent=c.nav.menu||''}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  /* preloader determinista */
  var pre=document.getElementById('pre'),pct=document.getElementById('pct'),o={n:0};
  if(pre&&pct){
    gsap.to(o,{n:100,duration:.9,ease:'expo.out',
      onUpdate:function(){pct.textContent=Math.round(o.n)+'%'},
      onComplete:function(){pre.classList.add('done');document.body.classList.add('loaded')}});
  } else document.body.classList.add('loaded');

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5a el verso se ilumina: wipe de background-position */
  var verse=document.getElementById('verse');
  if(verse){
    ScrollTrigger.create({trigger:'.verse',start:'top 78%',end:'center 45%',scrub:.4,
      onUpdate:function(self){verse.style.backgroundPosition=((1-self.progress)*100)+'% 0'}});
  }
  /* R5b numerales que amanecen + halo global */
  document.querySelectorAll('[data-num]').forEach(function(num){
    var sec=num.closest('.chap');
    ScrollTrigger.create({trigger:sec,start:'top 80%',end:'center 45%',scrub:.4,
      onUpdate:function(self){var k=self.progress;
        var r=Math.round(201-48*k),g=Math.round(154+50*k),bl=Math.round(142+40*k);
        num.style.color='rgb('+Math.round(153+48*k)+','+g+','+bl+')';
        num.style.opacity=(.45+.55*k);
      }});
  });
  var halo=document.getElementById('halo');
  if(halo){
    ScrollTrigger.create({start:0,end:'max',scrub:.4,
      onUpdate:function(self){halo.style.transform='translateX(-50%) scale('+(1+self.progress*.35)+') rotate('+(self.progress*40)+'deg)'}});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
