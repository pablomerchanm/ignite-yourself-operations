<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jorge Arce — A Case Study in Surgical Care</title>
<meta name="description" content="The practice of Dr. Jorge Arce, presented as a case study: brief, approach, and twenty-seven years of results. South Bay, California.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(96px,13vh,152px);

  --paper:#EDECE8; --panel:#E2E1DC; --ink:#191919; --dim:#77756E; --line:rgba(25,25,25,.14);
  --serif:'Instrument Serif',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--paper);color:var(--ink);font-family:'Kumbh Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:var(--paper)}
.wrap{max-width:1360px;margin:0 auto;padding:0 40px}
.slabel{font-family:var(--serif);font-size:19px;letter-spacing:.01em}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;
  align-items:center;padding:22px 40px;background:linear-gradient(180deg,rgba(237,236,232,.92),rgba(237,236,232,0))}
.nav .lg{font-weight:700;font-size:18px;letter-spacing:-.03em}
.nav .m{font-weight:500;font-size:15px;cursor:pointer}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:120px 20px 80px}
.hero .l1,.hero .l3{font-weight:700;text-transform:uppercase;letter-spacing:-.025em;line-height:.88;
  font-size:clamp(64px,10.8vw,156px)}
.hero .mid{display:flex;align-items:center;justify-content:center;gap:clamp(8px,1.6vw,22px);
  margin:clamp(4px,1vw,12px) 0}
.hero .glyph{font-weight:700;font-size:clamp(56px,9vw,130px);line-height:1;letter-spacing:-.02em}
.hero .glyph.ast{transform:translateY(-6%)}
.hero .slot{width:clamp(80px,10vw,144px);aspect-ratio:1;overflow:hidden;background:var(--panel)}
.hero .slot img{width:100%;height:100%;object-fit:cover;filter:grayscale(.15)}
.hero .sr{font-family:var(--serif);font-size:clamp(15px,1.4vw,20px);margin-left:clamp(6px,1vw,14px)}
.hero .foot{position:absolute;bottom:34px;left:40px;right:40px;display:flex;justify-content:space-between;
  font-size:12.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}

/* ---------- case meta ---------- */
.meta{border-top:1px solid var(--line);padding:60px 0}
.meta .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.meta .cell .k{font-size:11.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.meta .cell .v{font-size:15.5px;line-height:1.5}

/* ---------- full-width image ---------- */
.full{padding:40px 0}
.full img{width:100%;aspect-ratio:21/10;object-fit:cover;filter:grayscale(.1) contrast(1.02)}
.full .cap{margin-top:12px;font-family:var(--serif);font-size:16px;color:var(--dim)}

/* ---------- brief / approach ---------- */
.block{padding:var(--sec) 0;border-top:1px solid var(--line)}
.block .inr{display:grid;grid-template-columns:.55fr 1.45fr;gap:70px;align-items:start}
.block .lbl{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.block h2{font-weight:700;letter-spacing:-.03em;line-height:1.04;font-size:clamp(30px,4vw,54px);
  text-transform:uppercase;max-width:800px}
.block h2 .ser{font-family:var(--serif);font-weight:400;font-style:italic;text-transform:none;
  letter-spacing:0;font-size:1.04em}
.block p{margin-top:26px;font-size:16.5px;line-height:1.75;color:#3B3A36;max-width:620px}
.block p strong{font-weight:700;color:var(--ink)}

/* two-up gallery */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:26px;padding:14px 0 40px}
.duo figure img{aspect-ratio:4/5;object-fit:cover;width:100%;filter:grayscale(.1)}
.duo figcaption{margin-top:10px;font-family:var(--serif);font-size:15px;color:var(--dim)}

/* ---------- films strip ---------- */
.films{border-top:1px solid var(--line);padding:calc(var(--sec)*1.15) 0}
.films .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:14px;margin-bottom:50px}
.films h2{font-weight:700;letter-spacing:-.03em;text-transform:uppercase;font-size:clamp(28px,3.4vw,46px)}
.films h2 .ser{font-family:var(--serif);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}
.films .lbl2{font-family:var(--serif);font-size:18px;color:var(--dim)}
.fstack{display:grid;gap:26px}
.frame2{position:relative;background:#101010;overflow:hidden}
.frame2::before,.frame2::after{content:"";position:absolute;left:0;right:0;height:6%;background:#000;z-index:2}
.frame2::before{top:0}
.frame2::after{bottom:0}
.frame2 img{width:100%;aspect-ratio:21/9;object-fit:cover;opacity:.85;filter:grayscale(.2)}
.frame2 .play{position:absolute;z-index:3;left:50%;top:50%;transform:translate(-50%,-50%);
  width:74px;height:74px;border-radius:50%;border:1.5px solid rgba(255,255,255,.85);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;
  backdrop-filter:blur(4px);transition:transform var(--dur-hover) var(--ease-quick),background var(--dur-hover) var(--ease-quick)}
.frame2:hover .play{transform:translate(-50%,-50%) scale(1.08);background:rgba(255,255,255,.15)}
.frame2 .cap2{position:absolute;z-index:3;left:20px;bottom:9%;color:#fff;font-size:11.5px;
  font-weight:500;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.fduo{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.fduo .frame2 img{aspect-ratio:16/10}

/* ---------- next case ---------- */
.nextcase{border-top:1px solid var(--line);padding:80px 0}
.nextcase a{display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap;transition:opacity .3s}
.nextcase a:hover{opacity:.6}
.nextcase .k2{font-size:11.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.nextcase .t2{font-weight:700;letter-spacing:-.03em;text-transform:uppercase;font-size:clamp(26px,3.6vw,52px)}
.nextcase .t2 .ser{font-family:var(--serif);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}

/* ---------- results strip ---------- */
.results{border-top:1px solid var(--line);padding:calc(var(--sec)*.85) 0}
.results .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:50px}
.results .n{font-weight:700;letter-spacing:-.04em;font-size:clamp(56px,7vw,104px);line-height:.9;text-transform:uppercase}
.results .n .ser{font-family:var(--serif);font-weight:400;font-style:italic;letter-spacing:0;font-size:.6em}
.results .l{margin-top:16px;font-size:14px;line-height:1.6;color:var(--dim);max-width:260px}

/* ---------- voices ---------- */
.voices{border-top:1px solid var(--line);padding:110px 0}
.voices .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:26px}
.vcard{background:var(--panel);padding:34px 30px 38px;display:flex;flex-direction:column;gap:22px}
.vcard p{font-family:var(--serif);font-size:20px;line-height:1.5}
.vcard .who{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:auto}

/* ---------- credits ---------- */
.credits{border-top:1px solid var(--line);padding:110px 0}
.credits h2{font-weight:700;text-transform:uppercase;letter-spacing:-.03em;font-size:clamp(28px,3.4vw,46px);margin-bottom:54px}
.credits h2 .ser{font-family:var(--serif);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}
.crow{display:grid;grid-template-columns:.6fr 1.4fr;gap:30px;padding:18px 0;border-top:1px solid var(--line);font-size:15px}
.crow:last-child{border-bottom:1px solid var(--line)}
.crow .k{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding-top:2px}

/* ---------- close ---------- */
.close{padding:130px 0 50px;text-align:center}
.close .t{font-weight:700;text-transform:uppercase;letter-spacing:-.03em;line-height:.92;font-size:clamp(44px,8vw,120px)}
.close .t .ser{font-family:var(--serif);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}
.close .cta{display:inline-block;margin-top:44px;background:var(--ink);color:var(--paper);
  font-size:14px;font-weight:500;padding:16px 32px;border-radius:99px;transition:transform .3s}
.close .cta:hover{transform:translateY(-2px)}
.close .fine{margin-top:110px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  padding-top:24px;border-top:1px solid var(--line);font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--dim)}

/* ---------- reveals ---------- */
}


/* ---------- rework: timeline + placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--ink,#191919);outline-offset:3px}
.phx{display:flex;align-items:center;justify-content:center;background:#dad9d4;color:#77756E;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.frame2 .phx{aspect-ratio:21/9;width:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#77756E;font-size:14px}
.tline{display:flex;align-items:center;gap:22px;margin-top:44px}
.tline .ruler{position:relative;flex:1;height:34px;border-top:1px solid rgba(25,25,25,.25)}
.tline .ruler .tick{position:absolute;top:-1px;width:1px;height:12px;background:rgba(25,25,25,.3)}
.tline .ruler .phead{position:absolute;top:-7px;left:0;width:2px;height:26px;background:var(--ink,#191919);will-change:transform;display:block}
.tline .tc{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;min-width:92px;text-align:right}
html.no-motion .tline{display:none}
</style></head>
<body>
<nav class="nav"><span id="nlogo"></span><span id="nmenu"></span></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;s&gt;/g,'<span class="ser">').replace(/&lt;\/s&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt,extra){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'"'+(extra||'')+'>';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<header class="hero" id="top" style="position:relative" data-r2>'+
  '<div class="l1 wr">'+esc(s.l1)+'</div>'+
  '<div class="mid wr">'+
    '<span class="glyph ast">*</span><span class="glyph">(</span>'+
    '<span class="slot">'+img(s.img)+'</span>'+
    '<span class="glyph">)</span><span class="sr slabel">'+esc(s.label)+'</span>'+
  '</div>'+
  '<div class="l3 wr">'+esc(s.l3)+'</div>'+
  '<div class="foot">'+(s.foot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</header>'},
caseMeta:function(s){
  return'<section class="meta"><div class="wrap"><div class="grid" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="cell wr"><div class="k">'+esc(cl.k)+'</div><div class="v">'+rich(cl.v)+'</div></div>'}).join('')+
  '</div></div></section>'},
full:function(s){
  return'<section class="full"><div class="wrap full wr" data-r4>'+img(s.img)+
  '<div class="cap wr">'+esc(s.cap)+'</div></div></section>'},
block:function(s){
  return'<section class="block"><div class="wrap"><div class="inr">'+
  '<span class="lbl wr" data-r1>'+esc(s.lbl)+'</span>'+
  '<div data-r2><h2 class="wr">'+rich(s.title)+'</h2>'+
  (s.paras||[]).map(function(p){return'<p class="t wr">'+rich(p)+'</p>'}).join('')+
  '</div></div>'+
  (s.duo?'<div class="duo">'+s.duo.map(function(d){return'<div class="wr" data-r4>'+img(d.img)+'<div class="cap">'+esc(d.cap)+'</div></div>'}).join('')+'</div>':'')+
  '</div></section>'},
films:function(s){
  var slots=s.slots||[];
  var first=slots.filter(function(x){return x.wide});
  var rest=slots.filter(function(x){return !x.wide});
  function slot(f){return'<div class="frame2 wr" data-r4 data-film>'+img(f.img)+
    '<span class="play">▶</span><span class="cap2">'+esc(f.cap)+'</span></div>'}
  return'<section class="films"><div class="wrap">'+
  '<div class="head" data-r2><h2 class="wr">'+rich(s.title)+'</h2><span class="lbl2 wr">'+esc(s.lbl)+'</span></div>'+
  '<div class="fstack">'+first.map(slot).join('')+
  (rest.length?'<div class="fduo">'+rest.map(slot).join('')+'</div>':'')+'</div>'+
  '<div class="tline" aria-hidden="true"><div class="ruler" id="ruler"><i class="phead" id="phead"></i></div><span class="tc" id="tc">FILM 01</span></div>'+
  '</div></section>'},
results:function(s){
  return'<section class="results"><div class="wrap"><div class="grid" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="wr"><div class="n">'+esc(cl.n)+(cl.u?'<span class="ser">'+esc(cl.u)+'</span>':'')+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
voices:function(s){
  return'<section class="voices"><div class="wrap">'+
  (s.cards||[]).map(function(v){return'<div class="vcard wr" data-r1><p class="q">'+esc(v.q)+'</p><div class="who">'+esc(v.who)+'</div></div>'}).join('')+
  '</div></section>'},
credits:function(s){
  return'<section class="credits"><div class="wrap">'+
  '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
  (s.rows||[]).map(function(r){return'<div class="crow wr" data-r1 data-rule><span class="k2">'+esc(r.k)+'</span><span class="v">'+rich(r.v)+'</span></div>'}).join('')+
  '</div></section>'},
close:function(s){
  return'<section class="close"><div class="wrap" data-r2>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'},
nextcase:function(s){
  return'<section class="nextcase"><a class="inr" href="'+esc(s.h||'#top')+'"><div class="wrap">'+
  '<span class="lbl2">'+esc(s.lbl)+'</span>'+
  '<h2>'+rich(s.title)+'</h2>'+
  '</div></a></section>'}
};

fetch('/v23-pacifica/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('nmenu').textContent=c.nav.menu||''}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:.8});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.position='relative';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:0;height:1px;background:rgba(25,25,25,.15);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 la linea de tiempo del montaje */
  var films=Array.prototype.slice.call(document.querySelectorAll('[data-film]'));
  var ruler=document.getElementById('ruler'),phead=document.getElementById('phead'),tc=document.getElementById('tc');
  if(films.length&&ruler){
    var n=films.length;
    for(var j=1;j<n;j++){
      var t=document.createElement('i');t.className='tick';t.style.left=(j/n*100)+'%';
      ruler.appendChild(t);
    }
    ScrollTrigger.create({trigger:'.films',start:'top 60%',end:'bottom 40%',scrub:.6,
      onUpdate:function(self){var p=self.progress;
        var w=ruler.clientWidth-2;
        phead.style.transform='translateX('+(p*w)+'px)';
        var seg=1/n;
        films.forEach(function(f,j){
          var center=(j+.5)*seg;
          var a=Math.max(0,1-Math.abs(p-center)/(seg*.9));
          var im=f.querySelector('img,.phx');
          if(im)im.style.opacity=(.7+.3*a);
          var cap=f.querySelector('.cap2');
          if(cap)cap.style.opacity=(.55+.45*a);
        });
        if(tc)tc.textContent='FILM '+('0'+Math.min(n,Math.floor(p*n)+1)).slice(-2);
      }});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
