<html lang="en">
<head>

<meta name="robots" content="noindex">

<style>
/* v11 FIRMA rework — tokens: cambiar identidad = solo :root.
   Contenido: /v11-firma/content.json · principles/V11-FIRMA.md */
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --white:#FFFFFF;
  --ink:#0E0E0E;
  --gray:#71767C;
  --line:#E9E9E9;
  --coral:#FF7A6E;
  --paper:#F7F5F2;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--white);color:var(--ink)}
body{
  font-family:'Geist',sans-serif;
  font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--coral);color:#fff}

/* ================= fixed chrome ================= */
.chrome{position:fixed;inset:0;z-index:80;pointer-events:none}
.chrome>*{pointer-events:auto}
.logo{position:absolute;top:34px;left:44px;font-weight:800;font-size:19px;letter-spacing:.01em}
.burger{position:absolute;top:38px;right:44px;width:34px;cursor:pointer}
.burger span{display:block;height:2px;background:var(--ink);margin:7px 0;transition:transform .35s}
.burger:hover span:first-child{transform:translateY(2px)}
.burger:hover span:last-child{transform:translateY(-2px)}
.rail{position:absolute;left:44px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:64px}
.rail a{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink);opacity:.75;transition:opacity .3s,color .3s;
}
.rail a:hover{opacity:1;color:var(--coral)}
.socials{position:absolute;bottom:30px;left:44px;display:flex;gap:22px;font-size:13px;font-weight:600;letter-spacing:.06em}
.socials a{opacity:.7}
.socials a:hover{opacity:1;color:var(--coral)}
.hint{position:absolute;bottom:30px;right:44px;font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--gray);display:flex;align-items:center;gap:10px}
.hint .ar{display:inline-block;animation:nudge 1.8s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
.progress{position:absolute;bottom:0;left:0;height:3px;background:var(--coral);width:0%}

/* ================= horizontal track ================= */
.track{
  position:fixed;top:0;left:0;height:100vh;
  display:flex;align-items:stretch;
  will-change:transform;
}
.panel{height:100vh;flex:0 0 auto;position:relative;overflow:hidden}

/* ---------- type ---------- */
.serif{font-family:'Playfair Display',serif;font-weight:400;letter-spacing:-.02em}
.script{font-family:'Caveat',cursive;font-weight:400;letter-spacing:-.02em}
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gray)}
.eyebrow b{color:var(--coral)}

/* ---------- hero panel ---------- */
.p-hero{width:116vw;display:flex;align-items:center;background:var(--white)}
.hero-in{padding-left:16vw;max-width:78vw}
.hero-in .eyebrow{margin-bottom:34px}
.hero-h{font-size:clamp(52px,8.6vh,110px);line-height:1.04}
.hero-h .rot{display:inline-block;position:relative;color:var(--coral);font-style:italic;min-width:5.4ch}
.hero-h .rot span{position:absolute;left:0;top:0;opacity:0;transform:translateY(24px);transition:opacity .55s,transform .55s cubic-bezier(.2,.7,.2,1);white-space:nowrap}
.hero-h .rot span.on{opacity:1;transform:none;position:relative}
.hero-h .script-line{font-family:'Caveat',cursive;font-size:1.18em;letter-spacing:-.02em;display:block;margin-top:6px;margin-left:.8ch;transform:rotate(-2deg)}
.hero-sub{margin-top:44px;font-size:17px;color:var(--gray);max-width:46ch;font-weight:400}
.hero-sub b{color:var(--ink);font-weight:600}

/* ---------- statement (dark) panel ---------- */
.p-state{width:100vw;background:#0B0B0B;display:flex;align-items:center;justify-content:center}
.p-state .bg{position:absolute;inset:0}
.p-state .bg img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) brightness(.42) contrast(1.05)}
.p-state .txt{position:relative;z-index:2;text-align:center;padding:0 7vw}
.p-state h2{font-family:'Playfair Display',serif;font-weight:400;color:#fff;text-transform:uppercase;font-size:clamp(44px,9.4vh,104px);line-height:1.02;letter-spacing:-.01em}
.p-state h2 em{font-style:normal;color:var(--coral)}
.p-state .eyebrow{color:rgba(255,255,255,.65);margin-bottom:30px}

/* ---------- case/work panels ---------- */
.p-case{display:flex}
.p-case .photo{width:44vw;height:100vh;position:relative;flex:0 0 auto}
.p-case .photo img{width:100%;height:100%;object-fit:cover}
.p-case .card{
  width:36vw;flex:0 0 auto;background:var(--white);
  align-self:center;margin-left:-7vw;position:relative;z-index:2;
  padding:70px 60px;box-shadow:0 30px 90px rgba(14,14,14,.1);
}
.p-case .card .eyebrow{margin-bottom:26px}
.p-case .card h3{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(34px,5.6vh,58px);line-height:1.06;letter-spacing:-.02em}
.p-case .card p{margin-top:22px;font-size:15.5px;color:var(--gray)}
.p-case .card p b{color:var(--ink);font-weight:600}
.case-link{display:inline-block;margin-top:30px;font-size:15px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:3px;transition:color .3s,border-color .3s}
.case-link:hover{color:var(--coral);border-color:var(--coral)}
.p-case .pad-r{width:9vw;flex:0 0 auto}

/* ---------- expertise strip panel ---------- */
.p-exp{display:flex;align-items:center;background:var(--paper);padding:0 8vw}
.exp-head{width:30vw;flex:0 0 auto;padding-right:6vw}
.exp-head h2{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(40px,6.8vh,72px);line-height:1.05;letter-spacing:-.02em}
.exp-head h2 .script{color:var(--coral);font-size:1.15em}
.exp-head p{margin-top:24px;color:var(--gray);font-size:15.5px;max-width:34ch}
.exp-row{display:flex;gap:3.6vw;align-items:center}
.exp-card{width:23vw;flex:0 0 auto;background:var(--white);padding:44px 38px 46px;box-shadow:0 16px 50px rgba(14,14,14,.07);transition:transform .5s var(--ease-quick)}
.exp-card:hover{transform:translateY(-10px)}
.exp-card .no{font-family:'Caveat',cursive;font-size:44px;color:var(--coral);line-height:1}
.exp-card h3{font-family:'Playfair Display',serif;font-weight:500;font-size:26px;margin-top:18px;letter-spacing:-.01em}
.exp-card p{margin-top:12px;font-size:14.5px;color:var(--gray)}

/* ---------- stats panel ---------- */
.p-stats{width:92vw;background:var(--white);display:flex;align-items:center;justify-content:center;gap:9vw}
.stat{text-align:center}
.stat .n{font-family:'Caveat',cursive;font-size:clamp(110px,24vh,230px);line-height:.9;color:var(--ink)}
.stat .n em{font-style:normal;color:var(--coral)}
.stat .l{margin-top:18px;font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gray);max-width:24ch}

/* ---------- stories panel ---------- */
.p-stories{display:flex;align-items:center;background:var(--white);padding:0 7vw}
.st-head{width:24vw;flex:0 0 auto;padding-right:5vw}
.st-head h2{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(38px,6.4vh,66px);line-height:1.06;letter-spacing:-.02em}
.st-head h2 .script{color:var(--coral);font-size:1.15em}
.st-head p{margin-top:22px;color:var(--gray);font-size:15px}
.st-row{display:flex;gap:3vw;align-items:stretch}
.st-card{width:24vw;flex:0 0 auto;border:1px solid var(--line);padding:42px 36px;display:flex;flex-direction:column;gap:24px;background:var(--white);transition:transform .5s var(--ease-quick),box-shadow .5s}
.st-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(14,14,14,.08)}
.st-card .q{font-size:16px;line-height:1.55;color:#33383E}
.st-card .q i{font-family:'Playfair Display',serif;color:var(--coral)}
.st-card .who .nm{font-weight:700;font-size:14.5px}
.st-card .who .rl{font-size:12.5px;color:var(--gray);margin-top:2px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.st-card.pull{background:#0E0E0E;color:#fff;border:none;justify-content:center}
.st-card.pull .q{font-family:'Playfair Display',serif;font-size:clamp(20px,2.8vh,26px);line-height:1.35;color:#fff}
.st-card.pull .q em{color:var(--coral);font-style:italic}
.st-card.pull .rl{color:#9AA0A6}
.st-card .who{margin-top:auto}

/* ---------- journal panel ---------- */
.p-journal{display:flex;align-items:center;background:var(--paper);padding:0 7vw}
.j-head{width:24vw;flex:0 0 auto;padding-right:5vw}
.j-head h2{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(38px,6.4vh,66px);line-height:1.06}
.j-head h2 .script{color:var(--coral);font-size:1.15em}
.j-head p{margin-top:20px;color:var(--gray);font-size:15px;max-width:30ch}
.j-row{display:flex;gap:3vw}
.j-card{width:24vw;flex:0 0 auto;background:var(--white);box-shadow:0 16px 50px rgba(14,14,14,.06);transition:transform .5s var(--ease-quick)}
.j-card:hover{transform:translateY(-10px)}
.j-card .ph{aspect-ratio:16/10;overflow:hidden}
.j-card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease-quick)}
.j-card:hover .ph img{transform:scale(1.05)}
.j-card .bd{padding:30px 32px 36px}
.j-card .eyebrow{margin-bottom:14px}
.j-card h3{font-family:'Playfair Display',serif;font-weight:500;font-size:24px;line-height:1.15;letter-spacing:-.01em}
.j-card p{margin-top:12px;font-size:14.5px;color:var(--gray)}

/* ---------- speaking panel ---------- */
.p-speak{display:flex}
.p-speak .photo{width:40vw;height:100vh;flex:0 0 auto}
.p-speak .photo img{width:100%;height:100%;object-fit:cover}
.p-speak .bd{width:52vw;flex:0 0 auto;align-self:center;padding:0 6vw}
.p-speak h2{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(36px,6vh,62px);line-height:1.06}
.p-speak h2 .script{color:var(--coral);font-size:1.15em}
.p-speak .lead{margin-top:20px;color:var(--gray);font-size:15.5px;max-width:52ch}
.sp-row{display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;padding:19px 0;border-top:1px solid var(--line)}
.sp-row:last-of-type{border-bottom:1px solid var(--line)}
.sp-row .yr{font-family:'Caveat',cursive;font-size:26px;color:var(--coral)}
.sp-row .nm{font-weight:700;font-size:16px}
.sp-row .pl{font-size:13px;color:var(--gray);margin-top:2px}
.sp-row .tp{font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);border-radius:100px;padding:7px 14px}
.sp-list{margin-top:36px}

/* ---------- finale panel ---------- */
.p-fin{width:150vw;background:var(--white);display:flex;align-items:center;position:relative}
.fin-in{padding-left:9vw;width:56vw;flex:0 0 auto;position:relative;z-index:2}
.fin-h{font-size:clamp(44px,7.6vh,92px);line-height:1.05}
.fin-h .serif{display:block}
.fin-h .rot2{color:var(--coral);font-style:italic}
.fin-h .script{display:block;font-size:1.25em;margin-left:1ch;transform:rotate(-2.5deg);margin-top:4px}
.fin-sub{margin-top:26px;color:var(--gray);font-size:15.5px;max-width:44ch}
.fin-sub b{color:var(--ink);font-weight:600}
.fin-form{margin-top:40px;display:flex;flex-direction:column;gap:6px;max-width:420px}
.fin-form input,.fin-form textarea{
  border:none;border-bottom:1px solid var(--line);padding:15px 2px;font-family:'Geist',sans-serif;
  font-size:15px;outline:none;background:transparent;resize:none;
}
.fin-form input:focus,.fin-form textarea:focus{border-color:var(--coral)}
.fin-form button{
  margin-top:26px;align-self:flex-start;background:var(--ink);color:#fff;border:none;cursor:pointer;
  font-family:'Geist',sans-serif;font-size:15px;font-weight:700;padding:17px 34px;border-radius:100px;
  transition:background .3s,transform .3s;
}
.fin-form button:hover{background:var(--coral);transform:translateY(-2px)}
.fin-form .fine{font-size:11.5px;color:var(--gray);margin-top:12px;max-width:40ch}
.fin-meta{margin-top:38px;display:flex;gap:54px;flex-wrap:wrap}
.fin-meta .m .h{font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray)}
.fin-meta .m .v{margin-top:6px;font-size:15px;font-weight:600}
.fin-mark{
  position:absolute;right:-4vw;bottom:-6vh;z-index:1;
  font-family:'Geist',sans-serif;font-weight:900;letter-spacing:-.05em;line-height:.72;
  font-size:clamp(200px,58vh,560px);color:var(--ink);
  transform:rotate(-6deg);white-space:nowrap;user-select:none;
}
.fin-cred{position:absolute;bottom:26px;left:9vw;z-index:2;font-size:12.5px;color:var(--gray)}

/* ---------- reveals ---------- */

.hint .ar{animation:none}
}

/* ================= mobile: vertical fallback ================= */
@media (max-width:900px){
  .track{position:static;display:block;height:auto;transform:none!important}
  .panel{height:auto;min-height:0;width:100%!important;overflow:visible}
  .rail,.hint{display:none}
  .logo{top:22px;left:22px}
  .burger{top:26px;right:22px}
  .socials{display:none}
  .p-hero{padding:130px 26px 90px;display:block}
  .hero-in{padding:0;max-width:none}
  .hero-h{font-size:clamp(40px,11vw,56px)}
  .p-state{min-height:70vh;padding:90px 26px}
  .p-case{display:block}
  .p-case .photo{width:100%;height:56vh}
  .p-case .card{width:calc(100% - 40px);margin:-60px auto 70px;padding:40px 28px}
  .p-case .pad-r{display:none}
  .p-exp,.p-stories,.p-journal{display:block;padding:90px 26px}
  .exp-head,.st-head,.j-head{width:auto;padding-right:0;margin-bottom:44px}
  .exp-row,.st-row,.j-row{flex-direction:column;gap:20px}
  .exp-card,.st-card,.j-card{width:100%}
  .p-stats{width:100%;flex-direction:column;gap:60px;padding:90px 26px}
  .stat .n{font-size:clamp(72px,24vw,110px)}
  .stat .l{margin-left:auto;margin-right:auto}
  .p-state h2{font-size:clamp(34px,9.6vw,44px)}
  .p-state .txt{padding:0 22px}
  .hero-h .rot{min-width:0}
  .p-speak{display:block}
  .p-speak .photo{width:100%;height:50vh}
  .p-speak .bd{width:auto;padding:60px 26px}
  .sp-row{grid-template-columns:44px 1fr;row-gap:6px}
  .sp-row .tp{grid-column:2;justify-self:start}
  .p-fin{display:block;padding:90px 0 120px}
  .fin-in{width:auto;padding:0 26px}
  .fin-mark{position:static;font-size:26vw;transform:rotate(-4deg);margin:70px 0 0 8px}
  .fin-cred{position:static;padding:30px 26px 0}
}

.wr{opacity:0}
html.no-motion .wr{opacity:1}
:focus-visible{outline:2px solid var(--coral);outline-offset:3px}
.phx{position:relative;width:100%;height:100%;background:#EDEAE5;display:grid;place-items:center;overflow:hidden}
.phx::after{content:attr(data-label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(14,14,14,.4);text-align:center;padding:12px;line-height:1.7}
.phx>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* contenedor del pin horizontal */
@media(min-width:901px){.hwrap{overflow:clip}.track{will-change:transform}}
</style></head>
<body>

<div class="chrome">

  <div class="hint" id="chromeHint"><span class="ar">→</span></div>

</div>

<div class="hwrap" id="hwrap"><div class="track" id="track"></div></div>
<noscript><div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">Este template requiere JavaScript (contenido en content.json).</div></noscript>

<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
'use strict';
var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&!!(window.gsap&&window.ScrollTrigger&&window.Lenis);
if(!MOTION)document.documentElement.classList.add('no-motion');
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>')

  .replace(/&lt;br&gt;/g,'<br>').replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img){if(!img)return'';
  return'<div class="phx" data-label="'+esc(img.src?'':img.label||'')+'">'+(img.src?'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'">':'')+'</div>'}

var partials={
phero:function(s){return'<section class="panel p-hero"><div class="hero-in">'+
'<div class="eyebrow wr" data-hero>'+rich(s.eyebrow)+'</div>'+
'<h1 class="serif hero-h wr" data-hero>'+rich(s.titlePre)+' <span class="rot" id="rot">'+(s.rot||[]).map(function(w,i){return'<span'+(i===0?' class="on"':'')+'>'+esc(w)+'</span>'}).join('')+'</span>'+
'<span class="script-line">'+esc(s.script)+'</span></h1>'+
'<p class="hero-sub wr" data-hero>'+rich(s.sub)+'</p></div></section>'},
pcase:function(s){return'<section class="panel p-case"'+(s.id?' id="pn-'+esc(s.id)+'"':'')+'>'+

'<div class="card"><div class="eyebrow wr" data-rv>'+rich(s.eyebrow)+'</div><h3 class="wr" data-rv>'+rich(s.title)+'</h3>'+
(s.paras||[]).map(function(p){return'<p class="wr" data-rv>'+rich(p)+'</p>'}).join('')+
(s.signature?'<div class="wr" data-rv style="margin-top:26px"><span class="script" style="font-size:46px;color:var(--coral);display:inline-block;transform:rotate(-4deg)">'+esc(s.signature)+'</span></div>':'')+
'</div><div class="pad-r"></div></section>'},
pstate:function(s){return'<section class="panel p-state"><div class="bg">'+ph(s.image)+'</div>'+

pexp:function(s){return'<section class="panel p-exp"><div class="exp-head">'+

'<div class="exp-row">'+(s.cards||[]).map(function(c){return'<div class="exp-card wr" data-rv><div class="no">'+esc(c[0])+'</div><h3>'+esc(c[1])+'</h3><p>'+esc(c[2])+'</p></div>'}).join('')+'</div></section>'},
pstats:function(s){return'<section class="panel p-stats">'+(s.stats||[]).map(function(x){return'<div class="stat wr" data-rv><div class="n">'+esc(x[0])+'<em>'+esc(x[1])+'</em></div><div class="l">'+esc(x[2])+'</div></div>'}).join('')+'</section>'},

function boot(data){
  if(data.meta){document.title=data.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  var c=data.chrome||{};
  document.getElementById('chromeLogo').innerHTML=esc(c.logo).replace(/ /g,'&nbsp;');
  document.getElementById('chromeRail').innerHTML=(c.rail||[]).map(function(r){return'<a href="#" data-goto="'+esc(r[1])+'">'+esc(r[0])+'</a>'}).join('');
  document.getElementById('chromeSocials').innerHTML=(c.socials||[]).map(function(sx){return'<a href="'+esc(sx[1])+'">'+esc(sx[0])+'</a>'}).join('');
  document.getElementById('chromeHint').insertAdjacentText('afterbegin',(c.hint||'SCROLL')+' ');
  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('track').innerHTML=html;
  initMotion();
}

function initMotion(){
  var track=document.getElementById('track');
  var progress=document.getElementById('progress');
  var horizontal=matchMedia('(min-width:901px)').matches&&MOTION;
  var rot=document.getElementById('rot');
  var words=rot?[].slice.call(rot.children):[];
  function setWord(i){words.forEach(function(w,j){w.classList.toggle('on',j===i)})}
  if(!MOTION){if(words.length)setWord(words.length-1);return}

  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({lerp:.25});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();

  var hTween=null;
  if(horizontal){
    var max=function(){return track.scrollWidth-innerWidth};
    hTween=gsap.to(track,{x:function(){return -max()},ease:'none',
      scrollTrigger:{trigger:'#hwrap',start:'top top',end:function(){return'+='+max()},
        pin:true,scrub:.4,invalidateOnRefresh:true,
        onUpdate:function(self){if(progress)progress.style.width=(self.progress*100)+'%';
          /* rotador ligado al primer tramo del recorrido */
          if(words.length){var p=gsap.utils.clamp(0,1,self.progress*4);
            setWord(Math.min(words.length-1,Math.floor(p*words.length)))}}}});
    /* reveals dentro del track con containerAnimation */
    gsap.utils.toArray('[data-rv]').forEach(function(el){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
        scrollTrigger:{trigger:el,containerAnimation:hTween,start:'left 88%',once:true}})});
  }else{
    gsap.utils.toArray('[data-rv]').forEach(function(el){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
        scrollTrigger:{trigger:el,start:'top 88%',once:true}})});
    if(words.length)setWord(words.length-1);
  }
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[120,80,60][Math.min(i,2)]});
  /* rail → panel */
  document.querySelectorAll('[data-goto]').forEach(function(a){
    a.addEventListener('click',function(ev){ev.preventDefault();
      var el=document.getElementById('pn-'+a.dataset.goto);if(!el)return;
      if(horizontal&&hTween){var st=hTween.scrollTrigger;
        lenis.scrollTo(st.start+(el.offsetLeft/(track.scrollWidth-innerWidth))*(st.end-st.start))}
      else el.scrollIntoView({behavior:'smooth'})})});
}

fetch('/v11-firma/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('track').innerHTML='<div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">No se pudo cargar content.json ('+esc(err.message)+')</div>'});
})();
</script>
