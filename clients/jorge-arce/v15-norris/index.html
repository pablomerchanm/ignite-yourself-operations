<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · v15 Norris</title>
<meta name="description" content="Board-certified oral & maxillofacial surgeon. Twenty-seven years of verified surgical work in the South Bay.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Alfa+Slab+One&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000000;
  --ink:#111112;
  --olive:#282C20;
  --olive2:#343A26;
  --volt:#D2FF00;
  --paper:#F4F4ED;
  --sage:#DDE1D2;
  --sage2:#B4B8A5;
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{
  background:var(--black);color:var(--paper);
  font-family:'Hanken Grotesk',sans-serif;font-weight:400;
  font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--volt);color:var(--black)}
.wrap{max-width:1400px;margin:0 auto;padding:0 36px}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--volt);outline-offset:3px}

/* ---------- preloader (volt) ---------- */
#pre{position:fixed;inset:0;background:var(--volt);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding-bottom:30px;transition:transform .8s var(--ease-out)}
#pre.done{transform:translateY(-100%)}
#pre .t{font-weight:800;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
html.no-motion #pre{display:none}

/* ---------- type: mixed-font headlines ---------- */
.mix{font-weight:700;text-transform:uppercase;letter-spacing:-.035em;line-height:.94}
.mix .slab{font-family:'Alfa Slab One',serif;font-weight:400;letter-spacing:-.01em}
.mix.h1{font-size:clamp(46px,6.6vw,98px)}
.mix.h2{font-size:clamp(38px,5.2vw,74px)}
.statement{font-weight:400;text-transform:uppercase;letter-spacing:-.01em;line-height:1.06;font-size:clamp(42px,7.3vw,106px);color:var(--sage)}
.label{font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--sage2)}

/* ---------- nav ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;display:flex;justify-content:space-between;align-items:center;padding:20px 36px;mix-blend-mode:difference;color:#fff}
nav .brand{font-weight:800;font-size:18px;letter-spacing:-.01em;text-transform:uppercase}
nav .brand span{color:var(--volt)}
nav .links{display:flex;gap:30px}
nav .links a{font-size:13.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.85;transition:opacity var(--dur-hover) var(--ease-quick)}
nav .links a:hover{opacity:1}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;background:var(--olive)}
.hero .ph{position:absolute;inset:0}
.hero .ph img{width:100%;height:100%;object-fit:cover;object-position:50% 20%;filter:grayscale(1) contrast(1.1) brightness(.8);mix-blend-mode:luminosity;opacity:.85}
.hero .ph.phx{position:absolute}
.hero .tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(40,44,32,.5) 0%,rgba(40,44,32,.15) 45%,rgba(17,17,18,.88) 100%)}
.hero .inner{position:relative;z-index:2;padding:0 36px 44px}
.hero .kick{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.hero .kick .chip{background:var(--volt);color:var(--ink);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:8px 14px}
.hero .statement{max-width:14ch}
.hero .bot{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-top:34px;flex-wrap:wrap}
.hero .bot .r{font-size:15px;color:var(--sage2);max-width:38ch;text-align:right}

/* ---------- marquee ---------- */
.marq{background:var(--volt);color:var(--ink);overflow:hidden;padding:14px 0}
.marq .track{display:flex;gap:0;white-space:nowrap;width:max-content;will-change:transform}
.marq span{font-weight:800;text-transform:uppercase;font-size:17px;letter-spacing:.02em;padding-right:44px}

/* ---------- sections ---------- */
section{padding:var(--sec) 0}

/* ---------- career timeline ---------- */
.career{background:var(--ink)}
.career .label{display:block;margin-bottom:44px}
.career .row{position:relative;border-top:1px solid rgba(244,244,237,.14);padding:30px 0}
.career .row:last-of-type{border-bottom:1px solid rgba(244,244,237,.14)}
.career .rin{display:grid;grid-template-columns:130px 1fr auto;gap:28px;align-items:baseline;transition:transform var(--dur-hover) var(--ease-quick)}
.career .row:hover .rin{transform:translateX(16px)}
.career .yr{font-family:'Alfa Slab One',serif;font-size:clamp(20px,2.2vw,30px);color:var(--volt)}
.career .nm{font-weight:700;text-transform:uppercase;letter-spacing:-.02em;font-size:clamp(22px,2.8vw,40px);line-height:1.05}
.career .ds{font-size:14px;color:var(--sage2);max-width:30ch}

/* ---------- disciplines ---------- */
.disc{background:var(--paper);color:var(--ink)}
.disc .head{display:flex;justify-content:space-between;align-items:end;gap:30px;margin-bottom:64px;flex-wrap:wrap}
.disc .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.dcard{background:#fff;border:1px solid rgba(17,17,18,.1);padding:30px 28px 34px;position:relative;transition:transform .4s var(--ease-quick),box-shadow .4s var(--ease-quick)}
.dcard:hover,.dcard:focus-within{transform:translateY(-6px);box-shadow:0 20px 44px rgba(17,17,18,.12)}
.dcard .num{font-family:'Alfa Slab One',serif;font-size:clamp(44px,4.4vw,64px);line-height:1;color:var(--sage2);transition:color var(--dur-hover) var(--ease-quick)}
.dcard:hover .num{color:var(--volt);-webkit-text-stroke:1.5px var(--ink)}
.dcard h3{font-weight:800;text-transform:uppercase;letter-spacing:-.01em;font-size:20px;margin:18px 0 8px}
.dcard p{font-size:14.5px;color:#4A4D42;line-height:1.55}
.dcard .tag{position:absolute;top:26px;right:24px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sage2)}

/* ---------- quote band photo ---------- */
.qband{position:relative;min-height:88vh;display:flex;align-items:flex-end;overflow:hidden}
.qband .bg{position:absolute;inset:0}
.qband .bg img{width:100%;height:100%;object-fit:cover;filter:grayscale(.6) contrast(1.08) brightness(.6)}
.qband .inr{position:relative;z-index:2;padding:0 36px 54px}
.qband .mix{color:var(--paper);max-width:14ch}
.qband .mix .slab{color:var(--volt)}
.qband .attr{margin-top:22px;font-size:13px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--sage2)}

/* ---------- voices ---------- */
.voices{background:var(--olive)}
.voices .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:64px}
.vcard{background:var(--olive2);padding:30px 28px;display:flex;flex-direction:column;gap:20px;min-height:230px;border-left:3px solid transparent;transition:border-color var(--dur-hover) var(--ease-quick),transform .35s var(--ease-quick)}
.vcard:hover{border-color:var(--volt);transform:translateY(-4px)}
.vcard .q{font-size:15px;line-height:1.6;color:var(--sage)}
.vcard .q b{color:var(--paper);font-weight:700}
.vcard .who{margin-top:auto}
.vcard .nm2{font-weight:800;text-transform:uppercase;font-size:13.5px;letter-spacing:.04em}
.vcard .rl{font-size:12px;color:var(--sage2);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}

/* ---------- stats volt (odómetro) ---------- */
.stats{background:var(--volt);color:var(--ink);padding:calc(var(--sec)*.85) 0}
.stats .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;align-items:end}
.stat .n{font-family:'Alfa Slab One',serif;font-size:clamp(64px,8vw,120px);line-height:.95;display:flex}
.stat .dig{display:block;height:1em;overflow:hidden;position:relative}
.stat .reel{display:block;will-change:transform}
.stat .reel b{display:block;height:1em;font-weight:400}
.stat .l{margin-top:12px;font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:.1em;max-width:24ch}

/* ---------- contact ---------- */
.contact{background:var(--ink);padding-bottom:40px}
.contact .lay{display:grid;grid-template-columns:1.2fr 1fr;gap:70px;align-items:start}
.contact .mix{color:var(--paper)}
.contact .mix .slab{color:var(--volt)}
.contact p.body{margin-top:24px;color:var(--sage2);max-width:46ch;font-size:16px}
.cform{display:flex;flex-direction:column;gap:12px}
.cform input,.cform textarea{background:transparent;border:1px solid rgba(244,244,237,.2);color:var(--paper);font-family:'Hanken Grotesk',sans-serif;font-size:15px;padding:16px;outline:none;resize:none}
.cform input:focus,.cform textarea:focus{border-color:var(--volt)}
.cform ::placeholder{color:rgba(244,244,237,.4)}
.cform button{margin-top:14px;background:var(--volt);color:var(--ink);border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.08em;padding:18px 34px;align-self:flex-start;transition:transform var(--dur-hover) var(--ease-quick)}
.cform button:hover{transform:translateY(-2px)}
.cform button:active{transform:scale(.97)}
.cform .fine{font-size:11.5px;color:var(--sage2)}
.fmeta{display:flex;gap:54px;flex-wrap:wrap;margin-top:44px}
.fmeta .m .k{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sage2)}
.fmeta .m .v{margin-top:6px;font-weight:700;font-size:16px}
.fbot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid rgba(244,244,237,.14);margin-top:80px;padding-top:24px;font-size:12.5px;color:var(--sage2)}

/* ---------- reveals / placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
.ruled{border-top-color:transparent!important}
.ruled.rb{border-bottom-color:transparent!important}
.rline{position:absolute;left:0;right:0;top:-1px;height:1px;background:rgba(244,244,237,.14);transform-origin:left;display:block}
.rline.bot{top:auto;bottom:-1px}
.phx{display:flex;align-items:center;justify-content:center;background:#20241a;color:rgba(244,244,237,.4);font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--sage2);font-size:14px}

/* ---------- responsive ---------- */
@media (max-width:1080px){
  .disc .grid,.voices .grid{grid-template-columns:1fr 1fr}
  .stats .grid{grid-template-columns:1fr;gap:54px}
}
@media (max-width:860px){
  :root{--sec:clamp(80px,11vh,110px)}
  .wrap{padding:0 20px}
  nav{padding:16px 20px}
  nav .links{display:none}
  .hero .inner{padding:0 20px 30px}
  .hero .bot .r{text-align:left}
  .disc .grid,.voices .grid{grid-template-columns:1fr}
  .contact .lay{grid-template-columns:1fr;gap:44px}
  .career .rin{grid-template-columns:70px 1fr;row-gap:8px}
  .career .ds{grid-column:2}
  .qband{min-height:70vh}
}
</style>
</head>
<body>
<div id="pre" aria-hidden="true"><div class="t" id="pret">Loading</div></div>
<nav><div class="brand" id="brand"></div><div class="links" id="navlinks"></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&lt;s&gt;/g,'<span class="slab">').replace(/&lt;\/s&gt;/g,'</span>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function bigimg(img,cls){
  if(img&&img.src)return'<div class="'+cls+'"><img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'"></div>';
  return'<div class="'+cls+' phx">'+esc((img&&img.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<section class="hero">'+bigimg(s.img,'ph')+'<div class="tint"></div>'+
  '<div class="inner" data-r2>'+
  '<div class="kick wr"><span class="chip">'+esc(s.chip)+'</span><span class="label">'+esc(s.loc)+'</span></div>'+
  '<h1 class="statement wr">'+rich(s.statement)+'</h1>'+
  '<div class="bot"><div class="mix h1 wr">'+rich(s.line)+'</div><p class="r wr">'+rich(s.sub)+'</p></div>'+
  '</div></section>'},
marq:function(s){
  var items=(s.items||[]).map(function(t){return'<span>'+esc(t)+' <b style="color:rgba(17,17,18,.35)">·</b></span>'}).join('');
  return'<div class="marq" aria-hidden="true"><div class="track" id="mq">'+items+items+'</div></div>'},
career:function(s){
  return'<section class="career"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<span class="label wr" data-r1>'+esc(s.label)+'</span>'+
  (s.rows||[]).map(function(r,i){return'<div class="row wr" data-r1 data-rule'+(i===(s.rows.length-1)?' data-rule-bot':'')+'><div class="rin"><span class="yr">'+esc(r.yr)+'</span><span class="nm">'+esc(r.nm)+'</span><span class="ds">'+rich(r.ds)+'</span></div></div>'}).join('')+
  '</div></section>'},
disc:function(s){
  return'<section class="disc"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<div class="head" data-r2><h2 class="mix h2 wr">'+rich(s.title)+'</h2><span class="label wr">'+esc(s.label)+'</span></div>'+
  '<div class="grid" data-cards>'+(s.cards||[]).map(function(c,i){return'<div class="dcard wr" tabindex="0"><span class="num">'+('0'+(i+1)).slice(-2)+'</span><span class="tag">'+esc(c.tag)+'</span><h3>'+esc(c.nm)+'</h3><p>'+rich(c.ds)+'</p></div>'}).join('')+'</div>'+
  '</div></section>'},
qband:function(s){
  return'<section class="qband" style="padding:0">'+bigimg(s.img,'bg')+
  '<div class="inr" data-r2><div class="mix h2 wr">'+rich(s.line)+'</div><div class="attr wr">'+esc(s.attr)+'</div></div>'+
  '</section>'},
voices:function(s){
  return'<section class="voices"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<h2 class="mix h2 wr" data-r1>'+rich(s.title)+'</h2>'+
  '<div class="grid" data-cards>'+(s.cards||[]).map(function(v){return'<div class="vcard wr"><p class="q">'+rich(v.q)+'</p><div class="who"><div class="nm2">'+esc(v.n)+'</div><div class="rl">'+esc(v.r)+'</div></div></div>'}).join('')+'</div>'+
  '</div></section>'},
stats:function(s){
  return'<section class="stats"><div class="wrap"><div class="grid" data-cards>'+
  (s.items||[]).map(function(st){
    var v=String(Math.max(0,Math.round(st.val)));
    if(st.pad)while(v.length<st.pad)v='0'+v;
    return'<div class="stat wr"><span class="n" data-odo="'+esc(String(st.val))+'" data-pad="'+esc(String(st.pad||0))+'">'+
      v.split('').map(function(d){return'<span class="dig"><b>'+d+'</b></span>'}).join('')+
    '</span><div class="l">'+esc(st.label)+'</div></div>'}).join('')+
  '</div></div></section>'},
contact:function(s){
  var f=s.form||{};
  return'<section class="contact"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<div class="lay"><div data-r2>'+
    '<h2 class="mix h2 wr">'+rich(s.title)+'</h2>'+
    '<p class="body wr">'+rich(s.body)+'</p>'+
    '<div class="fmeta wr">'+(s.meta||[]).map(function(m){return'<div class="m"><div class="k">'+esc(m.k)+'</div><div class="v">'+esc(m.v)+'</div></div>'}).join('')+'</div>'+
  '</div>'+
  '<form class="cform wr" data-r1 onsubmit="return false">'+
    (f.fields||[]).map(function(n){return'<input type="text" placeholder="'+esc(n)+'" aria-label="'+esc(n)+'">'}).join('')+
    (f.msg?'<textarea rows="4" placeholder="'+esc(f.msg)+'" aria-label="'+esc(f.msg)+'"></textarea>':'')+
    '<button type="submit">'+esc(f.btn||'Send')+'</button>'+
    (f.fine?'<p class="fine">'+esc(f.fine)+'</p>':'')+
  '</form></div>'+
  '<div class="fbot">'+(s.foot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'}
};

fetch('/v15-norris/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.brand)document.getElementById('brand').innerHTML=esc(c.brand.t)+'<span>'+esc(c.brand.accent||'')+'</span>';
  document.getElementById('navlinks').innerHTML=(c.nav||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
  if(c.pre)document.getElementById('pret').textContent=c.pre;
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  /* preloader */
  gsap.delayedCall(.9,function(){document.getElementById('pre').classList.add('done')});

  /* R1 rise */
  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  /* R2 stagger decreciente */
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  /* R3 hairline-draw */
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.classList.add('ruled');
    var l=document.createElement('i');l.className='rline';el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
    if(el.hasAttribute('data-rule-bot')){
      el.classList.add('rb');
      var lb=document.createElement('i');lb.className='rline bot';el.appendChild(lb);
      gsap.fromTo(lb,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
        scrollTrigger:{trigger:el,start:'top 92%',once:true}});
    }
  });
  /* R4 card-settle */
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });
  /* marquee mapeado al paso del viewport */
  var mq=document.getElementById('mq');
  if(mq){
    ScrollTrigger.create({trigger:'.marq',start:'top bottom',end:'bottom top',scrub:.4,
      onUpdate:function(self){mq.style.transform='translateX('+(-self.progress*30)+'%)'}});
  }
  /* R5 odómetro */
  var odos=Array.prototype.slice.call(document.querySelectorAll('[data-odo]'));
  if(odos.length){
    var reelHTML='<span class="reel">'+ '0123456789 0'.replace(/ /g,'').split('').map(function(d){return'<b>'+d+'</b>'}).join('')+'</span>';
    odos.forEach(function(n){
      n.querySelectorAll('.dig').forEach(function(dg){dg.innerHTML=reelHTML});
    });
    var STEP=100/11;
    ScrollTrigger.create({trigger:'.stats',start:'top 80%',end:'top 35%',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        odos.forEach(function(n){
          var target=parseFloat(n.getAttribute('data-odo'))||0;
          var v=target*p;
          var digs=n.querySelectorAll('.dig .reel');
          var m=digs.length;
          digs.forEach(function(reel,idx){
            var k=m-1-idx; /* 0=unidades */
            var dv;
            if(k===0){dv=v%10}
            else{
              var base=Math.floor(v/Math.pow(10,k))%10;
              var lower=(v/Math.pow(10,k-1))%10;
              dv=base+(lower>9?lower-9:0);
            }
            reel.style.transform='translateY('+(-dv*STEP)+'%)';
          });
        })}});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('nav a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
