<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Counsel by Camille — Lead with Clarity</title>
<meta name="description" content="Quiet-luxury coaching template concept: deep navy, extra-light serif, tan accents. Placeholder content.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,200;0,300;1,300&family=Archivo:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --navy:#0E1623; --navy2:#2A3446; --navy3:#47526B; --cream:#FBF7F3; --sandx:#F2E9DE; --tan:#C8A789;
  --serif:'Noto Serif',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--cream);color:var(--navy2);font-family:'Archivo',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--tan);color:var(--navy)}
.lbl{font-size:10px;font-weight:600;letter-spacing:.26em;text-transform:uppercase}
.ser{font-family:var(--serif);font-weight:200}
.it{font-style:italic;font-weight:300}
.und{border-bottom:1px solid var(--tan);padding-bottom:2px}

/* ---------- nav ---------- */
.nav{position:sticky;top:0;z-index:60;background:rgba(14,22,35,.96);backdrop-filter:blur(8px);
  color:var(--cream);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 28px;gap:20px}
.nav .l,.nav .r{display:flex;gap:24px;align-items:center}
.nav .r{justify-content:flex-end}
.nav a{font-size:9.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;opacity:.85;transition:opacity .3s}
.nav a:hover{opacity:1}
.nav .lg{font-family:var(--serif);font-weight:200;font-size:19px;text-align:center}
.nav .lg em{font-style:italic;font-weight:300}
.nav .sep{width:1px;height:12px;background:rgba(251,247,243,.3)}

/* ---------- hero ---------- */
.hero{position:relative;min-height:92vh;background:var(--navy);color:var(--cream);overflow:hidden;display:flex;align-items:center}
.hero .ph{position:absolute;inset:0}
.hero .ph img{width:100%;height:100%;object-fit:cover;object-position:70% 20%;
  filter:grayscale(.3) brightness(.6) contrast(1.05)}
.hero .ph::after{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(14,22,35,.88) 0%,rgba(14,22,35,.4) 55%,rgba(14,22,35,.15) 100%)}
.hero .in{position:relative;z-index:2;padding:0 8vw;max-width:760px}
.hero h1{font-family:var(--serif);font-weight:200;font-size:clamp(34px,4.6vw,64px);line-height:1.35}
.hero h1 .it{font-weight:300}
.hero .sub{margin-top:30px;font-size:10.5px;font-weight:600;letter-spacing:.28em;
  text-transform:uppercase;color:var(--tan);line-height:2.1}
.hero .cta{display:inline-block;margin-top:36px;font-size:10px;font-weight:600;letter-spacing:.24em;
  text-transform:uppercase;color:var(--navy);background:var(--cream);padding:16px 30px;transition:background .3s}
.hero .cta:hover{background:var(--tan)}

/* ---------- pillars ---------- */
.pillars{padding:var(--sec) 8vw;background:var(--cream)}
.pillars .head{text-align:center;max-width:720px;margin:0 auto 80px}
.pillars h2{font-family:var(--serif);font-weight:200;font-size:clamp(28px,3.6vw,48px);line-height:1.35}
.pillars .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(42,52,70,.15);max-width:1100px;margin:0 auto}
.pcell{background:var(--cream);padding:44px 36px 50px;text-align:center}
.pcell .n{font-family:var(--serif);font-weight:200;font-size:40px;color:var(--tan)}
.pcell h3{font-family:var(--serif);font-weight:300;font-size:21px;margin-top:16px}
.pcell p{margin-top:12px;font-size:13px;line-height:1.75;color:#6B7386}

/* ---------- about split ---------- */
.about{background:var(--sandx);padding:var(--sec) 8vw}
.about .in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:.85fr 1.15fr;gap:80px;align-items:center}
.about .ph{aspect-ratio:3/4;overflow:hidden}
.about .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(.25) contrast(1.02)}
.about h2{font-family:var(--serif);font-weight:200;font-size:clamp(28px,3.6vw,46px);line-height:1.3}
.about p{margin-top:24px;font-size:14.5px;line-height:1.85;color:#5E5548}
.about .sig{margin-top:30px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:22px;color:var(--navy2)}

/* ---------- offerings ---------- */
.offer{padding:calc(var(--sec)*.9) 8vw;background:var(--cream)}
.offer .head{display:flex;justify-content:space-between;align-items:baseline;max-width:1100px;margin:0 auto 60px;flex-wrap:wrap;gap:14px}
.offer h2{font-family:var(--serif);font-weight:200;font-size:clamp(28px,3.8vw,48px)}
.offer .lbl{color:var(--tan)}
.orow{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:auto 1fr auto;gap:30px;
  align-items:center;padding:34px 6px;border-top:1px solid rgba(42,52,70,.18);transition:background .25s}
.orow:last-of-type{border-bottom:1px solid rgba(42,52,70,.18)}
.orow:hover{background:#F6F0E9}
.orow .n{font-size:10px;font-weight:600;letter-spacing:.22em;color:var(--tan)}
.orow .t{font-family:var(--serif);font-weight:200;font-size:clamp(22px,2.8vw,34px)}
.orow .t .it{font-weight:300}
.orow .d{font-size:12.5px;line-height:1.7;color:#6B7386;max-width:300px;text-align:right}

/* ---------- quote band ---------- */
.quote{background:var(--navy);color:var(--cream);padding:calc(var(--sec)*1.15) 8vw;text-align:center;position:relative;overflow:hidden}
.quote::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:70px;background:var(--tan)}
.quote q{display:block;font-family:var(--serif);font-weight:200;font-size:clamp(24px,3.2vw,42px);
  line-height:1.5;max-width:860px;margin:0 auto;quotes:'“' '”'}
.quote .who{margin-top:30px;font-size:9.5px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--tan)}

/* ---------- journal ---------- */
.journal{padding:var(--sec) 8vw;background:var(--cream)}
.journal .head{text-align:center;margin-bottom:60px}
.journal h2{font-family:var(--serif);font-weight:200;font-size:clamp(28px,3.6vw,46px)}
.jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;max-width:1100px;margin:0 auto}
.jcard{background:#fff;border:1px solid rgba(42,52,70,.12);padding:36px 32px 40px;transition:transform .35s,box-shadow .35s}
.jcard:hover{transform:translateY(-5px);box-shadow:0 22px 50px rgba(14,22,35,.1)}
.jcard .k{font-size:9.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--tan)}
.jcard h3{font-family:var(--serif);font-weight:300;font-size:20px;line-height:1.45;margin-top:14px;text-transform:capitalize}
.jcard .more{display:inline-block;margin-top:22px;font-size:10px;font-weight:600;letter-spacing:.22em;
  text-transform:uppercase;border-bottom:1px solid var(--tan);padding-bottom:3px}

/* ---------- close ---------- */
.close{background:var(--navy);color:var(--cream);padding:150px 8vw 60px;text-align:center}
.close h2{font-family:var(--serif);font-weight:200;font-size:clamp(30px,4.4vw,58px);line-height:1.3;max-width:760px;margin:0 auto}
.close .cta{display:inline-block;margin-top:44px;font-size:10px;font-weight:600;letter-spacing:.24em;
  text-transform:uppercase;color:var(--navy);background:var(--cream);padding:17px 34px;transition:background .3s}
.close .cta:hover{background:var(--tan)}
.close .fine{margin-top:120px;padding-top:24px;border-top:1px solid rgba(251,247,243,.15);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:9.5px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:#8B93A6}

/* ---------- reveals ---------- */
[data-hero]{opacity:0;}
[data-hero="2"]{animation-delay:.25s}


@media (max-width:920px){
  .nav{grid-template-columns:1fr auto}
  .nav .l{display:none}
  .pillars .grid,.jgrid{grid-template-columns:1fr}
  .about .in{grid-template-columns:1fr;gap:44px}
  .orow{grid-template-columns:1fr;gap:10px}
  .orow .d{text-align:left;max-width:none}
}

/* ---------- rework: el consejo se pronuncia ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid currentColor;outline-offset:3px}
.quote .qline{display:block;overflow:hidden}
.quote .qline i{display:block;font-style:inherit;transform:translateY(112%);will-change:transform}
html.no-motion .quote .qline i{transform:none}
.phx{display:flex;align-items:center;justify-content:center;background:#e8dfd3;color:#8B93A6;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px;width:100%;height:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#6B7386;font-size:14px}
</style></head>
<body>
<nav class="nav"><div class="l" id="navl"></div><span class="lg" id="nlogo"></span><div class="r" id="navr"></div></nav>
<main id="site"></main>
<noscript><div style="padding:6vh 28px;text-align:center;font-size:14px">Counsel by Camille — template concept</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<span class="it">').replace(/&lt;\/i&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  return'<header class="hero" id="top"><div class="ph">'+img(s.img)+'</div>'+
  '<div class="in" data-r2 style="position:relative;z-index:2">'+
  '<h1 class="ser wr">'+rich(s.title)+'</h1>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '</div></header>'},
pillars:function(s){
  return'<section class="pillars"><div class="head wr" data-r1><h2 class="ser">'+rich(s.head)+'</h2></div>'+
  '<div class="grid" data-cards>'+(s.cells||[]).map(function(cl){return'<div class="pcell wr"><span class="n">'+esc(cl.n)+'</span><div class="t ser">'+esc(cl.t)+'</div><p class="d">'+rich(cl.d)+'</p></div>'}).join('')+'</div>'+
  '</section>'},
about:function(s){
  return'<section class="about"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="in">'+
  '<div class="ph wr" data-r1>'+img(s.img)+'</div>'+
  '<div data-r2><span class="lbl wr" style="color:var(--tan)">'+esc(s.lbl)+'</span>'+
  '<h2 class="ser wr" style="margin-top:18px">'+rich(s.h)+'</h2>'+
  '<p class="wr">'+rich(s.p)+'</p><div class="sig wr">'+esc(s.sig)+'</div></div>'+
  '</div></section>'},
offer:function(s){
  return'<section class="offer"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="head" data-r2><h2 class="ser wr">'+esc(s.head)+'</h2><span class="lbl wr">'+esc(s.lbl)+'</span></div>'+
  (s.rows||[]).map(function(r,i){return'<div class="orow wr" data-r1 data-rule><span class="n">'+('0'+(i+1)).slice(-2)+'</span><span class="t ser">'+esc(r.t)+'</span><span class="d">'+rich(r.d)+'</span></div>'}).join('')+
  '</section>'},
quote:function(s){
  return'<section class="quote"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<q id="qlines">'+(s.lines||[]).map(function(l){return'<span class="qline"><i>'+esc(l)+'</i></span>'}).join('')+'</q>'+
  '<div class="who wr" data-r1>'+esc(s.who)+'</div>'+
  '</section>'},
journal:function(s){
  if(!(s.cards&&s.cards.length))return'';
  return'<section class="journal"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="head wr" data-r1><h2 class="ser">'+esc(s.head)+'</h2></div>'+
  '<div class="jgrid" data-cards>'+s.cards.map(function(cd){return'<div class="jcard wr"><span class="k">'+esc(cd.k)+'</span><div class="t ser">'+esc(cd.t)+'</div><a class="more" href="#close">Read</a></div>'}).join('')+'</div>'+
  '</section>'},
close:function(s){
  return'<section class="close"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<h2 class="ser wr">'+rich(s.title)+'</h2>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v36-kimberly/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('navl').innerHTML=(c.nav.l||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
    document.getElementById('nlogo').innerHTML=rich(c.nav.logo||'');
    document.getElementById('navr').innerHTML=(c.nav.r||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:.8});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.position='relative';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:0;height:1px;background:rgba(42,52,70,.15);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 el consejo se pronuncia: lineas enmascaradas por scrub encadenado */
  var q=document.getElementById('qlines');
  if(q){
    var lines=Array.prototype.slice.call(q.querySelectorAll('.qline i'));
    var n=lines.length;
    if(n){
      ScrollTrigger.create({trigger:'.quote',start:'top 78%',end:'center 48%',scrub:.6,
        onUpdate:function(self){var p=self.progress;
          lines.forEach(function(ln,i){
            var k=Math.max(0,Math.min(1,p*n-i*.85));
            var e=1-Math.pow(1-k,3);
            ln.style.transform='translateY('+((1-e)*112)+'%)';
          })}});
    }
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
