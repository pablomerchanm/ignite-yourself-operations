<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · v17 Everswap</title>
<meta name="description" content="Board-certified oral & maxillofacial surgeon. Twenty-seven years between Colombia and California on the reconstructions other surgeons refer out.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(100px,13vh,160px);

  --deep:#0D2018;
  --deep2:#132B1D;
  --pine:#203727;
  --cream:#FBFFF4;
  --cream-dim:rgba(251,255,244,.6);
  --cream-ghost:rgba(251,255,244,.28);
  --line:rgba(251,255,244,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{
  background:var(--deep);color:var(--cream);
  font-family:'Instrument Sans',sans-serif;font-weight:400;
  font-size:15.5px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--cream);color:var(--deep)}
.wrap{max-width:1280px;margin:0 auto;padding:0 40px}
.thin{font-family:'Cormorant',serif;font-weight:300;letter-spacing:.005em}

/* floating orbs */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;will-change:transform}
.o1{width:44vw;height:44vw;background:radial-gradient(circle,#1E4230 0%,transparent 70%);top:-10%;right:-8%}
.o2{width:34vw;height:34vw;background:radial-gradient(circle,#274A32 0%,transparent 70%);bottom:8%;left:-10%;animation-delay:-7s}
.o3{width:24vw;height:24vw;background:radial-gradient(circle,#16371F 0%,transparent 70%);top:44%;left:38%;animation-delay:-12s}
}
main{position:relative;z-index:1}

/* ---------- type ---------- */
.d-giant{font-size:clamp(72px,13vw,189px);line-height:.96}
.d-big{font-size:clamp(52px,7.2vw,104px);line-height:1}
.d-mid{font-size:clamp(38px,5.3vw,76px);line-height:1.04}
.lab{font-size:13px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-dim)}
.lab2{font-size:17px;font-weight:500;letter-spacing:.02em}

/* word reveal */

/* ---------- nav ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;background:rgba(13,32,24,.6);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.navin{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;max-width:1400px;margin:0 auto}
.nlogo{font-family:'Cormorant',serif;font-weight:400;font-size:24px;letter-spacing:.01em}
.nlinks{display:flex;gap:34px;align-items:center;font-size:14.5px}
.nlinks a{opacity:.85;transition:opacity .25s}
.nlinks a:hover{opacity:1}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--cream);color:var(--pine);border-radius:100px;padding:12px 24px;font-size:14.5px;font-weight:600;border:none;cursor:pointer;transition:transform var(--dur-hover) var(--ease-quick)}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--cream);border:1px solid var(--line)}
.btn.ghost:hover{background:rgba(251,255,244,.06)}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:130px 30px 60px;position:relative}
.hero .lab{margin-bottom:26px}
.hero h1.thin{max-width:14ch}
.hero .sub{margin-top:28px;color:var(--cream-dim);max-width:52ch;font-size:16.5px}
.hero .ctas{display:flex;gap:14px;margin-top:40px;flex-wrap:wrap;justify-content:center}
.hero .kws{display:flex;gap:34px;margin-top:70px;flex-wrap:wrap;justify-content:center}
.hero .kws span{font-family:'Cormorant',serif;font-weight:300;font-size:clamp(20px,2vw,28px);color:var(--cream-ghost);transition:color var(--dur-hover) var(--ease-quick)}
.hero .kws span{color:var(--cream)}

/* ---------- sections ---------- */
section{padding:var(--sec) 0;position:relative}
.center{text-align:center}

/* ---------- unified (one practice) ---------- */
.uni .word-stage{text-align:center;margin-top:60px}
.uni .word-stage .thin{display:block}
.uni .row3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:80px;border-radius:18px;overflow:hidden}
.uni .cell{background:var(--deep2);padding:44px 38px;min-height:280px;display:flex;flex-direction:column;transition:background .4s var(--ease-quick)}
.uni .cell:hover{background:var(--pine)}
.uni .cell .thin{font-size:clamp(30px,3vw,44px)}
.uni .cell p{color:var(--cream-dim);font-size:14.5px;margin-top:14px;max-width:40ch}
.uni .cell .tags{margin-top:auto;padding-top:26px;display:flex;gap:16px;flex-wrap:wrap}
.uni .cell .tags span{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-ghost)}

/* ---------- stats thin ---------- */
.stats .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;text-align:center}
.stat .n{font-family:'Cormorant',serif;font-weight:300;font-size:clamp(64px,8vw,120px);line-height:1}
.stat .l{margin-top:10px;color:var(--cream-dim);font-size:14px;letter-spacing:.06em;text-transform:uppercase}

/* ---------- photo panel ---------- */
.panel{padding:0 24px}
.panel .inr{position:relative;border-radius:24px;overflow:hidden;min-height:80vh;display:flex;align-items:flex-end}
.panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:sepia(.2) hue-rotate(60deg) saturate(.5) brightness(.62)}
.panel .txt{position:relative;z-index:2;padding:54px}
.panel .thin{max-width:18ch}
.panel .attr{margin-top:20px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-dim)}

/* ---------- voices ---------- */
.voices .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:70px}
.vcard{background:var(--deep2);border:1px solid var(--line);border-radius:18px;padding:34px 30px;display:flex;flex-direction:column;gap:22px;transition:transform .35s var(--ease-quick),border-color var(--dur-hover) var(--ease-quick)}
.vcard:hover{transform:translateY(-5px);border-color:rgba(251,255,244,.28)}
.vcard .q{font-size:15px;line-height:1.65;color:rgba(251,255,244,.85)}
.vcard .q em{font-family:'Cormorant',serif;font-style:italic;font-weight:400;font-size:1.15em;color:var(--cream)}
.vcard .who{margin-top:auto}
.vcard .nm{font-weight:600;font-size:14px}
.vcard .rl{font-size:12px;color:var(--cream-dim);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}

/* ---------- journey rows ---------- */
.journey .row{display:grid;grid-template-columns:90px 1fr auto;gap:30px;align-items:baseline;padding:32px 0;border-top:1px solid var(--line)}
.journey .row:last-of-type{border-bottom:1px solid var(--line)}
.journey .no{font-family:'Cormorant',serif;font-weight:300;font-size:30px;color:var(--cream-ghost)}
.journey .nm{font-family:'Cormorant',serif;font-weight:300;font-size:clamp(28px,3.4vw,48px);line-height:1}
.journey .ds{font-size:14px;color:var(--cream-dim);max-width:34ch}

/* ---------- close ---------- */
.close{padding-bottom:60px}
.close .card{background:linear-gradient(160deg,var(--pine),var(--deep2));border:1px solid var(--line);border-radius:26px;padding:90px 60px;text-align:center}
.close .thin{max-width:16ch;margin:18px auto 0}
.close .sub{color:var(--cream-dim);margin-top:22px}
.close .ctas{display:flex;gap:14px;justify-content:center;margin-top:40px;flex-wrap:wrap}
.fbot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid var(--line);margin-top:80px;padding-top:26px;font-size:12.5px;color:var(--cream-dim)}

/* ---------- responsive ---------- */
@media (max-width:1080px){
  .uni .row3{grid-template-columns:1fr}
  .voices .grid{grid-template-columns:1fr 1fr}
  .stats .grid{grid-template-columns:1fr;gap:50px}
}
@media (max-width:860px){
  .wrap{padding:0 22px}
  section{padding:95px 0}
  .navin{padding:14px 22px}
  .nlinks a:not(.btn){display:none}
  .voices .grid{grid-template-columns:1fr}
  .journey .row{grid-template-columns:50px 1fr;row-gap:8px}
  .journey .ds{grid-column:2}
  .panel .txt{padding:30px 24px}
  .close .card{padding:60px 26px}
}

/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--cream);outline-offset:3px}
.btn:active{transform:scale(.97)}
.stats{padding:calc(var(--sec)*.8) 0}
.phx{display:flex;align-items:center;justify-content:center;background:#10241a;color:rgba(251,255,244,.4);font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.panel .inr.phx{position:relative;min-height:80vh}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--cream-dim);font-size:14px}
</style></head>
<body>
<div class="orbs" aria-hidden="true"><div class="orb o1" data-orb="1"></div><div class="orb o2" data-orb="2"></div><div class="orb o3" data-orb="3"></div></div>
<nav><div class="navin"><a class="nlogo" href="#top" id="nlogo"></a><div class="nlinks" id="nlinks"></div></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}

var partials={
hero:function(s){
  return'<section class="hero" id="top" data-scene="'+esc(s.scene||'')+'"><div data-r2>'+
  '<div class="lab wr">'+esc(s.lab)+'</div>'+
  '<h1 class="thin d-big wr">'+rich(s.title)+'</h1>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '<div class="ctas wr">'+(s.ctas||[]).map(function(c){return'<a class="btn'+(c.ghost?' ghost':'')+'" href="'+esc(c.h)+'">'+esc(c.t)+'</a>'}).join('')+'</div>'+
  '<div class="kws wr">'+(s.kws||[]).map(function(k){return'<span>'+esc(k)+'</span>'}).join('')+'</div>'+
  '</div></section>'},
uni:function(s){
  return'<section class="uni" id="'+esc(s.id||'uni')+'" data-scene="'+esc(s.scene||'')+'"><div class="wrap">'+
  '<div class="center" data-r2><div class="lab wr">'+esc(s.lab)+'</div>'+
  '<div class="word-stage wr"><span class="thin d-mid">'+rich(s.head)+'</span></div></div>'+
  '<div class="row3" data-cards>'+(s.cells||[]).map(function(c){return'<div class="cell wr"><span class="thin">'+esc(c.t)+'</span><p>'+rich(c.d)+'</p>'+
    '<div class="tags">'+(c.tags||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div></div>'}).join('')+'</div>'+
  '</div></section>'},
stats:function(s){
  return'<section class="stats" data-scene="'+esc(s.scene||'')+'"><div class="wrap"><div class="grid" data-cards>'+
  (s.items||[]).map(function(st){return'<div class="stat wr"><div class="n thin">'+esc(st.n)+'</div><div class="l">'+esc(st.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
panel:function(s){
  var inner;
  if(s.img&&s.img.src)inner='<img src="'+esc(s.img.src)+'" alt="'+esc(s.img.alt||'')+'">';
  else inner='';
  return'<section class="panel" data-scene="'+esc(s.scene||'')+'"><div class="inr'+(s.img&&s.img.src?'':' phx')+'">'+inner+
  (s.img&&s.img.src?'':'<span style="position:absolute;inset:auto auto 50% 50%;transform:translate(-50%,50%)">'+esc((s.img&&s.img.label)||'FOTO')+'</span>')+
  '<div class="txt" data-r2><div class="thin d-mid wr">'+rich(s.quote)+'</div><div class="attr wr">'+esc(s.attr)+'</div></div>'+
  '</div></section>'},
voices:function(s){
  return'<section class="voices" id="'+esc(s.id||'voices')+'" data-scene="'+esc(s.scene||'')+'"><div class="wrap">'+
  '<div class="center" data-r2><div class="lab wr">'+esc(s.lab)+'</div><div class="thin d-mid wr">'+rich(s.head)+'</div></div>'+
  '<div class="grid" data-cards>'+(s.cards||[]).map(function(v){return'<div class="vcard wr"><p class="q">'+rich(v.q)+'</p><div class="who"><div class="nm">'+esc(v.n)+'</div><div class="rl">'+esc(v.r)+'</div></div></div>'}).join('')+'</div>'+
  '</div></section>'},
journey:function(s){
  return'<section class="journey" id="'+esc(s.id||'journey')+'" data-scene="'+esc(s.scene||'')+'"><div class="wrap">'+
  '<div class="lab wr" data-r1 style="margin-bottom:40px">'+esc(s.lab)+'</div>'+
  (s.rows||[]).map(function(r){return'<div class="row wr" data-r1 data-rule><span class="no">'+esc(r.no)+'</span><span class="nm">'+esc(r.nm)+'</span><span class="ds">'+rich(r.ds)+'</span></div>'}).join('')+
  '</div></section>'},
close:function(s){
  return'<section class="close" id="'+esc(s.id||'close')+'" data-scene="'+esc(s.scene||'')+'"><div class="wrap">'+
  '<div class="card" data-r2>'+
  '<div class="lab wr">'+esc(s.kick)+'</div>'+
  '<div class="thin d-mid wr">'+rich(s.title)+'</div>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '<div class="ctas wr">'+(s.meta||[]).map(function(m,i){return i===0?'<a class="btn" href="tel:+13103274166">'+esc(m)+'</a>':'<span class="btn ghost" style="cursor:default">'+esc(m)+'</span>'}).join('')+'</div>'+
  '</div>'+
  '<div class="fbot">'+(s.foot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'}
};

fetch('/v17-everswap/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  document.getElementById('nlogo').textContent=c.logo||'Arce';
  document.getElementById('nlinks').innerHTML=(c.nav||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function hex2rgb(x){x=x.replace('#','');return[parseInt(x.substr(0,2),16),parseInt(x.substr(2,2),16),parseInt(x.substr(4,2),16)]}

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({lerp:.25});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.position='relative';el.style.borderTopColor='transparent';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:-1px;height:1px;background:var(--line);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 escena-luz: interpolación continua de fondo + deriva de orbes */
  var scenes=[];
  document.querySelectorAll('[data-scene]').forEach(function(sec){
    var hx=sec.getAttribute('data-scene');
    if(hx&&/^#[0-9a-fA-F]{6}$/.test(hx))scenes.push({el:sec,rgb:hex2rgb(hx)});
  });
  var o1=document.querySelector('[data-orb="1"]'),o2=document.querySelector('[data-orb="2"]'),o3=document.querySelector('[data-orb="3"]');
  if(scenes.length>1){
    var stops=[];
    function measure(){
      var doc=document.documentElement.scrollHeight-window.innerHeight;
      stops=scenes.map(function(s){
        var r=s.el.getBoundingClientRect();
        var mid=r.top+window.scrollY+r.height/2-window.innerHeight/2;
        return{t:Math.max(0,Math.min(1,doc>0?mid/doc:0)),rgb:s.rgb};
      }).sort(function(a,b){return a.t-b.t});
    }
    measure();
    ScrollTrigger.addEventListener('refresh',measure);
    ScrollTrigger.create({start:0,end:'max',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        var a=stops[0],b=stops[stops.length-1];
        for(var i=0;i<stops.length-1;i++){
          if(p>=stops[i].t&&p<=stops[i+1].t){a=stops[i];b=stops[i+1];break}
          if(p<stops[0].t){a=b=stops[0];break}
        }
        var k=(a===b)?0:(p-a.t)/(b.t-a.t);
        var rgb=[0,1,2].map(function(j){return Math.round(a.rgb[j]+(b.rgb[j]-a.rgb[j])*k)});
        document.body.style.backgroundColor='rgb('+rgb.join(',')+')';
        if(o1)o1.style.transform='translateY('+(p*26)+'vh)';
        if(o2)o2.style.transform='translate('+(p*8)+'vw,'+(-p*18)+'vh)';
        if(o3)o3.style.transform='scale('+(1+p*.28)+')';
      }});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
