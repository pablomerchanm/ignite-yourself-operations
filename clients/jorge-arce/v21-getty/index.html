<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracing a Surgeon — the Craft of Dr. Jorge Arce</title>
<meta name="description" content="A provenance essay. How a surgeon from Colombia became the South Bay's answer for the difficult cases — traced across twenty-seven years.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(110px,15vh,170px);

  --black:#111111; --white:#FFFFFF; --grey:#6E6E6E; --border:rgba(186,186,186,.4);
  --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{background:var(--white);color:var(--black);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--black);color:var(--white)}
.wrap{max-width:1180px;margin:0 auto;padding:0 40px}

/* ---------- chrome ---------- */
.logo{position:fixed;top:24px;left:32px;z-index:60;font-family:var(--serif);font-size:27px;
  font-weight:500;letter-spacing:-.01em;mix-blend-mode:difference;color:#fff}
.menu{position:fixed;top:20px;right:20px;z-index:60;width:44px;height:44px;background:var(--black);
  border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.menu span{display:block;width:18px;height:1.6px;background:#fff}
.progress{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:60;width:32px;height:76px;
  background:#EDEDED;border-radius:16px;display:flex;align-items:flex-start;justify-content:center;padding:9px 0}
.progress .track{width:2.5px;height:100%;background:rgba(17,17,17,.14);border-radius:2px;position:relative}
.progress .fill{position:absolute;inset:0;background:var(--black);border-radius:2px;transform-origin:top;transform:scaleY(0)}
html.no-motion .progress{display:none}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 0 80px}
.hero .cap{font-size:13px;font-weight:500;letter-spacing:.01em;margin-bottom:26px}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(34px,4.4vw,58px);line-height:1.28;
  letter-spacing:-.005em;max-width:1020px;margin:0 auto}
.hero h1 em{font-style:italic}
.hero .dn{margin-top:60px;font-size:12px;color:var(--grey);letter-spacing:.02em}

/* ---------- title plate ---------- */
.plate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:80px 0 0;overflow:hidden}
.plate .t{font-family:var(--serif);font-weight:400;line-height:.98;letter-spacing:-.015em;
  font-size:clamp(64px,9.6vw,138px)}
.plate .t .it{font-style:italic}
.plate .t .row2{display:block}
.stack{position:relative;width:min(760px,90%);margin:70px auto 0;height:min(58vw,470px)}
.stack img{position:absolute;object-fit:cover;box-shadow:0 30px 70px rgba(0,0,0,.18)}
.stack .s1{width:44%;aspect-ratio:4/5;left:6%;top:12%;transform:rotate(-2deg);z-index:1;filter:grayscale(.15)}
.stack .s2{width:50%;aspect-ratio:4/5;left:25%;top:0;z-index:3}
.stack .s3{width:42%;aspect-ratio:4/5;right:4%;top:16%;transform:rotate(2.2deg);z-index:2;filter:grayscale(.35)}

/* ---------- essay ---------- */
.essay{padding:var(--sec) 0}
.essay .lede{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.1vw,42px);line-height:1.34;
  letter-spacing:-.005em;max-width:900px}
.essay .lede em{font-style:italic}
.essay .lede+.lede{margin-top:70px}
.essay .lede b{font-weight:500}
.para{max-width:640px;margin:60px 0 0;font-size:17px;line-height:1.8;color:#333}
.para+.para{margin-top:26px}

/* figure + tombstone */
.fig{margin:110px 0}
.fig.right{display:grid;grid-template-columns:1.25fr .75fr;gap:50px;align-items:end}
.fig.left{display:grid;grid-template-columns:.75fr 1.25fr;gap:50px;align-items:end}
.fig.left .tomb{order:-1;text-align:right}
.fig img{width:100%;object-fit:cover;filter:grayscale(.1) contrast(1.02)}
.fig .r43{aspect-ratio:4/3}.fig .r45{aspect-ratio:4/5}
.tomb{padding-bottom:6px}
.tomb .t1{font-size:14px;font-weight:500;line-height:1.5}
.tomb .t1 em{font-family:var(--serif);font-style:italic;font-weight:400;font-size:15px}
.tomb .t2{font-size:14px;color:var(--grey);line-height:1.5;margin-top:3px}

/* giant name */
.giant{padding:140px 0 120px;text-align:center;border-top:1px solid var(--border)}
.giant .cap{font-size:13px;font-weight:500;margin-bottom:10px}
.giant .name{font-family:var(--serif);font-weight:400;font-size:clamp(90px,15.8vw,207px);
  line-height:.92;letter-spacing:-.02em}
.giant .name .it{font-style:italic}
.giant .sub{margin-top:26px;font-size:14px;color:var(--grey)}

/* ---------- dark chapter (inverted) ---------- */
.dark{background:var(--black);color:var(--white);padding:calc(var(--sec)*1.2) 0}
.dark .k{font-size:13px;font-weight:500;letter-spacing:.01em;color:rgba(255,255,255,.6);margin-bottom:60px}
.mile{display:grid;grid-template-columns:.65fr 1.35fr;gap:60px;padding:64px 0;border-top:1px solid rgba(255,255,255,.18)}
.mile:last-of-type{border-bottom:1px solid rgba(255,255,255,.18)}
.mile .yr{font-family:var(--serif);font-weight:400;font-size:clamp(56px,7vw,104px);line-height:.9;letter-spacing:-.015em}
.mile .yr em{font-style:italic;font-size:.5em;letter-spacing:0}
.mile p{font-family:var(--serif);font-size:clamp(20px,2.1vw,29px);line-height:1.45;font-weight:400;max-width:640px}
.mile p em{font-style:italic}
.mile .sm{margin-top:20px;font-family:var(--sans);font-size:14px;line-height:1.7;color:rgba(255,255,255,.6);max-width:520px}

/* ---------- collection list ---------- */
.coll{padding:var(--sec) 0}
.coll .lede{font-family:var(--serif);font-size:clamp(26px,3.1vw,42px);line-height:1.34;max-width:880px;font-weight:400}
.coll .lede em{font-style:italic}
.list{margin-top:90px;display:grid;grid-template-columns:1fr 1fr;gap:0 90px}
.list .item{padding:22px 0;border-top:1px solid var(--border)}
.list .t1{font-size:16px;font-weight:500}
.list .t2{font-size:14px;color:var(--grey);margin-top:3px}

/* ---------- voices ---------- */
.voices{padding:20px 0 150px}
.voices .q{max-width:820px;margin:0 auto;text-align:center;padding:70px 0;border-top:1px solid var(--border)}
.voices .q:first-child{border-top:0}
.voices .q p{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(22px,2.5vw,33px);line-height:1.42}
.voices .q .who{margin-top:26px;font-family:var(--sans);font-size:13.5px;font-weight:500}
.voices .q .who span{color:var(--grey);font-weight:400}

/* ---------- close ---------- */
.close{background:var(--black);color:#fff;padding:160px 0 60px;text-align:center}
.close .cap{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:22px}
.close h2{font-family:var(--serif);font-weight:400;font-size:clamp(40px,6vw,84px);line-height:1.06;letter-spacing:-.01em}
.close h2 em{font-style:italic}
.close .cta{display:inline-block;margin-top:50px;background:#fff;color:var(--black);font-size:14px;
  font-weight:500;padding:17px 34px;border-radius:99px;transition:transform .3s,box-shadow .3s}
.close .cta:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(255,255,255,.15)}
.close .fine{margin-top:110px;padding-top:26px;border-top:1px solid rgba(255,255,255,.18);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;color:rgba(255,255,255,.5)}

/* ---------- reveals ---------- */
}


/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--black);outline-offset:3px}
.dark a:focus-visible{outline-color:var(--white)}
[data-dev] img{will-change:filter}
html.no-motion [data-dev] img{filter:grayscale(.1) contrast(1.02)!important}
.phx{display:flex;align-items:center;justify-content:center;background:#e4e4e4;color:#8a8a8a;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.stack .phx{position:absolute;box-shadow:0 30px 70px rgba(0,0,0,.18)}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--grey);font-size:14px}
</style></head>
<body>
<div class="logo" id="logo"></div>
<div class="menu" aria-hidden="true"><span></span><span></span><span></span></div>
<div class="progress" aria-hidden="true"><div class="track"><div class="fill" id="pfill"></div></div></div>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;r&gt;/g,'<span class="row2">').replace(/&lt;\/r&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}

var partials={
hero:function(s){
  return'<section class="hero"><div class="wrap" data-r2>'+
  '<div class="cap wr">'+esc(s.cap)+'</div>'+
  '<h1 class="wr">'+rich(s.title)+'</h1>'+
  '<div class="dn wr">'+esc(s.dn)+'</div>'+
  '</div></section>'},
plate:function(s){
  return'<section class="plate"><div class="wrap">'+
  '<h2 class="t wr" data-r1>'+rich(s.title)+'</h2>'+
  '<div class="stack wr" data-r1 id="stack">'+
  (s.stack||[]).map(function(im,i){
    var cls='s'+(i+1);
    if(im.src)return'<img class="'+cls+'" src="'+esc(im.src)+'" alt="'+esc(im.alt||'')+'" data-dev>';
    return'<div class="'+cls+' phx" data-dev>'+esc(im.label||'PLACA')+'</div>'}).join('')+
  '</div></div></section>'},
essay:function(s){
  return'<section class="essay"><div class="wrap">'+
  (s.flow||[]).map(function(f){
    if(f.p)return'<p class="'+(f.p==='lede'?'lede':'para')+' wr" data-r1>'+rich(f.t)+'</p>';
    if(f.fig){var g=f.fig;
      var imgHTML=g.img&&g.img.src?'<img class="'+esc(g.ratio||'r43')+'" src="'+esc(g.img.src)+'" alt="'+esc(g.img.alt||'')+'" data-dev>':'<div class="'+esc(g.ratio||'r43')+' phx" style="aspect-ratio:4/3" data-dev>'+esc((g.img&&g.img.label)||'FOTO')+'</div>';
      var tomb='<div class="tomb"><div class="t1">'+esc(g.t1)+'</div><div class="t2">'+esc(g.t2)+'</div></div>';
      if(g.side==='left')return'<div class="fig left wr" data-r4>'+imgHTML+tomb+'</div>';
      return'<div class="fig right wr" data-r4>'+imgHTML+tomb+'</div>'}
    return''}).join('')+
  '</div></section>'},
giant:function(s){
  return'<section class="giant" id="giant"><div class="wrap" data-r2>'+
  '<div class="cap wr">'+esc(s.cap)+'</div>'+
  '<div class="name" id="gname">'+rich(s.name)+'</div>'+
  '<div class="sub" id="gsub">'+rich(s.sub)+'</div>'+
  '</div></section>'},
dark:function(s){
  return'<section class="dark"><div class="wrap">'+
  '<div class="k wr" data-r1>'+esc(s.k)+'</div>'+
  (s.miles||[]).map(function(m){return'<div class="mile wr" data-r1 data-rule>'+
    '<div class="yr">'+rich(m.yr)+'</div>'+
    '<div><p>'+rich(m.p)+'</p><p class="sm">'+rich(m.sm)+'</p></div>'+
  '</div>'}).join('')+
  '</div></section>'},
coll:function(s){
  var g=s.fig||{};
  return'<section class="coll"><div class="wrap">'+
  '<p class="lede wr" data-r1>'+rich(s.lede)+'</p>'+
  '<div class="list" data-cards>'+(s.list||[]).map(function(it){return'<div class="item wr"><div class="t1">'+esc(it.t1)+'</div><div class="t2">'+esc(it.t2)+'</div></div>'}).join('')+'</div>'+
  (g.img?'<div class="fig right wr" data-r4 style="margin-bottom:0">'+
    (g.img.src?'<img class="r43" src="'+esc(g.img.src)+'" alt="'+esc(g.img.alt||'')+'" data-dev>':'<div class="r43 phx" style="aspect-ratio:4/3" data-dev>'+esc(g.img.label||'FOTO')+'</div>')+
    '<div class="tomb"><div class="t1">'+esc(g.t1)+'</div><div class="t2">'+esc(g.t2)+'</div></div></div>':'')+
  '</div></section>'},
voices:function(s){
  return'<section class="voices"><div class="wrap">'+
  (s.quotes||[]).map(function(v){return'<div class="q wr" data-r1><p>'+esc(v.q)+'</p><div class="who"><b>'+esc(v.who)+'</b>'+esc(v.rl)+'</div></div>'}).join('')+
  '</div></section>'},
close:function(s){
  return'<section class="close"><div class="wrap" data-r2>'+
  '<div class="cap wr">'+esc(s.cap)+'</div>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'}
};

fetch('/v21-getty/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  document.getElementById('logo').textContent=c.logo||'Arce';
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:.8});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.borderTopColor='transparent';el.style.position='relative';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:-1px;height:1px;background:rgba(255,255,255,.18);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5a revelado de placas */
  var maxBlur=window.innerWidth>900?6:4;
  document.querySelectorAll('[data-dev]').forEach(function(el){
    ScrollTrigger.create({trigger:el,start:'top 92%',end:'top 40%',scrub:.6,
      onUpdate:function(self){var k=self.progress;
        el.style.filter='grayscale('+(1-.85*k)+') brightness('+(1.35-.35*k)+') blur('+((1-k)*maxBlur)+'px) contrast(1.02)';
      }});
  });
  /* R5b la sala del nombre (pin corto, solo desktop) */
  if(window.innerWidth>900){
    var name=document.getElementById('gname'),sub=document.getElementById('gsub');
    if(name){
      name.style.transform='scale(.96)';
      if(sub)sub.style.opacity=0;
      ScrollTrigger.create({trigger:'.giant',start:'top 18%',end:'+=55%',pin:true,scrub:.6,
        onUpdate:function(self){var p=self.progress;
          name.style.transform='scale('+(0.96+.04*Math.min(1,p*1.6))+')';
          if(sub)sub.style.opacity=Math.min(1,p*2);
        }});
    }
  }
  /* píldora de progreso global */
  var fill=document.getElementById('pfill');
  if(fill){
    ScrollTrigger.create({start:0,end:'max',scrub:.6,
      onUpdate:function(self){fill.style.transform='scaleY('+self.progress+')'}});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
