<style>
/* v5 ZENTRO rework — tokens: cambiar identidad = solo :root.

:root{

  --ease-quick:cubic-bezier(.33,1,.68,1);

  --line:rgba(12,15,20,.09);
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{
  background:var(--white);color:var(--ink);

}
img{display:block;max-width:100%}

.wrap{max-width:1392px;margin:0 auto;padding:0 24px}
.tight{font-family:'Inter Tight',sans-serif}
.bracket{font-size:14px;font-weight:500;letter-spacing:-.02em}

.glyph{font-size:20px;line-height:1}

/* ---------- display ---------- */
.mega{font-family:'Inter Tight',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.01em;line-height:1.02}

/* ---------- buttons ---------- */

.btn.blue{background:var(--blue);color:#fff}

/* ---------- topbar ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;color:#fff;mix-blend-mode:normal;transition:color .3s}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;background:linear-gradient(175deg,#2559F0 0%,#1B48E2 45%,#0F2FA8 100%);color:#fff;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.hero .duo{position:absolute;inset:0;display:flex;justify-content:center;align-items:flex-end}

.hero .head{position:absolute;top:17%;left:32px;z-index:2}
.hero h1{font-family:'Inter Tight',sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(44px,5.6vw,80px);line-height:1;max-width:11ch}
.hero h1 em{font-style:italic}
.hero .disciplines{display:flex;gap:26px;margin-top:26px;font-family:'Inter Tight',sans-serif;font-size:14.5px;font-weight:500;color:rgba(255,255,255,.85);flex-wrap:wrap}
.hero .disciplines span{display:flex;align-items:center;gap:8px}
.hero .socials{position:absolute;right:36px;top:44%;z-index:2;display:flex;gap:18px;font-size:15px;font-weight:500;color:rgba(255,255,255,.9)}
.hero .markrow{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;gap:30px;padding:0 24px;margin-bottom:-1vw}
.hero .mark{font-family:'Inter Tight',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.015em;line-height:.8;font-size:clamp(110px,17.5vw,252px);white-space:nowrap}
.hero .strip{display:flex;gap:8px;margin-bottom:3vw;flex:0 0 auto}

/* ---------- ticker ---------- */
.ticker{background:var(--ink);color:#fff;overflow:hidden;padding:18px 0}

.ticker span{font-family:'Inter Tight',sans-serif;font-size:16px;font-weight:500;display:flex;gap:44px;align-items:center}

to{transform:translateX(-50%)}}

/* ---------- stats ---------- */
.stats{background:var(--off)}
.stats .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:70px;align-items:start;margin-bottom:80px}
.stats .side{color:var(--gray);max-width:40ch;padding-top:8px}
.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.stat{background:#fff;border-radius:var(--r);padding:40px 38px}
.stat .n{font-family:'Inter Tight',sans-serif;font-weight:500;font-size:clamp(38px,3.4vw,46px);letter-spacing:-.01em;line-height:1.1}

/* ---------- services ---------- */
.services .lay{display:grid;grid-template-columns:1fr 1.15fr;gap:60px;align-items:start}

.scard{background:var(--blue-soft);border-radius:var(--r);padding:40px 44px;margin-bottom:26px}
.scard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.scard .num{font-family:'Inter Tight',sans-serif;font-weight:400;font-size:46px;letter-spacing:-.01em}
.scard .thumb{width:80px;height:56px;border-radius:8px;object-fit:cover}
.scard h3{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:28px;letter-spacing:-.01em;border-top:1px solid rgba(12,15,20,.12);padding-top:26px}
.scard .desc{margin-top:10px;color:var(--gray);font-size:15px}
.scard .rows{margin-top:26px}
.scard .row{display:grid;grid-template-columns:64px 1fr;gap:20px;padding:15px 0;border-top:1px solid rgba(12,15,20,.08);font-size:15.5px}
.scard .row .no{color:var(--gray)}
.scard .row .nm{font-weight:500}

/* ---------- statement band ---------- */
.band{background:var(--blue);color:#fff;padding:var(--sec) 0}
.band .state{max-width:26ch}
.band .state em{font-style:italic}

/* ---------- voices ---------- */
.voices .vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.vcard{background:var(--off);border-radius:var(--r);padding:36px 32px;display:flex;flex-direction:column;gap:24px;transition:transform .4s}

.vcard .q{font-size:15.5px;line-height:1.6;color:#2A3040}

.vcard .av{width:42px;height:42px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Inter Tight',sans-serif;font-size:13px;font-weight:600;flex:0 0 42px}
.vcard .av.ink{background:var(--ink)}
.vcard .nm{font-weight:600;font-size:14.5px}

.vcard.blue{background:var(--blue);color:#fff}

.vcard.blue .av{background:rgba(255,255,255,.2)}
.vcard.blue .rl{color:rgba(255,255,255,.75)}

/* ---------- journal ---------- */
.journal .jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.jcard{display:flex;flex-direction:column;gap:10px}

.jcard .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(.2);transition:transform .7s}

.jcard .ph .ttl{position:absolute;left:24px;right:24px;bottom:22px;color:#fff;font-family:'Inter Tight',sans-serif;font-weight:600;font-size:23px;line-height:1.15;letter-spacing:-.01em;text-shadow:0 2px 18px rgba(0,0,0,.35)}
.jcard .ph::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.45) 100%)}
.jcard .ph .ttl{z-index:2}
.jcard .datebar{background:var(--off);border-radius:12px;padding:14px 20px;font-size:14px;color:var(--gray)}

/* ---------- speaking ---------- */
.speak .lay{display:grid;grid-template-columns:1fr 1.3fr;gap:64px;align-items:start}
.speak .photo{border-radius:var(--r);overflow:hidden}
.speak .photo img{width:100%;min-height:480px;object-fit:cover}
.speak h2{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:clamp(30px,3.2vw,42px);letter-spacing:-.015em;line-height:1.12;margin-bottom:16px}
.speak .lead{color:var(--gray);max-width:52ch;margin-bottom:36px}
.srow{display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;padding:19px 0;border-top:1px solid var(--line)}
.srow:last-of-type{border-bottom:1px solid var(--line)}
.srow .yr{font-size:14px;color:var(--blue);font-weight:600}
.srow .nm{font-weight:600;font-size:16px}
.srow .pl{font-size:13.5px;color:var(--gray);margin-top:2px}
.srow .tp{font-size:12px;font-weight:600;background:var(--blue-soft);color:var(--blue);border-radius:100px;padding:7px 14px}

/* ---------- FAQ ---------- */
.faq{background:var(--off)}
.faq .lay{display:grid;grid-template-columns:1fr 1.3fr;gap:64px;align-items:start}
.faq h2{font-size:clamp(52px,7vw,110px)}
.faq .left p{margin-top:26px;color:var(--gray);max-width:36ch}
.fitem{background:#fff;border-radius:14px;padding:24px 28px;margin-bottom:12px;cursor:pointer}
.fitem .qq{display:flex;justify-content:space-between;gap:16px;font-weight:600;font-size:16px}
.fitem .qq .tg{color:var(--ink);font-size:20px;font-weight:400;transition:transform .4s}
.fitem.open .qq .tg{transform:rotate(45deg)}
.fitem .ans{display:none;color:var(--gray);font-size:14.5px;margin-top:14px;line-height:1.65}
.fitem.open .ans{display:block}

/* ---------- contact ---------- */
.contact{background:var(--blue);color:#fff;overflow:hidden;padding-bottom:0}
.contact .lay{display:grid;grid-template-columns:1.1fr 1fr;gap:70px;align-items:start}
.contact h2{font-size:clamp(40px,5.4vw,84px);max-width:12ch}
.contact .sub{margin-top:22px;color:rgba(255,255,255,.85);max-width:44ch}
.contact .meta{display:flex;gap:50px;margin-top:36px;flex-wrap:wrap}
.contact .meta .h{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65)}
.contact .meta .v{margin-top:6px;font-weight:500}
.cform{background:#fff;border-radius:var(--r);padding:44px 40px;color:var(--ink)}
.cform h3{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:24px;margin-bottom:6px}
.cform .s{color:var(--gray);font-size:14px;margin-bottom:24px}
.cform input,.cform textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--off);padding:15px 16px;font-family:'Inter',sans-serif;font-size:14.5px;outline:none;resize:none;margin-bottom:12px}
.cform input:focus,.cform textarea:focus{border-color:var(--blue)}
.cform .fine{font-size:11.5px;color:var(--gray);margin-top:10px}
.contact .fmark{font-family:'Inter Tight',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.015em;line-height:.76;font-size:clamp(120px,19vw,270px);text-align:center;color:rgba(255,255,255,.16);margin-top:90px;white-space:nowrap}
.contact .fbot{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.18);padding:26px 32px;font-size:13.5px;color:rgba(255,255,255,.8)}

/* ---------- reveals ---------- */



/* ---------- responsive ---------- */
@media (max-width:1080px){
  .voices .vgrid,.journal .jgrid,.statrow{grid-template-columns:1fr 1fr}

}

  .voices .vgrid,.journal .jgrid,.statrow{grid-template-columns:1fr}

  .scard{padding:30px 26px}

}

'<div class="statrow" data-cards>'+(s.stats||[]).map(function(x){return'<div class="stat wr"><div class="n">'+esc(x.n)+(x.i?'<i>'+esc(x.i)+'</i>':'')+'</div><div class="l">'+esc(x.l)+'</div></div>'}).join('')+'</div></div></section>'},
services:function(s){return'<section class="services light"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+seclab(s.kick)+
'<div class="lay"><div class="sticky wr" data-img>'+ph(s.sticky,'3:4')+'</div><div>'+
(s.cards||[]).map(function(c){return'<div class="scard wr" data-r1><div class="top"><span class="num">'+esc(c.num)+'</span>'+ph(c.thumb,'16:10','thumbx')+'</div><h3>'+esc(c.t)+'</h3><p class="desc">'+esc(c.d)+'</p>'+
'<div class="rows" data-rule>'+(c.rows||[]).map(function(r,i){return'<div class="row"><span class="no">/'+('0'+(i+1)).slice(-2)+'</span><span class="nm">'+esc(r)+'</span></div>'}).join('')+'</div></div>'}).join('')+
'</div></div></div></section>'},
band:function(s){return'<section class="band"><div class="wrap"><div class="state wr" data-r1>'+rich(s.quote)+'<div style="margin-top:26px;font-size:15px;font-weight:500;color:rgba(255,255,255,.8)">'+esc(s.who)+'</div></div></div></section>'},
voices:function(s){return'<section class="voices"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+seclab(s.kick)+
'<h2 class="mega wr" data-r1 style="font-size:clamp(40px,5.4vw,76px);margin-bottom:60px">'+rich(s.title)+'</h2>'+
'<div class="vgrid" data-cards>'+(s.cards||[]).map(function(c){return'<div class="vcard '+(c.tone||'')+' wr"><div class="q">&ldquo;'+rich(c.q)+'&rdquo;</div><div class="who"><span class="av'+(c.ink?' ink':'')+'">'+esc(c.ini)+'</span><div><div class="nm">'+esc(c.n)+'</div><div class="rl">'+esc(c.r)+'</div></div></div></div>'}).join('')+'</div></div></section>'},
journal:function(s){return'<section class="journal light"'+(s.id?' id="'+esc(s.id)+'"':'')+' style="padding-top:0"><div class="wrap">'+seclab(s.kick)+
'<div class="jgrid" data-cards>'+(s.posts||[]).map(function(p){return'<a class="jcard wr" href="#contact"><div class="ph2">'+ph(p.img,'16:10')+'<div class="ttl">'+esc(p.t)+'</div></div><div class="datebar">'+esc(p.bar)+'</div></a>'}).join('')+'</div></div></section>'},
speak:function(s){return'<section class="speak light" style="padding-top:0"><div class="wrap">'+seclab(s.kick)+
'<div class="lay"><div class="photo wr" data-img>'+ph(s.photo,'4:5')+'</div>'+
'<div class="wr" data-r1><h2>'+esc(s.title)+'</h2><p class="lead">'+esc(s.lead)+'</p>'+
'<div data-rule>'+(s.rows||[]).map(function(r){return'<div class="srow"><span class="yr">'+esc(r[0])+'</span><div><div class="nm">'+esc(r[1])+'</div><div class="pl">'+esc(r[2])+'</div></div><span class="tp">'+esc(r[3])+'</span></div>'}).join('')+'</div></div></div></div></section>'},
faq:function(s){return'<section class="faq"><div class="wrap"><div class="lay">'+
'<div class="left wr" data-r1><h2 class="mega">'+rich(s.title)+'</h2><p>'+esc(s.text)+'</p></div>'+
'<div class="wr" data-r1>'+(s.items||[]).map(function(f){return'<div class="fitem" data-faq><div class="qq">'+esc(f[0])+' <span class="tg">+</span></div><div class="ans">'+esc(f[1])+'</div></div>'}).join('')+'</div></div></div></section>'},
contact:function(s){return'<section class="contact"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap"><div class="lay">'+
'<div class="wr" data-r1><h2 class="mega">'+rich(s.title)+'</h2><p class="sub">'+rich(s.sub)+'</p>'+
'<div class="meta">'+(s.meta||[]).map(function(m){return'<div><div class="h">'+esc(m[0])+'</div><div class="v">'+esc(m[1])+'</div></div>'}).join('')+'</div></div>'+
'<div class="cform wr" data-r1><h3>'+esc(s.formTitle)+'</h3><div class="s">'+esc(s.formSub)+'</div>'+
(s.fields||[]).map(function(f){return f[0]==='textarea'?'<textarea rows="3" placeholder="'+esc(f[1])+'"></textarea>':'<input type="'+esc(f[0])+'" placeholder="'+esc(f[1])+'">'}).join('')+
'<button class="btn blue" style="width:100%;justify-content:center">'+esc(s.submit)+' <span class="ar">→</span></button>'+
'<div class="fine">'+esc(s.fine)+'</div></div></div>'+
'<div class="fmark">'+esc(window.__B.mark)+'</div></div>'+
'<div class="fbot">'+(s.legal||[]).map(function(l){return'<span>'+esc(l)+'</span>'}).join('')+'</div></section>'}
};

function boot(data){
  window.__B=data.brand||{};
  if(data.meta){document.title=data.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  var nv=data.nav||{};
  document.getElementById('navLeft').textContent=nv.left||'';
  document.getElementById('navCenter').textContent=nv.center||'';
  document.getElementById('navCtaText').textContent=(nv.cta||{}).text||'';
  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('site').innerHTML=html;
  document.querySelectorAll('[data-faq]').forEach(function(el){
    el.addEventListener('click',function(){var open=el.classList.toggle('open');
      if(open&&MOTION){var a=el.querySelector('.ans');
        gsap.fromTo(a,{opacity:0,y:6},{opacity:1,y:0,duration:.3,ease:'expo.out',clearProps:'transform'})}})});
  initMotion();
}

function initMotion(){
  var tick=document.getElementById('tick');
  if(tick)tick.innerHTML+=tick.innerHTML;
  if(!MOTION)return;
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:1.05});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();lenis.scrollTo(t)}});
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[120,80,60][Math.min(i,2)]});
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});
  gsap.utils.toArray('[data-cards]').forEach(function(grid){
    var cards=grid.querySelectorAll('.wr');var d=0,steps=[90,70,55,45,40,40];
    cards.forEach(function(c,i){
      gsap.fromTo(c,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:d/1000,clearProps:'transform',
        scrollTrigger:{trigger:grid,start:'top 84%',once:true}});
      d+=steps[Math.min(i,5)]})});
  gsap.utils.toArray('[data-rule]').forEach(function(el){
    var line=document.createElement('div');
    line.style.cssText='height:1px;background:currentColor;opacity:.15;transform-origin:left center;transform:scaleX(0)';
    el.insertBefore(line,el.firstChild);
    gsap.to(line,{scaleX:1,duration:.8,ease:'expo.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}})});
  gsap.utils.toArray('[data-img]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,scale:1.03},{opacity:1,scale:1,duration:.9,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});
  /* bandas full-bleed: la imagen asienta 1.12→1 mapeada al progreso (scrub) */
  gsap.utils.toArray('[data-caseband] .bgw img,[data-caseband] .bgw .phx').forEach(function(im){
    gsap.fromTo(im,{scale:1.12},{scale:1,ease:'none',
      scrollTrigger:{trigger:im.closest('[data-caseband]'),start:'top bottom',end:'bottom top',scrub:1.2}})});
  gsap.utils.toArray('[data-caseband]').forEach(function(el){
    gsap.fromTo(el,{opacity:0},{opacity:1,duration:.9,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}})});
  /* R5 ABANICO: el strip se abre con el primer scroll (progreso del hero) */
  var fans=gsap.utils.toArray('[data-fan]');
  if(fans.length&&matchMedia('(min-width:761px)').matches){
    gsap.set(fans,function(){return{}});
    ScrollTrigger.create({trigger:'#heroFan',start:'top top',end:'bottom 60%',scrub:1.2,
      onUpdate:function(self){var p=self.progress;
        fans.forEach(function(f,i){var k=(i-(fans.length-1)/2);
          f.style.transform='translateX('+(k*18*p)+'px) translateY('+(-14*p*Math.abs(k))+'px) rotate('+(k*4*p)+'deg)'})}});
  }
  /* ticker scroll-driven: se mueve al ritmo del scroll, no en loop */
  if(tick){var tx=0,last=0;
    lenis.on('scroll',function(e){var dy=e.scroll-last;last=e.scroll;tx-=dy*.45;
      var w=tick.scrollWidth/2;if(w>0){tx=((tx%w)+w)%w*-1}
      tick.style.transform='translateX('+tx+'px)'})}
}

fetch('/v5-zentro/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">No se pudo cargar content.json ('+esc(err.message)+')</div>'});
})();
</script>
</body>
