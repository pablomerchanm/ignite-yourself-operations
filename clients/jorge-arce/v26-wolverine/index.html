<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arce — Restore. Every Case. Fully.</title>
<meta name="description" content="The practice of Dr. Jorge Arce — board-certified oral & maxillofacial surgeon. Twenty-seven years of complex reconstruction in the South Bay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --white:#FFFFFF; --paper:#F5F5F3; --ink:#101010; --dim:#6F6F6C; --line:rgba(16,16,16,.12);
  --mono:'Space Mono',monospace; --r:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--white);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
  letter-spacing:-.01em;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:#fff}
.wrap{max-width:1400px;margin:0 auto;padding:0 36px}
.mono{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;
  justify-content:space-between;padding:20px 36px;color:#fff;transition:background .4s,color .4s}
.nav.solid{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);color:var(--ink)}
.nav .lg{font-weight:600;font-size:17px;letter-spacing:.14em;text-transform:uppercase}
.nav .lg span{font-weight:400;letter-spacing:.14em;opacity:.75}
.nav .links{display:flex;gap:30px;font-size:15px;font-weight:500}
.nav .links a{opacity:.9;transition:opacity .3s}
.nav .links a:hover{opacity:.6}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;display:flex;align-items:flex-end;overflow:hidden;padding:0 0 60px}
.hero .bg{position:absolute;inset:0}
.hero .bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.85)}
.hero .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),transparent 40%,rgba(0,0,0,.45))}
.hero .inr{position:relative;z-index:2;width:100%;padding:0 36px;color:#fff;display:flex;
  justify-content:space-between;align-items:flex-end;gap:40px;flex-wrap:wrap}
.hero h1{font-weight:600;letter-spacing:-.045em;line-height:.94;font-size:clamp(56px,9vw,132px)}
.newscard{background:rgba(16,16,16,.85);backdrop-filter:blur(8px);border-radius:14px;overflow:hidden;
  width:270px;flex:0 0 auto;transition:transform .3s}
.newscard:hover{transform:translateY(-4px)}
.newscard img{aspect-ratio:16/10;object-fit:cover;width:100%}
.newscard .bd{padding:16px 18px 20px}
.newscard .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.newscard .t{margin-top:8px;font-size:16.5px;font-weight:500;line-height:1.3;color:#fff;display:flex;justify-content:space-between;gap:12px}
.newscard .t .ar{opacity:.7}

/* ---------- statement 2col ---------- */
.state{padding:var(--sec) 0}
.state .inr{display:grid;grid-template-columns:1fr 1.35fr;gap:80px;align-items:start}
.state h2{font-weight:600;letter-spacing:-.035em;line-height:1.06;font-size:clamp(30px,3.6vw,50px)}
.state .r p{font-weight:500;letter-spacing:-.025em;line-height:1.25;font-size:clamp(22px,2.6vw,36px);color:var(--ink)}
.state .r .sub{margin-top:28px;font-weight:400;letter-spacing:-.01em;font-size:16px;line-height:1.7;color:var(--dim);max-width:520px}

/* ---------- black band / guide ---------- */
.band{background:var(--ink);color:#fff;padding:90px 36px}
.band .card{max-width:1330px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:0;
  background:#000;border-radius:var(--r);overflow:hidden}
.band .ph{position:relative;min-height:420px}
.band .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.band .tx{padding:56px 54px;display:flex;flex-direction:column}
.band .tx h2{font-weight:600;letter-spacing:-.04em;line-height:.98;font-size:clamp(38px,4.6vw,68px)}
.band .tx p{margin-top:26px;font-size:15px;line-height:1.7;color:rgba(255,255,255,.65);max-width:400px}
.band .pdf{margin-top:auto;padding-top:44px}
.band .pdf .box{border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:22px 24px;display:flex;
  flex-direction:column;gap:44px;transition:background .3s}
.band .pdf .box:hover{background:rgba(255,255,255,.06)}
.band .pdf .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.band .pdf .t{font-size:20px;font-weight:500;display:flex;justify-content:space-between;align-items:center;gap:14px}

/* ---------- disciplines grid ---------- */
.brands{padding:var(--sec) 0}
.brands .head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:60px}
.brands h2{font-weight:600;letter-spacing:-.04em;line-height:1;font-size:clamp(36px,4.6vw,64px)}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.bcell{background:var(--paper);border-radius:var(--r);padding:34px 32px 40px;transition:transform .35s var(--ease-out),box-shadow .35s}
.bcell:hover{transform:translateY(-5px);box-shadow:0 24px 50px rgba(16,16,16,.1)}
.bcell .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
.bcell h3{font-weight:600;letter-spacing:-.025em;font-size:21px;margin-bottom:12px}
.bcell p{font-size:14.5px;line-height:1.65;color:var(--dim)}

/* ---------- photo strip + stats ---------- */
.strip{padding:0 36px}
.strip .inr{max-width:1330px;margin:0 auto;border-radius:var(--r);overflow:hidden;position:relative}
.strip img{width:100%;aspect-ratio:21/9;object-fit:cover}
.strip .cap{position:absolute;left:30px;bottom:24px;color:#fff;font-family:var(--mono);font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;background:rgba(16,16,16,.55);backdrop-filter:blur(6px);
  padding:9px 14px;border-radius:99px}
.stats{padding:calc(var(--sec)*.85) 0}
.stats .inr{display:grid;grid-template-columns:repeat(3,1fr);gap:50px}
.stats .cell{border-top:1px solid var(--line);padding-top:26px}
.stats .n{font-weight:600;letter-spacing:-.045em;font-size:clamp(52px,6.6vw,96px);line-height:.9}
.stats .n span{font-size:.42em;color:var(--dim);font-weight:500}
.stats .l{margin-top:14px;font-size:14px;color:var(--dim);line-height:1.6;max-width:260px}

/* ---------- quote ---------- */
.quote{background:var(--paper);padding:calc(var(--sec)*1.1) 0}
.quote p{font-weight:500;letter-spacing:-.03em;line-height:1.2;font-size:clamp(26px,3.6vw,48px);max-width:1000px}
.quote .who{margin-top:30px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}

/* ---------- close ---------- */
.close{padding:var(--sec) 0 40px}
.close h2{font-weight:600;letter-spacing:-.045em;line-height:.94;font-size:clamp(48px,8vw,116px)}
.close .row{margin-top:50px;display:flex;gap:16px;flex-wrap:wrap}
.btn{display:inline-block;background:var(--ink);color:#fff;font-size:15px;font-weight:500;
  padding:16px 30px;border-radius:99px;transition:transform .3s}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.close .fine{margin-top:120px;padding-top:24px;border-top:1px solid var(--line);display:flex;
  justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:10.5px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}

/* ---------- reveals ---------- */
}


/* ---------- rework: manifiesto + placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--ink,#101010);outline-offset:3px}
.state h2 .ln{display:block;will-change:transform,opacity}
html:not(.no-motion) .state h2 .ln{opacity:.15}
.phx{display:flex;align-items:center;justify-content:center;background:#e7e7e4;color:#6F6F6C;font-family:var(--mono,ui-monospace);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.hero .bg .phx{width:100%;height:100%}
.strip .inr .phx{aspect-ratio:21/9;width:100%}
.band .ph .phx{position:absolute;inset:0}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#6F6F6C;font-size:14px}
</style></head>
<body>
<nav class="nav" id="topnav"><span class="lg" id="nlogo"></span><div class="links" id="nlinks"></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&lt;span&gt;/g,'<span>').replace(/&lt;\/span&gt;/g,'</span>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
hero:function(s){
  var n=s.news||{};
  return'<header class="hero" id="top"><div class="bg">'+img(s.img)+'</div>'+
  '<div class="inr" data-r2>'+
  '<h1 class="wr">'+rich(s.title)+'</h1>'+
  '<a class="newscard wr" href="'+esc(n.h||'#')+'">'+img(n.img,'')+
  '<div class="bd"><div class="k">'+esc(n.k)+'</div><div class="t">'+esc(n.t)+' <span class="ar">↗</span></div></div></a>'+
  '</div></header>'},
state:function(s){
  return'<section class="state"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap"><div class="inr">'+
  '<h2 id="manif">'+(s.lines||[]).map(function(l){return'<span class="ln">'+esc(l)+'</span>'}).join('')+'</h2>'+
  '<div class="r" data-r2><p class="wr">'+rich(s.lead)+'</p><p class="sub wr">'+rich(s.sub)+'</p></div>'+
  '</div></div></section>'},
band:function(s){
  return'<section class="band"><div class="card wr" data-r4>'+
  '<div class="ph">'+img(s.img)+'</div>'+
  '<div class="tx"><h2>'+esc(s.k)+'</h2><p>'+rich(s.t)+'</p>'+
  '<div class="pdf"><a class="box" href="'+esc(s.cta.h)+'"><span class="k">'+esc(s.tag)+'</span><span class="t">'+esc(s.cta.t)+' <span>↗</span></span></a></div>'+
  '</div></div></section>'},
brands:function(s){
  return'<section class="brands"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
  '<div class="head" data-r2><h2 class="wr">'+rich(s.title)+'</h2><span class="mono wr" style="color:var(--dim)">'+esc(s.sub)+'</span></div>'+
  '<div class="bgrid" data-cards>'+(s.rows||[]).map(function(r,i){return'<div class="bcell wr"><div class="k">A-'+('0'+(i+1)).slice(-2)+'</div><h3>'+esc(r.nm)+'</h3><p>'+rich(r.ds)+'</p></div>'}).join('')+'</div>'+
  '</div></section>'},
bandimg:function(s){
  return'<div class="strip wr" data-r4><div class="inr">'+img(s.img)+'<span class="cap">'+esc(s.cap)+'</span></div></div>'},
stats:function(s){
  return'<section class="stats"><div class="wrap"><div class="inr" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="cell wr"><div class="n">'+esc(cl.n)+(cl.u?'<span>'+esc(cl.u)+'</span>':'')+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
quote:function(s){
  return'<section class="quote" data-r2><div class="wrap"><p class="wr">'+esc(s.q)+'</p><div class="who wr">'+esc(s.who)+'</div></div></section>'},
close:function(s){
  return'<section class="close"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2><div class="wrap">'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<div class="row wr">'+(s.ctas||[]).map(function(cta){return'<a class="btn'+(cta.ghost?' ghost':'')+'" href="'+esc(cta.h)+'">'+esc(cta.t)+'</a>'}).join('')+'</div>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'}
};

fetch('/v26-wolverine/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').innerHTML=rich(c.nav.logo||'');
    document.getElementById('nlinks').innerHTML=(c.nav.links||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  /* nav solid al scroll */
  var nav=document.getElementById('topnav');
  function onScroll(y){nav.classList.toggle('solid',y>window.innerHeight*.8)}
  if(!MOTION){
    addEventListener('scroll',function(){onScroll(window.scrollY)},{passive:true});
    wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',function(e){ScrollTrigger.update();onScroll(e.scroll)});
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }else{addEventListener('scroll',function(){onScroll(scrollY)},{passive:true});}
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 el manifiesto se estampa (pin, solo desktop) */
  var manif=document.getElementById('manif');
  if(manif){
    var lines=Array.prototype.slice.call(manif.querySelectorAll('.ln'));
    var n=lines.length;
    if(n>1&&window.innerWidth>900){
      ScrollTrigger.create({trigger:'.state',start:'top 22%',end:'+='+(n*45)+'%',pin:true,scrub:.4,
        onUpdate:function(self){var p=self.progress;
          lines.forEach(function(ln,i){
            var k=Math.max(0,Math.min(1,p*n-i));
            ln.style.opacity=(.15+.85*k);
            ln.style.transform='translateY('+((1-k)*14)+'px)';
          })}});
    } else {
      lines.forEach(function(ln){ln.style.opacity=1});
    }
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
