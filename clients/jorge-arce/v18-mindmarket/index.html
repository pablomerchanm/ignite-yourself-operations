<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur-hover:.2s;
  --sec:clamp(96px,13vh,152px);

  --cream:#F5F1E4;
  --white:#FFFFFF;
  --ink:#2C2E2A;
  --green:#8ED462;
  --coral:#FF705D;
  --yellow:#F5E211;
  --blue:#2BA0FF;
  --lilac:#EBC1FF;
  --r:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
html.no-motion{scroll-behavior:smooth}
body{
  background:var(--cream);color:var(--ink);
  font-family:'Inter Tight',sans-serif;font-weight:500;
  font-size:16px;line-height:1.55;letter-spacing:-.02em;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--blue);color:#fff}
.wrap{max-width:1280px;margin:0 auto;padding:0 32px}

/* ---------- type ---------- */
.d140{font-weight:500;letter-spacing:-.06em;line-height:.98;font-size:clamp(52px,9.7vw,140px)}
.d81{font-weight:500;letter-spacing:-.06em;line-height:1.04;font-size:clamp(36px,5.6vw,81px)}
.d40{font-weight:500;letter-spacing:-.05em;line-height:1.1;font-size:clamp(26px,2.8vw,40px)}
.statnum{font-weight:400;letter-spacing:-.06em;line-height:1;font-size:clamp(72px,10vw,144px)}
.c-blue{color:var(--blue)}
.c-coral{color:var(--coral)}
.c-green{color:#6DB944}

/* ---------- nav (floating white pill) ---------- */
nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;width:min(1240px,calc(100% - 24px))}
.navin{background:var(--white);border-radius:18px;box-shadow:0 4px 24px rgba(44,46,42,.08);display:flex;justify-content:space-between;align-items:center;padding:14px 22px}
.nlogo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px}
.nlogo .mark{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center}
.nlinks{display:flex;gap:26px;align-items:center;font-size:15px}
.nlinks a{opacity:.85}
.nlinks a:hover{opacity:1}
.cta{display:inline-flex;align-items:center;gap:10px;background:var(--yellow);border-radius:100px;padding:12px 22px;font-weight:600;font-size:15px;transition:transform .3s}
.cta:hover{transform:translateY(-2px)}
.cta .dot{width:24px;height:24px;border-radius:50%;background:var(--white);display:inline-flex;align-items:center;justify-content:center;font-size:12px}

/* ---------- hero with illustration ---------- */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding:120px 0 60px}
.hero .illo{position:absolute;inset:0;z-index:0}
.hero .illo svg{width:100%;height:100%;object-fit:cover}
.hero .card{
  position:relative;z-index:2;background:var(--white);border-radius:var(--r);
  box-shadow:0 10px 44px rgba(44,46,42,.1);padding:52px 50px;max-width:560px;margin-left:32px;
}
.hero .card h1{font-size:clamp(38px,4vw,56px);font-weight:500;letter-spacing:-.055em;line-height:1.02}
.hero .card p{margin-top:20px;color:#5A5D56;font-size:16.5px;max-width:44ch}
.hero .card .ctas{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}

/* ---------- sections ---------- */
section{padding:var(--sec) 0;position:relative}
.shead{text-align:center;max-width:760px;margin:0 auto 70px}
.shead .chip{display:inline-flex;background:var(--white);border-radius:100px;padding:8px 18px;font-size:13.5px;font-weight:600;box-shadow:0 2px 12px rgba(44,46,42,.06);margin-bottom:20px}

/* ---------- journey with unfolding illustrations ---------- */
.moment{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center;padding:70px 0}
.moment:nth-child(even) 
.moment .illobox{border-radius:var(--r);overflow:hidden;position:relative;min-height:340px;display:flex;align-items:center;justify-content:center}
.moment .illobox svg{width:100%;height:auto}
.moment h3{font-size:clamp(28px,3vw,40px);font-weight:500;letter-spacing:-.05em;line-height:1.06}
.moment p{margin-top:16px;color:#5A5D56;font-size:16px;max-width:48ch}
.moment .pts{margin-top:22px;display:flex;flex-direction:column;gap:10px}
.moment .pts div{display:flex;gap:10px;font-size:15px}
.moment .pts i{font-style:normal;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 22px;background:var(--green);color:#fff}
.moment:nth-child(2) .pts i{background:var(--coral)}
.moment:nth-child(3) .pts i{background:var(--blue)}

/* ---------- stats colored ---------- */
.stats{background:var(--white);border-radius:var(--r);margin:0 24px;padding:110px 0}
.stats .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;text-align:center;margin-top:60px}
.stat .l{margin-top:12px;font-size:15px;color:#5A5D56;max-width:24ch;margin-left:auto;margin-right:auto}

/* ---------- voices ---------- */
.voices .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:64px}
.vcard{background:var(--white);border-radius:var(--r);padding:32px 30px;display:flex;flex-direction:column;gap:20px;box-shadow:0 2px 16px rgba(44,46,42,.05);transition:transform .35s var(--ease-spring)}
.vcard:hover{transform:translateY(-5px) rotate(-.5deg)}
.vcard .q{font-size:15px;line-height:1.6;color:#494C45}
.vcard .who{margin-top:auto;display:flex;align-items:center;gap:12px}
.vcard .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex:0 0 40px}
.vcard:nth-child(6n+1) .av{background:var(--blue)}
.vcard:nth-child(6n+2) .av{background:var(--coral)}
.vcard:nth-child(6n+3) .av{background:var(--green)}
.vcard:nth-child(6n+4) .av{background:#C99BE0}
.vcard:nth-child(6n+5) .av{background:#E8B93B}
.vcard:nth-child(6n+6) .av{background:var(--ink)}
.vcard .nm{font-weight:600;font-size:14px}
.vcard .rl{font-size:12.5px;color:#8A8D84;margin-top:2px}

/* ---------- services chips ---------- */
.svc .cloud{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:900px;margin:0 auto}
.svc .chip2{background:var(--white);border-radius:100px;padding:14px 26px;font-size:16px;font-weight:600;box-shadow:0 2px 12px rgba(44,46,42,.05);transition:transform .35s var(--ease-spring),background var(--dur-hover) var(--ease-quick);cursor:default}
.svc .chip2:hover{transform:translateY(-3px)}
.svc .chip2:nth-child(5n+1):hover{background:var(--yellow)}
.svc .chip2:nth-child(5n+2):hover{background:var(--lilac)}
.svc .chip2:nth-child(5n+3):hover{background:var(--green);color:#fff}
.svc .chip2:nth-child(5n+4):hover{background:var(--coral);color:#fff}
.svc .chip2:nth-child(5n+5):hover{background:var(--blue);color:#fff}

/* ---------- close ---------- */
.close .card{position:relative;background:var(--white);border-radius:var(--r);padding:90px 60px;text-align:center;overflow:hidden}
.close .card .bgillo{position:absolute;inset:auto 0 0 0;height:150px;opacity:.9}
.close h2{position:relative;z-index:2}
.close .sub{position:relative;z-index:2;color:#5A5D56;margin-top:18px}
.close .ctas{position:relative;z-index:2;display:flex;gap:14px;justify-content:center;margin-top:36px;flex-wrap:wrap}
.close .form{position:relative;z-index:2;display:flex;gap:10px;justify-content:center;margin-top:34px;flex-wrap:wrap}
.close input{border:2px solid rgba(44,46,42,.12);border-radius:100px;background:var(--cream);padding:14px 22px;font-family:'Inter Tight',sans-serif;font-size:15px;outline:none;min-width:280px}
.close input:focus{border-color:var(--blue)}
.fbot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:44px 32px 30px;font-size:13px;color:#8A8D84;max-width:1280px;margin:0 auto}


/* illustration draw-in */
.illobox svg .pop{transform-origin:center;transform:scale(0)}
html.no-motion .pop{transform:scale(1)}


/* ---------- responsive ---------- */
@media (max-width:1080px){
  .voices .grid{grid-template-columns:1fr 1fr}
  .moment{grid-template-columns:1fr;gap:34px}
  .moment:nth-child(even) .illobox{order:0}
}
@media (max-width:860px){
  .wrap{padding:0 20px}
  section{padding:var(--sec) 0}
  .nlinks a:not(.cta){display:none}
  .hero .card{margin:0 20px;padding:36px 28px}
  .voices .grid{grid-template-columns:1fr}
  .stats{margin:0 12px}
  .stats .grid{grid-template-columns:1fr;gap:50px}
  .close .card{padding:60px 24px}
  .close input{min-width:0;width:100%}
}

/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#8A8D84;font-size:14px}
</style></head>

  '</div></section>'},
close:function(s){
  var f=s.form||{};
  return'<section class="close" id="'+esc(s.id||'close')+'">'+illo('wave')+
  '<div class="wrap" data-r2>'+
  '<h2 class="d81 wr" style="max-width:16ch;margin:0 auto">'+rich(s.title)+'</h2>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '<div class="form wr"><input type="email" placeholder="'+esc(f.field||'Email')+'" aria-label="'+esc(f.field||'Email')+'"><button class="cta" type="button">'+esc(f.btn||'Send')+'</button></div>'+
  '<div class="ctas wr"><a class="cta conf" href="tel:+13103274166">'+esc(s.phone)+'</a></div>'+
  '</div>'+
  '<div class="fbot">'+(s.foot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v18-mindmarket/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  document.getElementById('nlogo').innerHTML='<span class="mark">'+illo('mark')+'</span>'+esc(c.logo||'Dr. Arce');
  var links=(c.nav||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
  if(c.navCta)links+='<a class="cta" href="'+esc(c.navCta.h)+'">'+esc(c.navCta.t)+' →</a>';
  document.getElementById('nlinks').innerHTML=links;
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function backOut(k){var c1=1.70158,c3=c1+1;k=Math.max(0,Math.min(1,k));return 1+c3*Math.pow(k-1,3)+c1*Math.pow(k-1,2)}

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* hero: pops entran con muelle al cargar (R2 spring) */
  var heroPops=document.querySelectorAll('.hero .illo .pop');
  if(heroPops.length){
    gsap.fromTo(heroPops,{scale:0},{scale:1,duration:.7,ease:'back.out(1.7)',
      transformOrigin:'center',stagger:{each:.09,from:'random'},delay:.15});
  }

  /* R5 estallido de viñetas: pops de cada illobox con backout mapeado al scrub */
  document.querySelectorAll('[data-pops]').forEach(function(box){
    var pops=Array.prototype.slice.call(box.querySelectorAll('.pop'));
    if(!pops.length)return;
    var n=pops.length;
    ScrollTrigger.create({trigger:box,start:'top 85%',end:'center 45%',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        pops.forEach(function(el,j){
          var k=Math.max(0,Math.min(1,p*(n+.6)-j*.8));
          el.style.transform='scale('+backOut(k)+')';
        })}});
  });
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
