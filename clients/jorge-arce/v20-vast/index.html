<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARCE — Building Next-Generation Surgical Care</title>
<meta name="description" content="Dr. Jorge Arce — board-certified oral & maxillofacial surgeon. Engineering-grade precision for the South Bay's complex cases. Est. 2007.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --graphite:#2A2C2F; --ink:#1E2022; --white:#FFFFFF; --bone:#ECE8E3; --bone2:#F3F0EC;
  --taupe:#B3ABA3; --warm:#897F75; --orange:#FF5623; --hair:rgba(42,44,47,.16); --hairD:rgba(255,255,255,.14);
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--bone);color:var(--graphite);font-family:'Archivo',system-ui,sans-serif;
  letter-spacing:.012em;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--orange);color:#fff}
.wrap{max-width:1440px;margin:0 auto;padding:0 40px}
.mono{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:40px;
  padding:0 40px;height:76px;color:#fff;transition:background .4s,color .4s}
.nav.solid{background:rgba(30,32,34,.92);backdrop-filter:blur(10px)}
.nav .wordmark{font-weight:600;font-size:17px;letter-spacing:.42em;text-transform:uppercase}
.nav .links{display:flex;gap:38px;font-size:15px;font-weight:500;margin-left:60px}
.nav .links a{opacity:.92;transition:opacity var(--dur-hover) var(--ease-quick)}
.nav .links a:hover{opacity:.6}
.nav .cta{margin-left:auto;background:#fff;color:var(--graphite);font-size:15px;font-weight:500;
  padding:14px 24px;transition:background var(--dur-hover) var(--ease-quick)}
.nav .cta:hover{background:var(--bone)}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;background:#000;display:flex;align-items:flex-end;overflow:hidden}
.hero .bgimg{position:absolute;inset:0}
.hero .bgimg img{width:100%;height:100%;object-fit:cover;opacity:.52;filter:grayscale(.35) contrast(1.08)}
.hero .bgimg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.1) 45%,rgba(0,0,0,.72) 100%)}
.hero .inner{position:relative;z-index:2;width:100%;padding:0 40px 70px;color:#fff}
.hero h1{font-size:clamp(44px,5.6vw,80px);font-weight:500;line-height:1.02;letter-spacing:.002em;max-width:900px}
.hero .readout{position:absolute;top:104px;right:40px;z-index:2;text-align:right;color:#fff}
.hero .readout .r{font-family:var(--mono);font-size:12px;letter-spacing:.05em;line-height:1.9;text-transform:uppercase}
.hero .readout .r b{font-weight:500;color:#fff}
.hero .readout .r span{color:rgba(255,255,255,.55);margin-right:10px}
.hero .tag{position:absolute;top:104px;left:40px;z-index:2}
.hero .tag .t1{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:#fff;text-transform:uppercase}
.hero .tag .t2{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--orange);text-transform:uppercase;margin-top:4px}
.hero .learn{display:inline-flex;align-items:center;gap:10px;margin-top:34px;font-size:15px;font-weight:500}
.hero .learn .ch{color:var(--orange);transition:transform var(--dur-hover) var(--ease-quick)}
.hero .learn:hover .ch{transform:translateX(4px)}

/* ---------- ghost wordmark section ---------- */
.station{position:relative;background:var(--bone);padding:calc(var(--sec)*1.15) 0 var(--sec);overflow:hidden}
.station .ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);
  font-size:clamp(160px,26vw,383px);font-weight:600;letter-spacing:.04em;color:var(--graphite);
  opacity:.07;white-space:nowrap;pointer-events:none;user-select:none}
.station .inner{position:relative;z-index:2}
.station .fig{width:min(560px,80%);margin:0 auto;position:relative}
.station .fig .ring{position:absolute;inset:-9%;border:1.5px dashed var(--taupe);border-radius:50%;
  will-change:transform}
}
.station .fig img{border-radius:50%;aspect-ratio:1;object-fit:cover;filter:grayscale(.15) contrast(1.03)}
.station .idplate{position:absolute;top:0;left:0}
.station .idplate .t1{font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;text-transform:uppercase}
.station .idplate .t2{font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;color:var(--orange);text-transform:uppercase;margin-top:4px}
.station .specs{position:absolute;top:0;right:0;text-align:right}
.station .specs .r{font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;line-height:2;text-transform:uppercase}
.station .specs .r span{color:var(--warm);margin-right:12px}
.station .specs .r b{font-weight:500;color:var(--graphite)}
.station .caption{margin-top:70px}
.station .caption h2{font-size:clamp(24px,2.2vw,32px);font-weight:600;line-height:1.25;letter-spacing:.002em;max-width:460px}
.station .caption .learn{display:inline-flex;align-items:center;gap:10px;margin-top:20px;font-size:15px;font-weight:500}
.station .caption .learn .ch{color:var(--orange);transition:transform var(--dur-hover) var(--ease-quick)}
.station .caption .learn:hover .ch{transform:translateX(4px)}

/* ---------- mission statement ---------- */
.mission{background:var(--bone2);padding:var(--sec) 0;border-top:1px solid var(--hair)}
.mission h2{font-size:clamp(34px,4.6vw,68px);font-weight:500;line-height:1.08;letter-spacing:.002em;max-width:1080px}
.mission h2 .dim{color:var(--taupe)}
.mission .sub{margin-top:34px;font-size:17px;line-height:1.65;color:var(--warm);max-width:560px}

/* ---------- spec table ---------- */
.systems{background:var(--bone);padding:var(--sec) 0 calc(var(--sec)*1.1)}
.systems .head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:54px}
.systems h2{font-size:clamp(30px,3.4vw,48px);font-weight:600;letter-spacing:.002em}
.systems .head .mono{color:var(--warm)}
.trow{display:grid;grid-template-columns:70px 1.1fr 1.6fr .7fr;gap:30px;align-items:center;
  padding:26px 0;border-top:1px solid var(--hair);transition:background .25s var(--ease-quick)}
.trow:last-child{border-bottom:1px solid var(--hair)}
.trow:hover{background:rgba(255,255,255,.5)}
.trow .idx{font-family:var(--mono);font-size:12.5px;color:var(--warm)}
.trow .name{font-size:19px;font-weight:600}
.trow .desc{font-size:14.5px;line-height:1.55;color:var(--warm)}
.trow .st{font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--orange);display:flex;align-items:center;gap:9px;justify-content:flex-end}
.trow .st::before{content:"";width:8px;height:8px;background:var(--orange)}
.thead{display:grid;grid-template-columns:70px 1.1fr 1.6fr .7fr;gap:30px;padding-bottom:14px;
  font-family:var(--mono);font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--warm)}
.thead :last-child{text-align:right}

/* ---------- record / metrics ---------- */
.metrics{background:var(--graphite);color:#fff;padding:calc(var(--sec)*.85) 0}
.metrics .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--hairD)}
.metrics .cell{background:var(--graphite);padding:44px 40px 44px 0}
.metrics .cell+.cell{padding-left:40px}
.metrics .n{font-size:clamp(52px,5.8vw,84px);font-weight:500;letter-spacing:.002em;line-height:1}
.metrics .n .u{font-size:.4em;color:var(--taupe);margin-left:6px}
.metrics .lab{font-family:var(--mono);font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--taupe);margin-bottom:22px}
.metrics .d{margin-top:18px;font-size:14.5px;line-height:1.6;color:rgba(255,255,255,.6);max-width:260px}
.metrics .quote{margin-top:100px;max-width:820px}
.metrics .quote p{font-size:clamp(22px,2.4vw,34px);font-weight:500;line-height:1.3}
.metrics .quote .who{margin-top:22px;font-family:var(--mono);font-size:12px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--taupe)}
.metrics .quote .who b{color:var(--orange);font-weight:500}

/* ---------- updates ---------- */
.updates{background:var(--bone);padding:var(--sec) 0 calc(var(--sec)*1.1)}
.updates h2{font-size:clamp(30px,3.4vw,48px);font-weight:600;margin-bottom:54px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:34px}
.card .im{overflow:hidden;aspect-ratio:16/11;margin-bottom:22px}
.card .im img{width:100%;height:100%;object-fit:cover;filter:grayscale(.2);transition:transform .6s cubic-bezier(.2,.6,.2,1)}
.card:hover .im img{transform:scale(1.05)}
.card .meta{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:11.5px;
  letter-spacing:.07em;text-transform:uppercase;color:var(--warm);margin-bottom:14px}
.card .meta::after{content:"";width:9px;height:9px;background:var(--orange);order:-1}
.card h3{font-size:20px;font-weight:600;line-height:1.35;letter-spacing:.002em;max-width:360px}

/* ---------- consult band ---------- */
.consult{background:var(--bone2);border-top:1px solid var(--hair);padding:var(--sec) 0}
.consult .inner{display:grid;grid-template-columns:1.2fr .8fr;gap:80px;align-items:center}
.consult h2{font-size:clamp(32px,4vw,58px);font-weight:500;line-height:1.06}
.consult .side p{font-size:16px;line-height:1.65;color:var(--warm);margin-bottom:26px}
.btn{display:inline-block;background:var(--graphite);color:#fff;font-size:15px;font-weight:500;
  padding:16px 30px;transition:background var(--dur-hover) var(--ease-quick)}
.btn:hover{background:var(--orange)}
.consult .mono-line{margin-top:26px;font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--warm);line-height:2}
.consult .mono-line b{color:var(--graphite);font-weight:500}

/* ---------- footer ---------- */
.foot{background:var(--ink);color:#fff;padding:110px 0 0;overflow:hidden}
.foot .top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:60px;padding-bottom:90px}
.foot .col .h{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--taupe);margin-bottom:20px}
.foot .col a,.foot .col span{display:block;font-size:15px;color:rgba(255,255,255,.8);line-height:2.1}
.foot .col a:hover{color:#fff}
.foot .status{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--orange);display:flex;align-items:center;gap:10px;margin-top:18px}
.foot .status::before{content:"";width:8px;height:8px;background:var(--orange);}
50%{opacity:.25}}
.foot .megamark{font-size:clamp(120px,24.5vw,352px);font-weight:600;letter-spacing:.03em;line-height:.78;
  text-transform:uppercase;text-align:center;transform:translateY(.12em);user-select:none;color:#fff;opacity:.96}
.foot .legal{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:26px 0;
  border-top:1px solid var(--hairD);font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;color:rgba(255,255,255,.45)}

/* ---------- reveals ---------- */
}


/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--orange);outline-offset:3px}
.trow{opacity:1}
html:not(.no-motion) .trow{opacity:.35}
.trow .st .sdot{display:inline-block;width:8px;height:8px;background:var(--taupe);margin-right:8px;position:relative;overflow:hidden}
.trow .st .sdot i{position:absolute;inset:0;background:var(--orange);transform-origin:left;transform:scaleX(0);display:block}
.trow.on .idx{color:var(--orange)}
.phx{display:flex;align-items:center;justify-content:center;background:#d8d3cc;color:#6b655e;font-family:var(--mono,ui-monospace);font-size:12px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.station .fig .phx{border-radius:50%;aspect-ratio:1}
.hero .bgimg .phx{position:absolute;inset:0;background:#181a1c;color:rgba(255,255,255,.4)}
.card .im .phx{width:100%;height:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--warm,#897F75);font-size:14px}
</style></head>
<body>
<nav class="nav"><div class="wordmark" id="wm"></div><div class="links" id="nlinks"></div><a class="cta" id="ncta" href="#consult"></a></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;i&gt;/g,'<span class="dim">').replace(/&lt;\/i&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function kv(rows){return(rows||[]).map(function(r){return'<div class="r"><span>'+esc(r.k)+'</span><b>'+esc(r.v)+'</b></div>'}).join('')}
function ph(img,cls,inner){
  if(img&&img.src)return'<div class="'+cls+'">'+(inner||'')+'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'"></div>';
  return'<div class="'+cls+'">'+(inner||'')+'<div class="phx">'+esc((img&&img.label)||'FOTO')+'</div></div>'}

var partials={
hero:function(s){
  return'<header class="hero" id="'+esc(s.id||'top')+'">'+
  (s.img&&s.img.src?'<div class="bgimg"><img src="'+esc(s.img.src)+'" alt="'+esc(s.img.alt||'')+'"></div>':'<div class="bgimg"><div class="phx">'+esc((s.img&&s.img.label)||'FOTO')+'</div></div>')+
  '<div class="tag wr" data-r1><div class="t1">'+esc(s.tag.t1)+'</div><div class="t2">'+esc(s.tag.t2)+'</div></div>'+
  '<div class="readout wr" data-r1>'+kv(s.readout)+'</div>'+
  '<div class="inner" data-r2><h1 class="wr">'+rich(s.title)+'</h1>'+
  (s.learn?'<a class="learn wr" href="'+esc(s.learn.h)+'">'+esc(s.learn.t)+' <span class="ch">›</span></a>':'')+
  '</div></header>'},
station:function(s){
  return'<section class="station" id="'+esc(s.id||'practice')+'">'+
  '<div class="ghost" aria-hidden="true">'+esc(s.ghost)+'</div>'+
  '<div class="wrap inner"><div style="position:relative">'+
  '<div class="idplate wr" data-r1><div class="t1">'+esc(s.idplate.t1)+'</div><div class="t2">'+esc(s.idplate.t2)+'</div></div>'+
  '<div class="specs wr" data-r1>'+kv(s.specs)+'</div>'+
  ph(s.img,'fig wr','<div class="ring" id="ring" aria-hidden="true"></div>')+
  '</div>'+
  '<div class="caption" data-r2><h2 class="wr">'+rich(s.caption)+'</h2>'+
  (s.learn?'<a class="learn wr" href="'+esc(s.learn.h)+'">'+esc(s.learn.t)+' <span class="ch">›</span></a>':'')+
  '</div></div></section>'},
mission:function(s){
  return'<section class="mission" id="'+esc(s.id||'mission')+'"><div class="wrap" data-r2>'+
  '<h2 class="wr">'+rich(s.quote)+'</h2>'+
  '<p class="sub wr">'+rich(s.sub)+'</p>'+
  '</div></section>'},
systems:function(s){
  var n=(s.rows||[]).length;
  return'<section class="systems" id="'+esc(s.id||'systems')+'"><div class="wrap">'+
  '<div class="head" data-r2><h2 class="wr">'+rich(s.title)+'</h2><span class="mono wr">'+esc(s.lab)+'</span></div>'+
  '<div class="thead wr" data-r1><span>'+esc(s.cols.idx)+'</span><span>'+esc(s.cols.name)+'</span><span>'+esc(s.cols.desc)+'</span><span>'+esc(s.cols.st)+'</span></div>'+
  '<div id="trows">'+(s.rows||[]).map(function(r,i){return'<div class="trow">'+
    '<span class="idx">A-'+('0'+(i+1)).slice(-2)+'</span>'+
    '<span class="name">'+esc(r.name)+'</span>'+
    '<span class="desc">'+rich(r.desc)+'</span>'+
    '<span class="st" style="text-align:right"><span class="sdot"><i></i></span><span class="stx">Standby</span></span>'+
  '</div>'}).join('')+'</div>'+
  '</div></section>'},
metrics:function(s){
  return'<section class="metrics"><div class="wrap">'+
  '<div class="grid" data-cards>'+(s.cells||[]).map(function(cl){return'<div class="cell wr"><div class="lab">'+esc(cl.lab)+'</div><div class="n">'+esc(cl.n)+(cl.u?'<span class="u">'+esc(cl.u)+'</span>':'')+'</div><div class="d">'+rich(cl.d)+'</div></div>'}).join('')+'</div>'+
  (s.quote?'<div class="quote wr" data-r1><p>'+esc(s.quote.q)+'</p><div class="who"><b>'+esc(s.quote.who)+'</b>'+esc(s.quote.rl)+'</div></div>':'')+
  '</div></section>'},
updates:function(s){
  if(!(s.cards&&s.cards.length))return'';
  return'<section class="updates" id="'+esc(s.id||'updates')+'"><div class="wrap">'+
  '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
  '<div class="cards" data-cards>'+s.cards.map(function(cd){return'<a class="card wr" href="'+esc(cd.h)+'">'+
    '<div class="im">'+(cd.img&&cd.img.src?'<img src="'+esc(cd.img.src)+'" alt="'+esc(cd.img.alt||'')+'">':'<div class="phx">'+esc((cd.img&&cd.img.label)||'FOTO')+'</div>')+'</div>'+
    '<div class="meta">'+esc(cd.meta)+'</div><h3>'+esc(cd.t)+'</h3></a>'}).join('')+'</div>'+
  '</div></section>'},
consult:function(s){
  return'<section class="consult" id="'+esc(s.id||'consult')+'"><div class="wrap"><div class="inner" data-r2>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<div class="side wr"><p>'+rich(s.body)+'</p>'+
  '<a class="btn" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="mono-line">'+(s.meta||[]).map(function(m){return esc(m.k)+' <b>'+esc(m.v)+'</b>'}).join('<br>')+'</div>'+
  '</div></div></div></section>'},
foot:function(s){
  return'<footer class="foot"><div class="wrap">'+
  '<div class="top">'+(s.cols||[]).map(function(col){
    return'<div class="col"><div class="h">'+esc(col.h)+'</div>'+
    (col.items||[]).map(function(it,i){
      if(col.links&&col.links[i])return'<a href="'+esc(col.links[i])+'">'+esc(it)+'</a>';
      return'<span>'+esc(it)+'</span>'}).join('')+
    (col.h==='Practice'?'<div class="status">'+esc(s.status)+'</div>':'')+
    '</div>'}).join('')+'</div>'+
  '</div>'+
  '<div class="megamark" aria-hidden="true">'+esc(s.megamark)+'</div>'+
  '<div class="wrap"><div class="legal">'+(s.legal||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div></div>'+
  '</footer>'}
};

fetch('/v20-vast/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('wm').textContent=c.nav.wordmark||'';
    document.getElementById('nlinks').innerHTML=(c.nav.links||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
    var cta=document.getElementById('ncta');cta.textContent=(c.nav.cta||{}).t||'';cta.setAttribute('href',(c.nav.cta||{}).h||'#')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){
    document.querySelectorAll('.trow').forEach(function(r){r.classList.add('on');
      var d=r.querySelector('.sdot i');if(d)d.style.transform='scaleX(1)';
      var t=r.querySelector('.stx');if(t)t.textContent='Active'});
    wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:.8});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5a dial orbital: el anillo rota con el progreso global */
  var ring=document.getElementById('ring');
  if(ring){
    ScrollTrigger.create({start:0,end:'max',scrub:.6,
      onUpdate:function(self){ring.style.transform='rotate('+(self.progress*360)+'deg)'}});
  }
  /* R5b boot sequence de sistemas */
  var rows=Array.prototype.slice.call(document.querySelectorAll('#trows .trow'));
  if(rows.length){
    var n=rows.length;
    ScrollTrigger.create({trigger:'.systems',start:'top 75%',end:'bottom 60%',scrub:.6,
      onUpdate:function(self){var p=self.progress;
        rows.forEach(function(r,i){
          var k=Math.max(0,Math.min(1,p*n-i));
          r.style.opacity=(.35+.65*k);
          var d=r.querySelector('.sdot i');if(d)d.style.transform='scaleX('+k+')';
          var on=k>=.5;
          r.classList.toggle('on',on);
          var t=r.querySelector('.stx');if(t){var want=on?'Active':'Standby';if(t.textContent!==want)t.textContent=want}
        })}});
  }
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
