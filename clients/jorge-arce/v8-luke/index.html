<style>
/* v8 LUKE rework — tokens: cambiar identidad = solo :root.
   Contenido: /v8-luke/content.json · principles/V8-LUKE.md */
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --bg:#0A0A0A;
  --fg:#F0F0F0;
  --dim:rgba(240,240,240,.28);
  --dim2:rgba(240,240,240,.5);
  --teal:#9ADFD2;
  --red:#C22B1E;
  --line:rgba(240,240,240,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{
  background:var(--bg);color:var(--fg);
  font-family:'Hanken Grotesk',sans-serif;font-weight:400;
  font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--teal);color:var(--bg)}
.wrap{max-width:1392px;margin:0 auto;padding:0 48px}
.mono{font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.mono.d{color:var(--dim2)}
.ser{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400}
.grad{background:linear-gradient(100deg,var(--teal) 10%,#EDF7F4 55%,var(--fg) 90%);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- aurora ---------- */
.aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.aurora .b{position:absolute;border-radius:50%;filter:blur(90px);opacity:.75;will-change:transform;}
.aurora .b1{width:52vw;height:52vw;background:radial-gradient(circle,#E23A24 0%,#8F1B10 55%,transparent 75%);top:-16%;right:6%}
.aurora .b2{width:38vw;height:38vw;background:radial-gradient(circle,#B92A16 0%,transparent 70%);top:22%;right:34%;}
.aurora .b3{width:30vw;height:30vw;background:radial-gradient(circle,#5E120A 0%,transparent 70%);top:4%;left:8%;}
to{transform:translate(-5%,7%) scale(1.12)}}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hero .top{position:relative;z-index:2;padding:44px 48px 0;display:flex;justify-content:space-between;align-items:flex-start}
.hero .intro{font-size:15.5px;line-height:1.6;max-width:34ch}
.hero .intro .ser{color:var(--teal);font-size:1.1em}
.hero .namewrap{position:relative;z-index:2;margin-top:auto;padding:0 48px;display:flex;align-items:baseline;justify-content:space-between;gap:2vw;flex-wrap:wrap}
.hero .n1{font-weight:400;letter-spacing:-.02em;line-height:.9;font-size:clamp(90px,17vw,245px)}
.hero .n2{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;letter-spacing:-.04em;line-height:.9;font-size:clamp(90px,17vw,245px)}
.hero .bot{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:20px;border-top:1px solid var(--line);margin-top:5vh;padding:26px 48px 30px;flex-wrap:wrap}
.hero .bot .l{display:flex;align-items:center;gap:10px}
.hero .bot .mid{display:flex;gap:14px;flex-wrap:wrap}
.hero .bot a:hover{color:var(--teal)}

/* ---------- sections ---------- */
section{padding:130px 0;position:relative}
.seclab{display:flex;align-items:baseline;gap:16px;margin-bottom:64px}
.seclab .cnt{font-size:14px;color:var(--dim2)}
.seclab h2{font-weight:300;letter-spacing:-.02em;font-size:clamp(28px,2.6vw,38px)}
.seclab h2 .ser{color:var(--teal)}

/* ---------- statement ---------- */
.statement p{font-weight:300;letter-spacing:-.01em;line-height:1.35;font-size:clamp(30px,3.6vw,52px);max-width:26ch}
.statement .ser{color:var(--teal);font-size:1.06em}
.statement .cred{margin-top:36px}

/* ---------- work list w/ preview ---------- */
.work .lay{display:grid;grid-template-columns:1.25fr 1fr;gap:70px;align-items:start}
.wrow{display:block;padding:22px 0;border-bottom:1px solid var(--line);cursor:pointer}
.wrow:first-of-type{border-top:1px solid var(--line)}
.wrow .t{font-weight:400;letter-spacing:-.015em;line-height:1.1;font-size:clamp(30px,3.9vw,56px);color:var(--dim);transition:color .35s,padding-left .35s}
.wrow .s{font-size:14px;color:transparent;transition:color .35s;margin-top:4px;max-width:52ch}
.wrow:hover .t,.wrow.on .t{color:var(--fg);padding-left:10px}
.wrow:hover .s,.wrow.on .s{color:var(--dim2)}
.preview{position:sticky;top:100px}
.preview .labels{display:flex;justify-content:space-between;margin-bottom:14px}
.preview .frame{border-radius:8px;overflow:hidden;aspect-ratio:4/3;background:#111}
.preview .frame img{width:100%;height:100%;object-fit:cover;transition:opacity .4s;filter:grayscale(.2) contrast(1.05)}

/* ---------- skills ---------- */
.skills .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.skills .col h3{font-weight:300;letter-spacing:-.01em;font-size:clamp(28px,2.8vw,40px);margin-bottom:26px}
.skills .col h3 .ser{color:var(--teal)}
.skills .col .it{padding:13px 0;border-top:1px solid var(--line);font-size:15.5px;color:var(--dim2);display:flex;gap:14px}
.skills .col .it b{color:var(--fg);font-weight:500}
.skills .col .it .mono{margin-top:3px}
.cloud{margin-top:80px;display:flex;flex-wrap:wrap;gap:14px 26px}
.cloud span{font-size:clamp(17px,1.8vw,24px);color:var(--dim);transition:color .3s;font-weight:300}
.cloud span:hover{color:var(--teal)}

/* ---------- voices ---------- */
.voices .grid{display:grid;grid-template-columns:1fr 1fr;gap:0 70px}
.vrow{padding:36px 0;border-bottom:1px solid var(--line)}
.vrow .q{font-weight:300;font-size:19px;line-height:1.5;color:var(--dim2)}
.vrow .q .ser{color:var(--teal);font-size:1.08em}
.vrow .who{display:flex;gap:14px;margin-top:18px;align-items:baseline}
.vrow .who .nm{font-weight:500;font-size:14.5px;color:var(--fg)}

/* ---------- awards & misc (speaking) ---------- */
.misc .rows{border-top:1px solid var(--line)}
.mrow{display:grid;grid-template-columns:80px 1.4fr 1fr auto;gap:24px;align-items:baseline;padding:24px 0;border-bottom:1px solid var(--line);transition:padding-left .3s}
.mrow:hover{padding-left:10px}
.mrow .yr{color:var(--dim2);font-size:14px}
.mrow .nm{font-weight:400;letter-spacing:-.01em;font-size:clamp(18px,1.9vw,26px)}
.mrow .pl{color:var(--dim2);font-size:14.5px}
.mrow .tp{color:var(--teal)}

/* ---------- journal ---------- */
.journal .jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.jcard{border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:border-color .35s,transform .35s;display:flex;flex-direction:column}
.jcard:hover{border-color:rgba(240,240,240,.35);transform:translateY(-5px)}
.jcard .ph{aspect-ratio:16/9;overflow:hidden}
.jcard .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(.7) contrast(1.05);transition:filter .5s}
.jcard:hover .ph img{filter:grayscale(0)}
.jcard .bd{padding:24px 26px 28px;display:flex;flex-direction:column;flex:1;gap:10px}
.jcard h3{font-weight:400;letter-spacing:-.015em;font-size:22px;line-height:1.15}
.jcard p{color:var(--dim2);font-size:14px}
.jcard .rd{margin-top:auto;padding-top:16px;color:var(--teal);font-size:14px}

/* ---------- contact (light inversion) ---------- */
.contact{background:var(--fg);color:var(--bg);padding:120px 0 0;overflow:hidden}
.contact .lay{display:grid;grid-template-columns:1.2fr 1fr;gap:70px;align-items:start}
.contact .note{font-weight:400;font-size:clamp(19px,1.9vw,22px);line-height:1.45;max-width:30ch}
.contact .note .ser{color:var(--red)}
.contact .meta{display:flex;gap:54px;margin-top:44px;flex-wrap:wrap}
.contact .meta .h{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(10,10,10,.5)}
.contact .meta .v{margin-top:6px;font-weight:600;font-size:15.5px}
.cform{display:flex;flex-direction:column;gap:0}
.cform input,.cform textarea{
  width:100%;background:transparent;border:none;border-bottom:1px solid rgba(10,10,10,.2);
  font-family:'Hanken Grotesk',sans-serif;font-size:16px;color:var(--bg);padding:18px 2px;outline:none;resize:none;
}
.cform input:focus,.cform textarea:focus{border-color:var(--red)}
.cform ::placeholder{color:rgba(10,10,10,.4)}
.cform button{
  margin-top:30px;align-self:flex-start;background:var(--bg);color:var(--fg);border:none;cursor:pointer;
  font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:600;padding:18px 36px;border-radius:100px;
  transition:background .3s,transform .3s;
}
.cform button:hover{background:var(--red);transform:translateY(-2px)}
.cform .fine{font-size:11.5px;color:rgba(10,10,10,.5);margin-top:14px}
.contact .mega{
  font-family:'Archivo Black',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(80px,13vw,187px);letter-spacing:-.03em;line-height:.9;
  margin-top:80px;margin-bottom:-2.5vw;white-space:nowrap;
}
.contact .fbot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid rgba(10,10,10,.15);padding:24px 48px;margin-top:60px}
.contact .fbot .mono{color:rgba(10,10,10,.55)}

/* ---------- reveals ---------- */

           

/* ---------- responsive ---------- */
@media (max-width:1080px){
  .work .lay{grid-template-columns:1fr}
  .preview{position:static;max-width:520px}
  .skills .cols{grid-template-columns:1fr}
  .voices .grid{grid-template-columns:1fr}
  .journal .jgrid{grid-template-columns:1fr}
}
@media (max-width:860px){
  .wrap{padding:0 22px}
  section{padding:90px 0}
  .hero .top{padding:26px 22px 0}
  .hero .namewrap{padding:0 22px;flex-direction:column;gap:0;align-items:flex-start}
  .hero .bot{padding:20px 22px 24px}
  .hero .bot .mid{display:none}
  .contact .lay{grid-template-columns:1fr;gap:44px}
  .mrow{grid-template-columns:60px 1fr;row-gap:6px}
  .mrow .pl,.mrow .tp{grid-column:2}
  .contact .fbot{padding:20px 22px}
}

.wr{opacity:0}
html.no-motion .wr{opacity:1}
:focus-visible{outline:2px solid var(--teal);outline-offset:3px}
.phx{position:relative;width:100%;background:#181818;display:grid;place-items:center;overflow:hidden}
.phx::after{content:attr(data-label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,240,240,.35);text-align:center;padding:12px;line-height:1.7}
.phx>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.preview .frame .phx{position:absolute;inset:0;height:100%;aspect-ratio:auto!important}
.jcard .ph .phx{position:absolute;inset:0;height:100%;aspect-ratio:auto!important}
#pimg2{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0}
</style></head>
<body>

<main id="site"></main>
<noscript><div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">Este template requiere JavaScript (contenido en content.json).</div></noscript>

<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
'use strict';
var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&!!(window.gsap&&window.ScrollTrigger&&window.Lenis);
if(!MOTION)document.documentElement.classList.add('no-motion');
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rich(s){return esc(s)
  .replace(/&lt;s&gt;/g,'<span class="ser">').replace(/&lt;\/s&gt;/g,'</span>')
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;br&gt;/g,'<br>').replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img,ratio){if(!img)return'';var r=(img.ratio||ratio||'4:5').replace(':',' / ');
  return'<div class="phx" style="aspect-ratio:'+r+'" data-label="'+esc(img.src?'':img.label||'')+'">'+(img.src?'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'">':'')+'</div>'}
function seclab(s){return'<div class="seclab wr" data-r1><span class="cnt">'+esc(s.cnt)+'</span><h2>'+rich(s.title)+'</h2></div>'}

var partials={
hero:function(s){return'<header class="hero" id="heroA">'+
'<div class="aurora"><div class="b b1" data-blob></div><div class="b b2" data-blob></div><div class="b b3" data-blob></div></div>'+
'<div class="top"><div class="intro wr" data-hero>'+rich(s.intro)+'</div><div class="mono d wr" data-hero>'+esc(s.tag)+'</div></div>'+
'<div class="namewrap"><div class="n1 wr" data-hero>'+esc(window.__B.n1)+'</div><div class="n2 grad wr" data-hero>'+esc(window.__B.n2)+'</div></div>'+
'<div class="bot wr" data-hero><div class="l"><span style="color:var(--teal)">→</span><span class="mono">'+esc(s.years)+'</span></div>'+
'<div class="mid mono d">'+(s.mid||[]).map(esc).join('<span>/</span>')+'</div>'+
'<div class="mid mono">'+(s.links||[]).map(function(l){return'<a href="'+esc(l[1])+'">'+esc(l[0])+'</a>'}).join('')+'</div></div></header>'},
statement:function(s){return'<section class="statement"><div class="wrap wr" data-r1><p>'+rich(s.text)+'</p><div class="cred mono d">'+esc(s.cred)+'</div></div></section>'},
work:function(s){return'<section class="work" id="'+esc(s.id||'work')+'" style="padding-top:0"><div class="wrap">'+seclab(s)+
'<div class="lay"><div class="wr" data-r1 id="wlist">'+(s.rows||[]).map(function(r,i){return'<div class="wrow'+(i===0?' on':'')+'" data-wrow="'+i+'"><div class="t">'+esc(r.t)+'</div><div class="s">'+esc(r.s)+'</div></div>'}).join('')+'</div>'+
'<div class="preview wr" data-r1><div class="labels"><span class="mono d">'+esc((s.labels||[])[0]||'')+'</span><span class="mono">'+esc((s.labels||[])[1]||'')+'</span></div>'+
'<div class="frame" id="pframe" style="position:relative">'+
((s.rows||[])[0]&&(s.rows[0].img||{}).src?'<img id="pimg" src="'+esc(s.rows[0].img.src)+'" alt=""><img id="pimg2" alt="">':'<div class="phx" style="position:absolute;inset:0" data-label="preview"></div>')+
'</div></div></div></div></section>'},
skills:function(s){return'<section class="skills" id="'+esc(s.id||'info')+'" style="padding-top:0"><div class="wrap">'+seclab(s)+
'<div class="cols" data-cards>'+(s.cols||[]).map(function(c){return'<div class="col wr"><h3>'+rich(c.h)+'</h3>'+(c.items||[]).map(function(it){return'<div class="it"><b>'+esc(it[0])+'</b>'+(it[1]?'<span class="mono d">'+esc(it[1])+'</span>':'')+'</div>'}).join('')+'</div>'}).join('')+'</div>'+
'<div class="cloud wr" data-r1>'+(s.cloud||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div></div></section>'},
voices:function(s){return'<section class="voices" style="padding-top:0"><div class="wrap">'+seclab(s)+
'<div class="grid" data-cards>'+(s.rows||[]).map(function(v){return'<div class="vrow wr"><div class="q">&ldquo;'+rich(v.q)+'&rdquo;</div><div class="who"><span class="nm">'+esc(v.n)+'</span><span class="mono d">'+esc(v.r)+'</span></div></div>'}).join('')+'</div></div></section>'},
misc:function(s){return'<section class="misc" style="padding-top:0"><div class="wrap">'+seclab(s)+
'<div class="rows wr" data-r1 data-rule>'+(s.rows||[]).map(function(r){return'<div class="mrow"><span class="yr">'+esc(r[0])+'</span><span class="nm">'+esc(r[1])+'</span><span class="pl">'+esc(r[2])+'</span><span class="mono tp">'+esc(r[3])+'</span></div>'}).join('')+'</div></div></section>'},
journal:function(s){return'<section class="journal" style="padding-top:0"><div class="wrap">'+seclab(s)+
'<div class="jgrid" data-cards>'+(s.posts||[]).map(function(p){return'<a class="jcard wr" href="#contact"><div class="ph" style="position:relative">'+ph(p.img,'16:10')+'</div><div class="bd"><span class="mono d">'+esc(p.lab)+'</span><h3>'+esc(p.t)+'</h3><p>'+esc(p.d)+'</p><span class="rd">Read →</span></div></a>'}).join('')+'</div></div></section>'},

'<div class="meta">'+(s.meta||[]).map(function(m){return'<div><div class="h">'+esc(m[0])+'</div><div class="v">'+esc(m[1])+'</div></div>'}).join('')+'</div></div>'+
'<div class="cform wr" data-r1>'+(s.fields||[]).map(function(f){return f[0]==='textarea'?'<textarea rows="2" placeholder="'+esc(f[1])+'"></textarea>':'<input type="'+esc(f[0])+'" placeholder="'+esc(f[1])+'">'}).join('')+
'<button>'+esc(s.submit)+'</button><span class="fine">'+esc(s.fine)+'</span></div></div>'+
'<div class="mega wr" data-r1>'+esc(s.mega)+'</div></div>'+
'<div class="fbot">'+(s.legal||[]).map(function(l){return'<span class="mono">'+esc(l)+'</span>'}).join('')+'</div></section>'}
};

function boot(data){
  window.__B=data.brand||{};
  if(data.meta){document.title=data.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('site').innerHTML=html;
  initMotion(data);
}

function initMotion(data){
  var wrows=[].slice.call(document.querySelectorAll('[data-wrow]'));
  var workData=(data.sections.find(function(s){return s.type==='work'})||{}).rows||[];
  var p1=document.getElementById('pimg'),p2=document.getElementById('pimg2');
  var current=0,manual=false,manualT=null;
  function setRow(i,fast){
    if(i===current||!wrows[i])return;
    wrows.forEach(function(r,j){r.classList.toggle('on',j===i)});
    var src=(workData[i]&&workData[i].img||{}).src;
    if(src&&p1&&p2){
      if(MOTION&&!fast){p2.src=src;
        gsap.fromTo(p2,{opacity:0},{opacity:1,duration:.45,ease:'expo.out',onComplete:function(){p1.src=src;gsap.set(p2,{opacity:0})}})}
      else p1.src=src}
    current=i}
  wrows.forEach(function(r,i){r.addEventListener('mouseenter',function(){manual=true;clearTimeout(manualT);setRow(i);
    manualT=setTimeout(function(){manual=false},2500)})});
  if(!MOTION)return;
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();if(lenis)lenis.scrollTo(t);else document.querySelector(t).scrollIntoView({behavior:'smooth'})}});
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[120,80,60][Math.min(i,2)]});
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});
  gsap.utils.toArray('[data-cards]').forEach(function(grid){
    var cards=grid.querySelectorAll('.wr');var d=0,steps=[90,70,55,45,40,40];
    cards.forEach(function(c,i){
      gsap.fromTo(c,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:d/1000,clearProps:'transform',
        scrollTrigger:{trigger:grid,start:'top 84%',once:true}});
      d+=steps[Math.min(i,5)]})});
  gsap.utils.toArray('[data-rule]').forEach(function(el){
    var line=document.createElement('div');
    line.style.cssText='height:1px;background:currentColor;opacity:.15;transform-origin:left center;transform:scaleX(0)';
    el.insertBefore(line,el.firstChild);
    gsap.to(line,{scaleX:1,duration:.8,ease:'expo.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}})});
  /* aurora scroll-mapped: los blobs derivan con el progreso del hero */
  var blobs=gsap.utils.toArray('[data-blob]');
  if(blobs.length){ScrollTrigger.create({trigger:'#heroA',start:'top top',end:'bottom top',scrub:.4,
    onUpdate:function(self){var p=self.progress;
      blobs.forEach(function(b,i){var k=(i+1)*14;
        b.style.transform='translate('+(p*k*(i%2?-1:1))+'px,'+(p*k)+'px) scale('+(1+p*.08)+')'})}})}
  /* R5 tour guiado: el progreso del work avanza la fila activa (hover manda) */
  var wlist=document.getElementById('wlist');
  if(wlist&&wrows.length&&matchMedia('(min-width:901px)').matches){
    ScrollTrigger.create({trigger:'.work',start:'top 55%',end:'bottom 55%',scrub:.4,
      onUpdate:function(self){if(manual)return;
        var i=Math.min(wrows.length-1,Math.floor(self.progress*wrows.length));
        setRow(i)}})}
}

fetch('/v8-luke/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div style="min-height:60vh;display:grid;place-items:center;font-family:monospace">No se pudo cargar content.json ('+esc(err.message)+')</div>'});
})();
</script>
</body>
</html>
