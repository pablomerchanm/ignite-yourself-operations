<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · v7 Noon</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   v7 "NOON" — el anti-marketing: tinta, crema, óxido, cero adornos.
   TOKENS: cambiar identidad = SOLO este bloque.
   Contenido: /v7-noon/content.json · principles/V7-NOON.md
   ============================================================ */
:root{
  --ink:#191919; --ink2:#1F1F1F; --cream:#FEFFF5; --olive:#3A392D;
  --rust:#994412; --gray:#A1A1A1; --line:rgba(254,255,245,.14);
  --f-sans:'Inter Tight',sans-serif; --f-mono:'DM Mono',monospace;
  /* tipo ratio 1.333 base 17 */
  --t-mono:.765rem; --t-body:1rem; --t-state:clamp(1.375rem,2vw,1.75rem);
  --t-d3:clamp(1.75rem,2.8vw,2.5rem);
  --t-d2:clamp(2.5rem,5.7vw,5.125rem);
  --t-d1:clamp(4rem,9.7vw,8.75rem);
  /* espacio base 8: tres alturas */
  --sec:clamp(88px,12vh,144px);
  --sec-band:calc(var(--sec)*.7);
  --gut:clamp(20px,2.8vw,40px);
  --maxw:1400px;
  /* motion */
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --r-btn:8px; --r-card:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html.no-motion{scroll-behavior:smooth}
body{background:var(--ink);color:var(--cream);font-family:var(--f-sans);font-weight:400;font-size:1.0625rem;line-height:1.5;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--rust);color:var(--cream)}
:focus-visible{outline:2px solid var(--rust);outline-offset:3px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut)}
.mono{font-family:var(--f-mono);font-size:var(--t-mono);font-weight:400;letter-spacing:-.01em;text-transform:uppercase}
.mono.dim{color:var(--gray)}
.wr{opacity:0}
html.no-motion .wr{opacity:1}
.ph{position:relative;width:100%;background:#242420;display:grid;place-items:center;overflow:hidden}
.ph::after{content:attr(data-label);font-family:var(--f-mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(254,255,245,.4);text-align:center;padding:14px;line-height:1.7}
.ph>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.d1{font-weight:400;letter-spacing:-.04em;line-height:1;font-size:var(--t-d1)}
.d2{font-weight:400;letter-spacing:-.04em;line-height:1;font-size:var(--t-d2)}
.d3{font-weight:400;letter-spacing:-.04em;line-height:1.05;font-size:var(--t-d3)}
.statement{font-weight:400;letter-spacing:-.02em;line-height:1.28;font-size:var(--t-state)}

.btn{display:inline-flex;align-items:center;gap:10px;background:var(--cream);color:var(--ink);border:none;cursor:pointer;font-family:var(--f-sans);font-size:.882rem;font-weight:500;padding:15px 28px;border-radius:var(--r-btn);transition:background var(--dur-hover) var(--ease-quick),transform var(--dur-hover) var(--ease-quick)}
.btn:hover{background:#fff;transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn.rust{background:var(--rust);color:var(--cream)}
.btn.rust:hover{background:#7C370E}

/* ---------- nav (nunca animado) ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:60;background:rgba(25,25,25,.82);backdrop-filter:blur(12px)}
.navin{display:flex;justify-content:space-between;align-items:center;padding:18px var(--gut)}
.nlogo{font-size:1.294rem;font-weight:500;letter-spacing:-.03em}
.nlogo span.dim2{color:var(--gray)}
.nlinks{display:flex;gap:34px;align-items:center;font-size:.912rem}
.nlinks a{opacity:.85;transition:opacity var(--dur-hover) var(--ease-quick)}
.nlinks a:hover{opacity:1}
.nlinks .btn{padding:11px 20px;opacity:1}
@media(max-width:800px){.nlinks a:not(.btn){display:none}}

/* ---------- HERO — retrato sangrado al borde derecho (LA ruptura) ---------- */
.hero{position:relative;min-height:100svh;display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);align-items:end;gap:0;padding-top:110px;overflow:clip}
.hero .lft{padding:0 24px clamp(48px,7vh,88px) var(--gut);max-width:660px;margin-left:auto;width:100%}
.hero .since{color:var(--gray);margin-bottom:26px;display:block}
.hero .statement{color:var(--gray);max-width:38ch;margin-bottom:34px}
.hero h1{margin-bottom:40px}
.hero .trust{display:flex;align-items:center;gap:14px}
.hero .avs{display:flex}
.hero .av{width:34px;height:34px;border-radius:50%;background:var(--olive);color:var(--cream);display:grid;place-items:center;font-family:var(--f-mono);font-size:.65rem;border:1px solid rgba(254,255,245,.25);margin-left:-8px}
.hero .av:first-child{margin-left:0}
.hero .tlines{font-family:var(--f-mono);font-size:.7rem;letter-spacing:.02em;text-transform:uppercase;color:var(--gray);line-height:1.7}
.hero .rgt{position:relative;height:100%;min-height:70vh}
.hero .rgt .ph{position:absolute;inset:0;height:100%}
.hero .rgt .ph>img{filter:grayscale(.35) contrast(1.05)}
.hero .rgt::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--ink),transparent 30%);pointer-events:none}
@media(max-width:900px){.hero{grid-template-columns:1fr;padding-top:96px}.hero .lft{max-width:none;padding-right:var(--gut)}.hero .rgt{min-height:52vh;order:-1}.hero .rgt::after{background:linear-gradient(180deg,var(--ink),transparent 40%)}}

/* ---------- SERVICES — cabecera izq + grid cards ---------- */
.services{padding:var(--sec) 0}
.shead{margin-bottom:54px}
.shead .mono{color:var(--gray);display:block;margin-bottom:18px}
.simg{margin:0 0 54px}
.simg .ph{aspect-ratio:21/7;border-radius:var(--r-card)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.ccard{background:var(--ink2);border:1px solid rgba(254,255,245,.08);border-radius:var(--r-card);padding:34px 30px;display:flex;flex-direction:column;min-height:250px;transition:border-color var(--dur-hover) var(--ease-quick),transform var(--dur-hover) var(--ease-quick)}
.ccard:hover{border-color:rgba(254,255,245,.22);transform:translateY(-4px)}
.ccard h3{font-weight:400;font-size:1.53rem;letter-spacing:-.03em;line-height:1.08;margin-bottom:14px}
.ccard p{font-size:.882rem;color:var(--gray);line-height:1.6;max-width:34ch}
.ccard .tags{margin-top:auto;padding-top:22px;display:flex;gap:8px;flex-wrap:wrap}
.ccard .tg{font-family:var(--f-mono);font-size:.647rem;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);border-radius:100px;padding:5px 12px}
@media(max-width:900px){.sgrid{grid-template-columns:1fr}}

/* ---------- CASES — cabecera DERECHA (variación) + grid 2 ---------- */
.cases{padding:0 0 var(--sec)}
.chead{margin-bottom:54px;text-align:right}
.chead .mono{color:var(--gray);display:block;margin-bottom:18px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kcard{background:var(--ink2);border:1px solid rgba(254,255,245,.08);border-radius:var(--r-card);padding:32px 30px;transition:border-color var(--dur-hover) var(--ease-quick)}
.kcard:hover{border-color:rgba(254,255,245,.22)}
.kcard .top{display:flex;justify-content:space-between;gap:14px;margin-bottom:16px}
.kcard .hh{font-size:1.15rem;font-weight:500;letter-spacing:-.02em;max-width:26ch}
.kcard .arr{color:var(--rust);font-size:1rem}
.kcard .q{color:var(--gray);font-size:.912rem;line-height:1.6;margin-bottom:22px}
.kcard .who{display:flex;align-items:center;gap:11px}
.kcard .av{width:34px;height:34px;border-radius:50%;background:var(--olive);display:grid;place-items:center;font-family:var(--f-mono);font-size:.65rem;flex:none}
.kcard .nm{font-size:.85rem;font-weight:500}
.kcard .rl{font-family:var(--f-mono);font-size:.65rem;text-transform:uppercase;color:var(--gray);margin-top:2px}
@media(max-width:800px){.cgrid{grid-template-columns:1fr}.chead{text-align:left}}

/* ---------- STATS — LA CUENTA HONESTA (scrolly R5) ---------- */
.stats{background:var(--ink2);padding:var(--sec-band) 0}
.stats .kick{color:var(--gray);display:block;margin-bottom:44px}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.stat .n{font-weight:300;font-size:clamp(3.5rem,6.4vw,6rem);letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
.stat .n .suf{color:var(--rust)}
.stat.zero .n{color:var(--rust)}
.stat .l{margin-top:14px;color:var(--gray);font-size:.882rem;line-height:1.5;max-width:22ch}
.stat.zero .l u{text-decoration:none;background-image:linear-gradient(var(--rust),var(--rust));background-repeat:no-repeat;background-size:var(--uw,0%) 2px;background-position:0 100%;padding-bottom:3px}
html.no-motion .stat.zero .l u{--uw:100%}
@media(max-width:900px){.statrow{grid-template-columns:1fr 1fr;gap:44px}}

/* ---------- ABOUT ---------- */
.about{padding:var(--sec) 0}
.about .grid{display:grid;grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);gap:clamp(36px,5vw,80px);align-items:start}
.about .photo .ph{aspect-ratio:4/5;border-radius:var(--r-card)}
.about .cap{margin-top:14px;font-family:var(--f-mono);font-size:.7rem;text-transform:uppercase;color:var(--gray)}
.about .kick{color:var(--gray);display:block;margin-bottom:22px}
.about .lead{font-size:var(--t-d3);letter-spacing:-.03em;line-height:1.18;margin-bottom:30px;font-weight:400}
.about p.body{color:var(--gray);line-height:1.7;max-width:60ch;margin-bottom:16px}
.about p.body .r{color:var(--cream)}
@media(max-width:900px){.about .grid{grid-template-columns:1fr}}

/* ---------- SPEAK ---------- */
.speak{padding:0 0 var(--sec)}
.speak .grid{display:grid;grid-template-columns:minmax(0,.8fr) minmax(0,1.2fr);gap:clamp(36px,5vw,80px);align-items:start}
.speak .photo .ph{aspect-ratio:4/5;border-radius:var(--r-card)}
.speak .kick{color:var(--gray);display:block;margin-bottom:18px}
.speak h2{margin-bottom:14px}
.speak .lead{color:var(--gray);max-width:50ch;margin-bottom:38px}
.srow{display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:center;padding:19px 0;border-top:1px solid var(--line)}
.srow:last-of-type{border-bottom:1px solid var(--line)}
.srow .yr{font-family:var(--f-mono);font-size:.765rem;color:var(--rust)}
.srow .tt{font-weight:500;font-size:1rem;letter-spacing:-.01em}
.srow .ww{font-size:.8rem;color:var(--gray)}
.srow .tp{font-family:var(--f-mono);font-size:.65rem;text-transform:uppercase;color:var(--gray);border:1px solid var(--line);border-radius:100px;padding:6px 14px}
@media(max-width:900px){.speak .grid{grid-template-columns:1fr}.srow{grid-template-columns:44px 1fr;row-gap:6px}.srow .tp{grid-column:2;justify-self:start}}

/* ---------- JOURNAL ---------- */
.journal{padding:0 0 var(--sec)}
.journal .kick{color:var(--gray);display:block;margin-bottom:44px}
.jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.jpost{background:var(--ink2);border:1px solid rgba(254,255,245,.08);border-radius:var(--r-card);overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--dur-hover) var(--ease-quick),transform var(--dur-hover) var(--ease-quick)}
.jpost:hover{border-color:rgba(254,255,245,.22);transform:translateY(-4px)}
.jpost .phw{aspect-ratio:16/10;overflow:hidden}
.jpost .phw .ph{height:100%}
.jpost .phw img{transition:transform .7s var(--ease-out)}
.jpost:hover .phw img{transform:scale(1.04)}
.jpost .bd{padding:26px 28px 30px;display:flex;flex-direction:column;flex:1}
.jpost .lab{font-family:var(--f-mono);font-size:.65rem;text-transform:uppercase;color:var(--gray);margin-bottom:12px}
.jpost h3{font-weight:400;font-size:1.4rem;letter-spacing:-.03em;line-height:1.1}
.jpost p{margin-top:10px;color:var(--gray);font-size:.85rem}
.jpost .rd{margin-top:auto;padding-top:20px;font-size:.85rem;font-weight:500}
.jpost .rd span{color:var(--rust);display:inline-block;transition:transform var(--dur-hover) var(--ease-quick)}
.jpost:hover .rd span{transform:translateX(4px)}
@media(max-width:900px){.jgrid{grid-template-columns:1fr}}

/* ---------- GUIDE ---------- */
.guide{padding:0 0 var(--sec)}
.gcard{background:var(--olive);border-radius:20px;padding:clamp(40px,5vw,72px);display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(32px,4vw,64px);align-items:center}
.gcard .kick{color:rgba(254,255,245,.6);display:block;margin-bottom:18px}
.gcard h3{font-weight:400;font-size:var(--t-d3);letter-spacing:-.03em;line-height:1.1;max-width:20ch}
.gcard ul{list-style:none;margin:0 0 26px}
.gcard li{display:flex;gap:12px;font-size:.912rem;color:rgba(254,255,245,.85);margin-bottom:12px}
.gcard li::before{content:'—';color:var(--rust)}
.gcard form{display:flex;gap:10px;flex-wrap:wrap}
.gcard input{flex:1;min-width:180px;border:1px solid rgba(254,255,245,.25);background:rgba(25,25,25,.25);border-radius:var(--r-btn);padding:14px 18px;font-family:var(--f-sans);font-size:.882rem;color:var(--cream)}
.gcard input::placeholder{color:rgba(254,255,245,.5)}
.gcard input:focus{outline:none;border-color:var(--rust)}
.gcard .fine{font-family:var(--f-mono);font-size:.647rem;color:rgba(254,255,245,.5);margin-top:16px;line-height:1.7;text-transform:uppercase}
@media(max-width:900px){.gcard{grid-template-columns:1fr}}

/* ---------- FINALE ---------- */
.finale{border-top:1px solid var(--line);padding:var(--sec) 0 0;text-align:center}
.finale .kick{color:var(--gray);display:block;margin-bottom:26px}
.finale h2{font-weight:400;letter-spacing:-.04em;line-height:1.02;font-size:var(--t-d2);max-width:16ch;margin:0 auto 34px}
.finale h2 .r{color:var(--rust)}
.finale .row{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:80px}
.finale .tel{font-size:1.294rem;font-weight:500;letter-spacing:-.02em}
.fcols{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:820px;margin:0 auto 70px;text-align:left}
.fcols .h{font-family:var(--f-mono);font-size:.65rem;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
.fcols .v{font-size:.912rem}
.fbot{border-top:1px solid var(--line);padding:26px var(--gut) 30px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-family:var(--f-mono);font-size:.7rem;text-transform:uppercase;color:var(--gray)}
@media(max-width:700px){.fcols{grid-template-columns:1fr;gap:20px}}
.load-error{min-height:60vh;display:grid;place-items:center;text-align:center;padding:var(--gut);font-family:var(--f-mono);font-size:.8rem;line-height:1.8;color:var(--gray)}
</style>
</head>
<body>

<nav><div class="navin">
  <span class="nlogo"><span id="brandLogo"></span><span class="dim2" id="brandDim"></span></span>
  <div class="nlinks" id="navLinks"></div>
</div></nav>

<main id="site"></main>
<noscript><div class="load-error"><p>Este template requiere JavaScript (contenido en content.json).</p></div></noscript>

<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
'use strict';
var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&!!(window.gsap&&window.ScrollTrigger&&window.Lenis);
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rich(s){return esc(s)
  .replace(/&lt;r&gt;/g,'<span class="r">').replace(/&lt;\/r&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>').replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img,ratio){if(!img)return'';var r=(img.ratio||ratio||'4:5').replace(':',' / ');
  return'<div class="ph" style="aspect-ratio:'+r+'" data-label="'+esc(img.src?'':img.label||'')+'">'+(img.src?'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'">':'')+'</div>'}

var partials={
  hero:function(s){return'<header class="hero"><div class="lft">'+
    '<span class="since mono wr" data-hero>'+esc(s.since)+'</span>'+
    '<p class="statement wr" data-hero>'+esc(s.statement)+'</p>'+
    '<h1 class="d1 wr" data-hero>'+rich(s.title)+'</h1>'+
    '<div class="trust wr" data-hero><div class="avs">'+((s.trust||{}).initials||[]).map(function(a){return'<span class="av">'+esc(a)+'</span>'}).join('')+'</div><div class="tlines">'+((s.trust||{}).lines||[]).map(esc).join('<br>')+'</div></div>'+
    '</div><div class="rgt wr" data-portrait>'+ph(s.portrait,'3:4')+'</div></header>'},

  services:function(s){return'<section class="services"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
    '<div class="shead wr" data-r1><span class="mono dim">'+esc(s.kick)+'</span><h2 class="d2">'+esc(s.title)+'</h2></div>'+
    '<div class="simg wr" data-img>'+ph(s.image,'21:7')+'</div>'+
    '<div class="sgrid" data-cards>'+(s.cards||[]).map(function(c){return'<div class="ccard wr"><h3>'+rich(c.t)+'</h3><p>'+esc(c.d)+'</p><div class="tags">'+(c.tags||[]).map(function(t){return'<span class="tg">'+esc(t)+'</span>'}).join('')+'</div></div>'}).join('')+'</div></div></section>'},

  cases:function(s){return'<section class="cases"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
    '<div class="chead wr" data-r1><span class="mono dim">'+esc(s.kick)+'</span><h2 class="d2">'+esc(s.title)+'</h2></div>'+
    '<div class="cgrid" data-cards>'+(s.items||[]).map(function(c){return'<div class="kcard wr"><div class="top"><span class="hh">'+esc(c.h)+'</span><span class="arr">↗</span></div><p class="q">&ldquo;'+esc(c.q)+'&rdquo;</p><div class="who"><span class="av">'+esc(c.ini)+'</span><div><div class="nm">'+esc(c.n)+'</div><div class="rl">'+esc(c.r)+'</div></div></div></div>'}).join('')+'</div></div></section>'},

  stats:function(s){return'<section class="stats" id="honestCount"><div class="wrap">'+
    '<span class="kick mono">'+esc(s.kick)+'</span>'+
    '<div class="statrow">'+(s.items||[]).map(function(x){return'<div class="stat'+(x.zero?' zero':'')+' wr" data-r1><div class="n"><span data-count="'+(+x.n)+'">'+x.n+'</span><span class="suf">'+esc(x.suf||'')+'</span></div><div class="l">'+(x.zero?'<u>'+esc(x.l)+'</u>':esc(x.l))+'</div></div>'}).join('')+'</div></div></section>'},

  about:function(s){return'<section class="about"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap"><div class="grid">'+
    '<div class="photo wr" data-img>'+ph(s.photo,'4:5')+'<div class="cap">'+esc(s.caption)+'</div></div>'+
    '<div><span class="kick mono wr" data-r1>'+esc(s.kick)+'</span>'+
    '<p class="lead wr" data-r1>'+esc(s.lead)+'</p>'+
    '<div class="wr" data-r1>'+(s.paras||[]).map(function(p){return'<p class="body">'+rich(p)+'</p>'}).join('')+'</div>'+
    '</div></div></div></section>'},

  speak:function(s){return'<section class="speak"><div class="wrap"><div class="grid">'+
    '<div class="photo wr" data-img>'+ph(s.photo,'4:5')+'</div>'+
    '<div><span class="kick mono wr" data-r1>'+esc(s.kick)+'</span><h2 class="d3 wr" data-r1>'+esc(s.title)+'</h2><p class="lead wr" data-r1>'+esc(s.text)+'</p>'+
    '<div class="wr" data-r1 data-rule>'+(s.rows||[]).map(function(r){return'<div class="srow"><span class="yr">'+esc(r.y)+'</span><span><span class="tt">'+esc(r.t)+'</span><br><span class="ww">'+esc(r.w)+'</span></span><span class="tp">'+esc(r.tp)+'</span></div>'}).join('')+'</div></div></div></div></section>'},

  journal:function(s){return'<section class="journal"><div class="wrap">'+
    '<span class="kick mono wr" data-r1>'+esc(s.kick)+'</span>'+
    '<div class="jgrid" data-cards>'+(s.posts||[]).map(function(p){return'<article class="jpost wr"><div class="phw">'+ph(p.img,'16:10')+'</div><div class="bd"><span class="lab">'+esc(p.lab)+'</span><h3>'+esc(p.t)+'</h3><p>'+esc(p.d)+'</p><div class="rd">Read <span>→</span></div></div></article>'}).join('')+'</div></div></section>'},

  guide:function(s){return'<section class="guide"><div class="wrap"><div class="gcard wr" data-r1>'+
    '<div><span class="kick mono">'+esc(s.kick)+'</span><h3>'+esc(s.title)+'</h3></div>'+
    '<div><ul>'+(s.items||[]).map(function(i){return'<li>'+esc(i)+'</li>'}).join('')+'</ul>'+
    '<form onsubmit="return false"><input type="email" placeholder="you@email.com"><button class="btn rust">'+esc(s.submit)+'</button></form>'+
    '<p class="fine">'+esc(s.fine)+'</p></div></div></div></section>'},

  finale:function(s){return'<section class="finale"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="wrap">'+
    '<span class="kick mono wr" data-r1>'+esc(s.kick)+'</span>'+
    '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
    '<div class="row wr" data-r1><span class="tel">'+esc(s.phone)+'</span><a class="btn" href="'+esc((s.cta||{}).href||'#')+'">'+esc((s.cta||{}).text||'')+'</a></div>'+
    '<div class="fcols wr" data-r1>'+(s.cols||[]).map(function(c){return'<div><div class="h">'+esc(c.h)+'</div><div class="v">'+esc(c.v)+'</div></div>'}).join('')+'</div></div>'+
    '<div class="fbot"><span>'+esc(s.logo||'')+'</span>'+(s.legal||[]).map(function(l){return'<span>'+esc(l)+'</span>'}).join('')+'</div></section>'}
};

function boot(data){
  if(data.meta){document.title=data.meta.title||document.title;
    if(data.meta.lang)document.documentElement.lang=data.meta.lang;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  document.getElementById('brandLogo').textContent=(data.brand||{}).logo||'';
  document.getElementById('brandDim').textContent=(data.brand||{}).logoDim||'';
  var nc=(data.nav||{}).cta;
  document.getElementById('navLinks').innerHTML=((data.nav||{}).links||[]).map(function(l){return'<a href="'+esc(l.href)+'">'+esc(l.text)+'</a>'}).join('')+(nc?'<a class="btn" href="'+esc(nc.href)+'">'+esc(nc.text)+'</a>':'');
  var html='';(data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  document.getElementById('site').innerHTML=html;
  initMotion();
}

function initMotion(){
  if(!MOTION)return;
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();if(lenis)lenis.scrollTo(t);else document.querySelector(t).scrollIntoView({behavior:'smooth'})}});

  /* R2 hero-stagger decreciente */
  var acc=0;gsap.utils.toArray('[data-hero]').forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:.12+acc/1000,clearProps:'transform'});
    acc+=[110,75,55][Math.min(i,2)]});
  var por=document.querySelector('[data-portrait]');
  if(por)gsap.fromTo(por,{opacity:0},{opacity:1,duration:.9,ease:'expo.out',delay:.2});

  /* R1 rise por grupo */
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R4 card-settle stagger decreciente */
  gsap.utils.toArray('[data-cards]').forEach(function(grid){
    var cards=grid.querySelectorAll('.wr');var d=0,steps=[90,70,55,45,40,40];
    cards.forEach(function(c,i){
      gsap.fromTo(c,{opacity:0,y:14,scale:.985},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:d/1000,clearProps:'transform',
        scrollTrigger:{trigger:grid,start:'top 84%',once:true}});
      d+=steps[Math.min(i,5)]})});

  /* R3 rule-draw */
  gsap.utils.toArray('[data-rule]').forEach(function(el){
    var line=document.createElement('div');
    line.style.cssText='height:1px;background:currentColor;opacity:.2;transform-origin:left center;transform:scaleX(0)';
    el.insertBefore(line,el.firstChild);
    gsap.to(line,{scaleX:1,duration:.8,ease:'expo.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}})});

  /* R4b img-settle */
  gsap.utils.toArray('[data-img]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,scale:1.03},{opacity:1,scale:1,duration:.9,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R5 — LA CUENTA HONESTA: números suben con scroll; el 0 NO se mueve y
     su label se subraya en rust al 85% del progreso. Scrub 1, sin pin. */
  var counts=gsap.utils.toArray('[data-count]');
  var zeroU=document.querySelector('.stat.zero .l u');
  if(counts.length){
    counts.forEach(function(el){if(+el.dataset.count>0)el.textContent='0'});
    ScrollTrigger.create({trigger:'#honestCount',start:'top 78%',end:'bottom 55%',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        counts.forEach(function(el){var total=+el.dataset.count;
          if(total>0)el.textContent=String(Math.round(total*Math.min(1,p*1.15)))});
        if(zeroU)zeroU.style.setProperty('--uw',(gsap.utils.clamp(0,1,(p-.85)/.15)*100)+'%')}});
  }
}

fetch('/v7-noon/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div class="load-error"><p>No se pudo cargar content.json ('+esc(err.message)+').</p></div>'});
})();
</script>
</body>
