<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jorge Arce — Chapter 01</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   v2 "MONOGRAPH" — monografía clínica navy/azure.
   TOKENS: cambiar identidad = editar SOLO este bloque.
   Contenido: /v2/content.json · Principios: principles/V2-MONOGRAPH.md
   ============================================================ */
:root{
  --black:#080B12; --white:#EDEBE6; --dim:#8891A1; --dimmer:#39424F;
  --blue:#3B82F0; --blue-soft:#8FB6F5;
  --hair:rgba(237,235,230,.14); --hair-blue:rgba(59,130,240,.35);
  --act-bg:#F3F1EC; --act-ink:#10141B; --act-dim:#6A7180; --act-hair:rgba(16,20,27,.16);
  --f-sans:"Inter Tight",system-ui,sans-serif;
  --f-serif:"Instrument Serif",serif;
  --f-mono:"IBM Plex Mono",monospace;
  /* tipo — ratio 1.333 base 16 */
  --t-micro:.656rem; --t-mono:.75rem; --t-body:.9375rem; --t-lead:1rem;
  --t-sub:1.333rem; --t-head:1.777rem; --t-display:clamp(1.9rem,4.6vw,4rem);
  --t-hero:clamp(4.2rem,15.5vw,15rem);
  /* espacio — base 8 */
  --s-2:16px; --s-3:24px; --s-4:32px; --s-5:48px; --s-6:64px; --s-8:128px;
  --sec:clamp(72px,12vh,128px);         /* sección estándar */
  --sec-air:clamp(110px,18vh,192px);    /* respiro (manifesto) */
  --band:clamp(48px,8vh,64px);          /* banda (stamps) */
  --gut:clamp(20px,3vw,32px);
  --maxw:1180px;
  /* motion — 2 easings */
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--f-sans);-webkit-font-smoothing:antialiased;line-height:1.4;overflow-x:clip;font-size:var(--t-body)}
img{max-width:100%;display:block}
a{color:inherit}
:focus-visible{outline:2px solid var(--blue);outline-offset:3px}
.mono{font-family:var(--f-mono);font-size:var(--t-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.ital{font-family:var(--f-serif);font-style:italic;font-weight:400;letter-spacing:0}
.wr{opacity:0}
html.no-motion .wr{opacity:1}

.ph{position:relative;width:100%;background:#131A26;display:grid;place-items:center;overflow:hidden}
.ph::after{content:attr(data-label);font-family:var(--f-mono);font-size:var(--t-micro);letter-spacing:.14em;text-transform:uppercase;color:rgba(237,235,230,.4);text-align:center;padding:14px;line-height:1.7}
.ph>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ---------- NAV (nunca animado) ---------- */
nav{position:fixed;inset:0 0 auto 0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:22px var(--gut);mix-blend-mode:difference}
nav .brand{font-family:var(--f-mono);font-size:.7rem;letter-spacing:.18em;color:var(--white)}
nav .links{display:flex;gap:26px}
nav .links a{font-family:var(--f-mono);font-size:.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color var(--dur-hover) var(--ease-quick)}
nav .links a:hover{color:var(--white)}
nav .contact{font-family:var(--f-mono);font-size:.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--white);text-decoration:none;border:1px solid var(--hair);padding:9px 18px;transition:background var(--dur-hover) var(--ease-quick),color var(--dur-hover) var(--ease-quick),border-color var(--dur-hover) var(--ease-quick)}
nav .contact:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
@media (max-width:760px){nav .links{display:none}}

/* ---------- HERO — la ruptura de retícula: nombre 15rem sobre retrato ---------- */
.hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden}
.hero .portrait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.hero .portrait .ph{position:absolute;inset:0;height:100%;background:transparent}
.hero .portrait img{width:min(1100px,100%);height:100%;object-fit:cover;object-position:center 24%;filter:contrast(1.04) saturate(1.02) brightness(.98);position:static}
.hero .portrait::after{content:"";position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(8,11,18,.5) 0%,rgba(8,11,18,0) 26%,rgba(8,11,18,0) 52%,rgba(8,11,18,.92) 86%,#080B12 100%),
  linear-gradient(90deg,#080B12 0%,rgba(8,11,18,0) 20%,rgba(8,11,18,0) 80%,#080B12 100%),
  linear-gradient(180deg,rgba(20,44,88,.16),rgba(8,11,18,0) 40%)}
.hero .notes{position:absolute;z-index:5;left:var(--gut);top:22vh;display:flex;flex-direction:column;gap:22px;max-width:250px}
.hero .notes p{font-family:var(--f-mono);font-size:.656rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);line-height:1.8}
.hero .notes p b{color:var(--white);font-weight:500}
@media (max-width:900px){.hero .notes{display:none}}
.hero .name{position:relative;z-index:6;width:100%;padding:0 var(--gut) 20px;line-height:.86}
.hero .name .l1{font-weight:700;font-size:var(--t-hero);letter-spacing:-.045em}
.hero .name .l2{font-family:var(--f-serif);font-style:italic;font-weight:400;font-size:var(--t-hero);letter-spacing:-.02em;margin-left:.42em;color:var(--blue-soft)}
.hero .strip{position:relative;z-index:6;width:100%;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:0 var(--gut) 26px}
.hero .strip .mono b{color:var(--white);font-weight:500}
.scrolldown{position:absolute;z-index:6;right:var(--gut);top:44vh;writing-mode:vertical-rl;font-family:var(--f-mono);font-size:.594rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dim)}
.scrolldown::after{content:"";display:block;width:1px;height:44px;background:linear-gradient(var(--blue),transparent);margin:14px auto 0}
@media (max-width:760px){.scrolldown{display:none}.hero .strip{flex-wrap:wrap}}

/* ---------- MANIFESTO — respiro ×1.5 ---------- */
.manifesto{padding:var(--sec-air) var(--gut) var(--sec);max-width:var(--maxw);margin:0 auto}
.kick{margin-bottom:44px;display:flex;gap:10px;align-items:baseline}
.kick .no{font-family:var(--f-serif);font-style:italic;color:var(--blue);font-size:.9375rem}
.manifesto h2{font-weight:600;font-size:var(--t-display);line-height:1.14;letter-spacing:-.025em;text-wrap:balance}
.manifesto h2 .ital{font-size:1.04em;color:var(--blue-soft)}
.manifesto h2 .dim{color:var(--dimmer)}

/* ---------- STAMPS — banda ×0.5 ---------- */
.stamps{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut) var(--band)}
.stamps .row{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--hair)}
.stamps .s{padding:22px 8px 0;display:flex;gap:10px;align-items:baseline}
.stamps .s .arr{color:var(--blue);font-family:var(--f-mono);font-size:.7rem}
.stamps .s p{font-family:var(--f-mono);font-size:.656rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);line-height:1.8}
.stamps .s p b{color:var(--white);font-weight:500}
@media (max-width:760px){.stamps .row{grid-template-columns:1fr}.stamps .s{padding-top:16px}}

/* ---------- PATH — EL MOMENTO: la ruta se dibuja (R5) ---------- */
.path{max-width:var(--maxw);margin:0 auto;padding:var(--sec) var(--gut)}
.path h2{font-weight:600;font-size:var(--t-display);line-height:1.1;letter-spacing:-.025em;max-width:16ch}
.path h2 .ital{font-size:1.05em;color:var(--blue-soft)}
.route{position:relative;margin:clamp(48px,7vw,86px) 0 clamp(40px,6vw,70px);height:190px}
.route svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.route .node{position:absolute;transform:translate(-50%,-50%)}
.route .node .dot{width:9px;height:9px;border-radius:50%;background:var(--white);margin:0 auto}
.route .node.dest .dot{background:var(--blue);box-shadow:0 0 0 5px rgba(59,130,240,.18)}
.route .node .lbl{margin-top:16px;text-align:center;white-space:nowrap}
.route .node .city{font-family:var(--f-serif);font-style:italic;font-size:clamp(1.3rem,2.4vw,2rem);line-height:1;color:var(--white)}
.route .node.dest .city{color:var(--blue-soft)}
.route .node .co{display:block;margin-top:9px;font-family:var(--f-mono);font-size:.594rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.route .node.orig{left:12%;top:64%}
.route .node.dest{left:86%;top:34%}
.route .yrs{position:absolute;left:50%;top:-6%;transform:translateX(-50%);text-align:center}
.route .yrs .n{font-weight:700;font-size:clamp(2.4rem,5vw,4.2rem);letter-spacing:-.03em;line-height:.9;font-variant-numeric:tabular-nums}
.route .yrs .u{display:block;margin-top:8px;font-family:var(--f-mono);font-size:.594rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.route .rnode{will-change:transform,opacity}
html.no-motion .route .rnode{opacity:1;transform:translate(-50%,-50%)}
.path .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;border-top:1px solid var(--hair);padding-top:26px}
.path .cols .c{max-width:34ch}
.path .cols .c .h{font-family:var(--f-mono);font-size:.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
.path .cols .c p{font-size:var(--t-body);color:#B9BEC8;line-height:1.62}
.path .cols .c p b{color:var(--white);font-weight:600}
@media (max-width:760px){
  .route{height:360px}
  .route .node .lbl{white-space:normal;width:min(48vw,190px)}
  .route .node .city{font-size:1.5rem}
  .route .node .co{font-size:.531rem;letter-spacing:.07em;line-height:1.4}
  .route .node.orig{left:30%;top:84%}.route .node.dest{left:70%;top:20%}
  .route .yrs{top:44%}
  .path .cols{grid-template-columns:1fr;gap:22px}
}

/* ---------- EXPERTISE — índice ---------- */
.exp{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut) var(--sec)}
.exp .lead{max-width:40ch;margin-bottom:clamp(40px,6vw,64px)}
.exp .lead h2{font-weight:600;font-size:clamp(1.7rem,3.6vw,3rem);line-height:1.1;letter-spacing:-.02em}
.exp .lead h2 .ital{color:var(--blue-soft)}
.idx{border-top:1px solid var(--hair)}
.exp .row{display:grid;grid-template-columns:64px minmax(0,1fr) minmax(0,1.1fr);gap:24px;align-items:baseline;padding:clamp(22px,3vw,34px) 0;border-bottom:1px solid var(--hair)}
.exp .row>*{transition:transform var(--dur-hover) var(--ease-quick),color var(--dur-hover) var(--ease-quick)}
.exp .row .num{font-family:var(--f-serif);font-style:italic;font-size:1.0625rem;color:var(--dim)}
.exp .row .ttl{font-weight:600;font-size:clamp(1.5rem,3vw,2.4rem);letter-spacing:-.02em;line-height:1}
.exp .row .dsc{font-size:.9rem;color:#9BA1AC;line-height:1.6;max-width:44ch}
.exp .row:hover>*{transform:translateX(14px)}
.exp .row:hover .num{color:var(--blue)}
.exp .row:hover .ttl{color:var(--blue-soft)}
@media (max-width:760px){.exp .row{grid-template-columns:40px 1fr;row-gap:10px}.exp .row .dsc{grid-column:2}}

/* ---------- chapter primitives ---------- */
.chap{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut) var(--sec)}
.bigh{font-weight:600;font-size:var(--t-display);line-height:1.1;letter-spacing:-.025em}
.bigh .ital{color:var(--blue-soft);font-size:1.05em}
.plate{border:1px solid var(--hair);padding:12px;background:rgba(237,235,230,.02)}
.plate .phw{overflow:hidden}
.plate .phw img{transition:transform .4s var(--ease-quick)}
.plate:hover .phw img{transform:scale(1.03)}
.plate .cap{display:flex;justify-content:space-between;gap:10px;padding-top:11px;font-family:var(--f-mono);font-size:.594rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}

/* ---------- THEATRE ---------- */
.theatre .tgrid{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;margin-top:clamp(36px,5vw,56px)}
.theatre .tgrid .main .ph{aspect-ratio:4/3}
.theatre .col{display:grid;gap:16px}
.theatre .col .ph{aspect-ratio:16/9}
@media (max-width:860px){.theatre .tgrid{grid-template-columns:1fr}}

/* ---------- LIGHT ACT ---------- */
.act{background:var(--act-bg);color:var(--act-ink)}
.act .mono{color:var(--act-dim)}
.act .bigh .ital{color:var(--blue)}
.act .plate{border-color:var(--act-hair);background:#FFFFFF}
.act .plate .cap{color:var(--act-dim)}
.act .ph{background:#E4E1D9}
.act .ph::after{color:rgba(16,20,27,.45)}

.about{padding-top:var(--sec)}
.about .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(32px,5vw,72px);margin-top:clamp(36px,5vw,56px);align-items:start}
.about .txt p{font-size:1rem;line-height:1.75;color:#39404E;max-width:54ch;margin-bottom:16px}
.about .txt p b{color:var(--act-ink);font-weight:600}
.about .txt .ital{color:var(--act-ink)}
.about .sig{font-family:var(--f-serif);font-style:italic;font-size:1.5rem;margin-top:26px}
.about .shots{display:grid;gap:16px}
.about .shots .a .ph{aspect-ratio:4/5}
.about .shots .b .ph{aspect-ratio:16/9}
@media (max-width:860px){.about .grid{grid-template-columns:1fr}}

.press .wall{columns:3 250px;column-gap:16px;margin-top:clamp(36px,5vw,56px)}
.card{break-inside:avoid;border:1px solid var(--act-hair);background:#FFFFFF;padding:26px 24px;margin-bottom:16px}
.card .who{display:flex;justify-content:space-between;gap:10px;font-family:var(--f-mono);font-size:.594rem;letter-spacing:.12em;text-transform:uppercase;color:var(--act-dim);margin-bottom:14px}
.card .q{font-size:.9rem;line-height:1.65;color:#232935}
.card .q .ital{font-family:var(--f-serif);font-style:italic}
.card.navy{background:var(--black);border-color:transparent}
.card.navy .who{color:var(--dim)}
.card.navy .q{color:var(--white);font-family:var(--f-serif);font-style:italic;font-size:1.25rem;line-height:1.5}
.card.blue{background:var(--blue);border-color:transparent}
.card.blue .who{color:rgba(255,255,255,.75)}
.card.blue .q{color:#fff;font-family:var(--f-serif);font-style:italic;font-size:1.25rem;line-height:1.5}

.patients .idxl{border-top:1px solid var(--act-hair);margin-top:clamp(36px,5vw,56px)}
.patients .rowl{display:grid;grid-template-columns:64px minmax(0,1fr) auto;gap:24px;align-items:baseline;padding:clamp(20px,2.6vw,30px) 0;border-bottom:1px solid var(--act-hair);text-decoration:none}
.patients .rowl>*{transition:transform var(--dur-hover) var(--ease-quick),color var(--dur-hover) var(--ease-quick)}
.patients .rowl .num{font-family:var(--f-serif);font-style:italic;font-size:1rem;color:var(--act-dim)}
.patients .rowl .ttl{font-weight:600;font-size:clamp(1.25rem,2.4vw,1.9rem);letter-spacing:-.015em}
.patients .rowl .tag{font-family:var(--f-mono);font-size:.594rem;letter-spacing:.14em;text-transform:uppercase;color:var(--act-dim)}
.patients .rowl:hover>*{transform:translateX(14px)}
.patients .rowl:hover .num{color:var(--blue)}
.guide{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:clamp(44px,6vw,72px)}
.guide .pitch{background:var(--black);color:var(--white);padding:clamp(28px,4vw,46px);display:flex;flex-direction:column;justify-content:center}
.guide .pitch .mono{color:var(--dim)}
.guide .pitch h3{font-weight:600;font-size:clamp(1.4rem,2.6vw,2rem);line-height:1.2;letter-spacing:-.02em;margin:14px 0 20px}
.guide .pitch h3 .ital{color:var(--blue-soft)}
.guide .pitch .li{display:flex;gap:10px;font-size:.875rem;color:#B9BEC8;margin-bottom:10px}
.guide .pitch .li span:first-child{color:var(--blue);font-family:var(--f-mono);font-size:.7rem}
.guide .form{border:1px solid var(--act-hair);background:#FFFFFF;padding:clamp(28px,4vw,46px)}
.guide .form h3{font-weight:600;font-size:1.3rem;letter-spacing:-.01em;margin-bottom:6px}
.guide .form .sub{font-size:.845rem;color:var(--act-dim);margin-bottom:22px}
.guide .form label{display:block;font-family:var(--f-mono);font-size:.563rem;letter-spacing:.14em;text-transform:uppercase;color:var(--act-dim);margin:0 0 7px}
.guide .form input{width:100%;border:1px solid rgba(16,20,27,.2);background:#F8F7F4;padding:13px 14px;font-family:var(--f-sans);font-size:.875rem;color:var(--act-ink);margin-bottom:16px}
.guide .form input:focus{outline:none;border-color:var(--blue)}
.btn-ink{display:inline-block;background:var(--act-ink);color:#fff;border:0;cursor:pointer;padding:15px 30px;font-family:var(--f-mono);font-size:.625rem;letter-spacing:.16em;text-transform:uppercase;transition:background var(--dur-hover) var(--ease-quick)}
.btn-ink:hover{background:var(--blue)}
.guide .fine{font-size:.688rem;color:var(--act-dim);margin-top:14px;line-height:1.6}
@media (max-width:860px){.guide{grid-template-columns:1fr}}

/* ---------- SPEAKING ---------- */
.speak{padding-top:var(--sec)}
.speak .grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(32px,5vw,64px);align-items:center;margin-top:clamp(36px,5vw,56px)}
.speak .grid .ph{aspect-ratio:4/5}
.speak .lead{font-size:.97rem;line-height:1.7;color:#B9BEC8;max-width:50ch;margin-top:18px}
.rings{display:flex;align-items:center;margin:clamp(34px,4vw,50px) 0 0}
.ring{width:clamp(150px,15vw,196px);height:clamp(150px,15vw,196px);border:1px solid var(--hair-blue);border-radius:50%;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px}
.ring+.ring{margin-left:-28px}
.ring .n{font-family:var(--f-serif);font-style:italic;font-size:.813rem;color:var(--blue);margin-bottom:8px}
.ring .t{font-size:.781rem;font-weight:600;letter-spacing:.02em;line-height:1.35;max-width:12ch}
.speak .invite{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:clamp(34px,4vw,50px);padding-top:22px;border-top:1px solid var(--hair)}
.btn-ghost{display:inline-block;border:1px solid var(--hair);color:var(--white);text-decoration:none;padding:13px 26px;font-family:var(--f-mono);font-size:.625rem;letter-spacing:.16em;text-transform:uppercase;transition:background var(--dur-hover) var(--ease-quick),border-color var(--dur-hover) var(--ease-quick)}
.btn-ghost:hover{background:var(--blue);border-color:var(--blue);color:#fff}
@media (max-width:860px){.speak .grid{grid-template-columns:1fr}.rings{flex-wrap:wrap}.ring+.ring{margin-left:-16px}}

/* ---------- FINALE ---------- */
.finale{position:relative;min-height:94vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:120px var(--gut) 90px}
.finale .bg{position:absolute;inset:0}
.finale .bg .ph{position:absolute;inset:0;height:100%}
.finale .bg img{object-position:center 18%;filter:brightness(.42) saturate(.9)}
.finale .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#080B12 0%,rgba(8,11,18,.45) 30%,rgba(8,11,18,.55) 70%,#080B12 100%)}
.finale .inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.finale h2{font-weight:600;font-size:clamp(2.1rem,5.6vw,4.6rem);line-height:1.06;letter-spacing:-.03em;max-width:20ch}
.finale h2 .ital{color:var(--blue-soft)}
.finale .contactl{margin-top:30px;font-family:var(--f-mono);font-size:.656rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);line-height:2.1}
.finale .contactl b{color:var(--white);font-weight:500}
.btn-blue{display:inline-block;margin-top:36px;background:var(--blue);color:#fff;text-decoration:none;padding:17px 38px;font-family:var(--f-mono);font-size:.656rem;letter-spacing:.18em;text-transform:uppercase;transition:background var(--dur-hover) var(--ease-quick)}
.btn-blue:hover{background:#2f6fd6}

.tbc{border-top:1px solid var(--hair);padding:26px var(--gut) 30px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.load-error{min-height:60vh;display:grid;place-items:center;text-align:center;padding:var(--gut);font-family:var(--f-mono);font-size:.8rem;line-height:1.8}
</style>
</head>
<body>

<nav id="nav"><span class="brand" id="brandName"></span><div class="links" id="navLinks"></div><span id="navCta"></span></nav>

<main id="site"></main>

<noscript><div class="load-error"><p>Este template renderiza su contenido desde content.json y requiere JavaScript.</p></div></noscript>

<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
'use strict';
var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&!!(window.gsap&&window.ScrollTrigger&&window.Lenis);
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rich(s){return esc(s)
  .replace(/&lt;i&gt;/g,'<span class="ital">').replace(/&lt;\/i&gt;/g,'</span>')
  .replace(/&lt;d&gt;/g,'<span class="dim" style="color:var(--dimmer)">').replace(/&lt;\/d&gt;/g,'</span>')
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;br&gt;/g,'<br>').replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img,ratio){if(!img)return'';var r=(img.ratio||ratio||'4:5').replace(':',' / ');
  var pos=img.pos?'object-position:'+esc(img.pos)+';':'';var zoom=img.zoom?'transform:scale('+(+img.zoom)+');':'';
  return'<div class="ph" style="aspect-ratio:'+r+'" data-label="'+esc(img.src?'':img.label||'')+'">'+(img.src?'<img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'" style="'+pos+zoom+'">':'')+'</div>'}
function plate(img,ratio,extra){return'<figure class="plate '+(extra||'')+' wr" data-img><div class="phw">'+ph(img,ratio)+'</div>'+
  (img.cap?'<figcaption class="cap"><span>'+esc(img.cap[0]||'')+'</span><span>'+esc(img.cap[1]||'')+'</span></figcaption>':'')+'</figure>'}
function kick(s){return'<div class="kick wr" data-r1><span class="no">'+esc(s.no||'')+'</span><span class="mono">'+esc(s.kick||'')+'</span></div>'}
function pad2(i){return('0'+(i+1)).slice(-2)}

var partials={
  hero:function(s){
    return'<header class="hero">'+
      '<div class="portrait wr" data-portrait>'+ph(s.portrait,'16:9')+'</div>'+
      '<div class="notes">'+(s.notes||[]).map(function(n){return'<p class="wr" data-hero>'+rich(n)+'</p>'}).join('')+'</div>'+
      (s.scrollWord?'<span class="scrolldown wr" data-hero>'+esc(s.scrollWord)+'</span>':'')+
      '<div style="position:absolute;inset:auto 0 0 0;z-index:6">'+
        '<div class="name">'+(s.nameLines||[]).map(function(l,i){return'<div class="'+(l.style==='serif'?'l2':'l1')+' wr" data-hero>'+esc(l.text)+'</div>'}).join('')+'</div>'+
        '<div class="strip">'+(s.strip||[]).map(function(t){return'<span class="mono wr" data-hero>'+esc(t)+'</span>'}).join('')+'</div>'+
      '</div></header>'},

  manifesto:function(s){
    return'<section class="manifesto">'+kick(s)+'<h2 class="wr" data-r1>'+rich(s.statement)+'</h2></section>'},

  stamps:function(s){
    return'<div class="stamps"><div class="row wr" data-r1 data-rule>'+(s.items||[]).map(function(t){return'<div class="s"><span class="arr">↳</span><p>'+rich(t)+'</p></div>'}).join('')+'</div></div>'},

  path:function(s){
    var r=s.route||{};
    return'<section class="path" id="pathScrolly">'+kick(s)+
      '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
      '<div class="route">'+
        '<svg viewBox="0 0 1000 190" preserveAspectRatio="none" aria-hidden="true"><path id="routePath" d="M120,122 C360,122 480,58 860,58" fill="none" stroke="var(--hair-blue)" stroke-width="1.4" stroke-linecap="round"/></svg>'+
        '<div class="yrs"><div class="n" id="routeYears" data-years="'+(+r.years||0)+'">00</div><span class="u">'+esc(r.yearsLabel||'')+'</span></div>'+
        '<div class="node orig rnode" id="routeOrig"><span class="dot"></span><span class="lbl"><span class="city">'+esc((r.origin||{}).city||'')+'</span><span class="co">'+esc((r.origin||{}).co||'')+'</span></span></div>'+
        '<div class="node dest rnode" id="routeDest"><span class="dot"></span><span class="lbl"><span class="city">'+esc((r.dest||{}).city||'')+'</span><span class="co">'+esc((r.dest||{}).co||'')+'</span></span></div>'+
      '</div>'+
      '<div class="cols wr" data-r1>'+(s.cols||[]).map(function(c){return'<div class="c"><div class="h">'+esc(c.h)+'</div><p>'+rich(c.text)+'</p></div>'}).join('')+'</div></section>'},

  expertise:function(s){
    return'<section class="exp"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="lead wr" data-r1><h2>'+rich(s.title)+'</h2></div>'+
      '<div class="idx wr" data-r1 data-rule>'+(s.rows||[]).map(function(x,i){return'<div class="row"><span class="num">'+pad2(i)+'</span><span class="ttl">'+esc(x.t)+'</span><span class="dsc">'+esc(x.d)+'</span></div>'}).join('')+'</div></section>'},

  theatre:function(s){
    return'<section class="chap theatre">'+kick(s)+'<h2 class="bigh wr" data-r1>'+rich(s.title)+'</h2>'+
      '<div class="tgrid"><div class="main">'+plate(s.main,'4:3')+'</div>'+
      '<div class="col">'+(s.side||[]).map(function(x){return plate(x,'16:9')}).join('')+'</div></div></section>'},

  about:function(s){
    return'<div class="act"><section class="chap about"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+kick(s)+
      '<h2 class="bigh wr" data-r1>'+rich(s.title)+'</h2>'+
      '<div class="grid"><div class="txt wr" data-r1>'+(s.paras||[]).map(function(p){return'<p>'+rich(p)+'</p>'}).join('')+
      (s.signature?'<div class="sig">'+esc(s.signature)+'</div>':'')+'</div>'+
      '<div class="shots">'+(s.shots||[]).map(function(x,i){return plate(x,i===0?'4:5':'16:9',i===0?'a':'b')}).join('')+'</div></div></section></div>'},

  press:function(s){
    return'<div class="act"><section class="chap press"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+kick(s)+
      '<h2 class="bigh wr" data-r1>'+rich(s.title)+'</h2>'+
      '<div class="wall wr" data-r1>'+(s.cards||[]).map(function(c){return'<div class="card '+(c.tone||'')+'"><div class="who"><span>'+esc(c.who[0])+'</span><span>'+esc(c.who[1]||'')+'</span></div><p class="q">'+rich(c.q)+'</p></div>'}).join('')+'</div></section></div>'},

  patients:function(s){
    var g=s.guide;
    return'<div class="act"><section class="chap patients">'+kick(s)+
      '<h2 class="bigh wr" data-r1>'+rich(s.title)+'</h2>'+
      ((s.articles&&s.articles.length)?'<div class="idxl wr" data-r1 data-rule>'+(s.articles).map(function(a,i){return'<a class="rowl" href="'+esc(a.href||'#')+'"><span class="num">'+pad2(i)+'</span><span class="ttl">'+esc(a.t)+'</span><span class="tag">'+esc(a.tag)+'</span></a>'}).join('')+'</div>':'')+
      (g?'<div class="guide"><div class="pitch wr" data-r1><span class="mono">'+esc(g.kick)+'</span><h3>'+rich(g.title)+'</h3>'+
        (g.bullets||[]).map(function(b){return'<div class="li"><span>↳</span><span>'+esc(b)+'</span></div>'}).join('')+'</div>'+
        '<div class="form wr" data-r1><h3>'+esc(g.formTitle)+'</h3><p class="sub">'+esc(g.formSub)+'</p>'+
        (g.fields||[]).map(function(f){return'<label>'+esc(f.label)+'</label><input type="'+esc(f.type||'text')+'" placeholder="'+esc(f.placeholder||'')+'">'}).join('')+
        '<button class="btn-ink">'+esc(g.submit)+'</button><p class="fine">'+esc(g.fine)+'</p></div></div>':'')+
      '</section></div>'},

  speaking:function(s){
    return'<section class="chap speak"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+kick(s)+
      '<div class="grid">'+plate(s.photo,'4:5')+
      '<div><h2 class="bigh wr" data-r1>'+rich(s.title)+'</h2><p class="lead wr" data-r1>'+esc(s.lead)+'</p>'+
      '<div class="rings wr" data-r1>'+(s.rings||[]).map(function(t,i){return'<div class="ring"><span class="n">'+pad2(i)+'</span><span class="t">'+esc(t)+'</span></div>'}).join('')+'</div>'+
      '<div class="invite wr" data-r1><span class="mono">'+esc(s.invite)+'</span><a href="'+esc((s.cta||{}).href||'#')+'" class="btn-ghost">'+esc((s.cta||{}).text||'')+'</a></div>'+
      '</div></div></section>'},

  finale:function(s){
    return'<section class="finale"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
      '<div class="bg">'+ph(s.bg,'16:9')+'</div>'+
      '<div class="inner"><div class="kick wr" data-r1 style="justify-content:center"><span class="no">'+esc(s.no||'')+'</span><span class="mono">'+esc(s.kick||'')+'</span></div>'+
      '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
      (s.cta?'<a href="'+esc(s.cta.href)+'" class="btn-blue wr" data-r1>'+esc(s.cta.text)+'</a>':'')+
      '<p class="contactl wr" data-r1>'+rich(s.contact)+'</p></div></section>'+
      '<footer class="tbc">'+(s.footer||[]).map(function(t){return'<span class="mono">'+esc(t)+'</span>'}).join('')+'</footer>'}
};

function boot(data){
  if(data.meta){document.title=data.meta.title||document.title;
    if(data.meta.lang)document.documentElement.lang=data.meta.lang;
    var md=document.querySelector('meta[name="description"]');
    if(!md){md=document.createElement('meta');md.name='description';document.head.appendChild(md)}
    md.content=data.meta.description||''}
  document.getElementById('brandName').textContent=(data.brand||{}).name||'';
  var nl=document.getElementById('navLinks');
  nl.innerHTML=((data.nav||{}).links||[]).map(function(l){return'<a href="'+esc(l.href)+'">'+esc(l.text)+'</a>'}).join('');
  var nc=(data.nav||{}).cta;
  if(nc)document.getElementById('navCta').innerHTML='<a class="contact" href="'+esc(nc.href)+'">'+esc(nc.text)+'</a>';

  var site=document.getElementById('site');site.innerHTML='';
  var html='';
  (data.sections||[]).forEach(function(s){var fn=partials[s.type];if(fn)html+=fn(s)});
  site.innerHTML=html;
  initMotion();
}

function initMotion(){
  var years=document.getElementById('routeYears');
  var routePath=document.getElementById('routePath');
  function routeFinal(){
    if(years)years.textContent=String(years.dataset.years);
    if(routePath){routePath.style.strokeDasharray='2 6'}
  }
  if(!MOTION){routeFinal();return}

  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({duration:1.05});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;
    var t=a.getAttribute('href');if(t.length>1&&document.querySelector(t)){e.preventDefault();lenis.scrollTo(t)}});

  /* R2 hero-stagger decreciente */
  var heroEls=gsap.utils.toArray('[data-hero]');
  var acc=0;
  heroEls.forEach(function(el,i){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',delay:.15+acc/1000,clearProps:'transform'});
    acc+=[120,80,60][Math.min(i,2)]});
  /* portrait: solo opacidad, 900ms */
  var por=document.querySelector('[data-portrait]');
  if(por)gsap.fromTo(por,{opacity:0},{opacity:1,duration:.9,ease:'expo.out',delay:.1});

  /* R1 rise por grupo */
  gsap.utils.toArray('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.75,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R3 rule-draw */
  gsap.utils.toArray('[data-rule]').forEach(function(el){
    var line=document.createElement('div');
    line.style.cssText='height:1px;background:currentColor;opacity:.25;transform-origin:left center;transform:scaleX(0)';
    el.style.borderTop='0';el.insertBefore(line,el.firstChild);
    gsap.to(line,{scaleX:1,duration:.8,ease:'expo.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}})});

  /* R4 img-settle */
  gsap.utils.toArray('[data-img]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,scale:1.03},{opacity:1,scale:1,duration:.9,ease:'expo.out',clearProps:'transform',
      scrollTrigger:{trigger:el,start:'top 86%',once:true}})});

  /* R5 route-scrub: la ruta se dibuja + años cuentan + nodos entran */
  var scrolly=document.getElementById('pathScrolly');
  if(scrolly&&routePath){
    var len=routePath.getTotalLength();
    routePath.style.strokeDasharray=len;
    routePath.style.strokeDashoffset=len;
    var orig=document.getElementById('routeOrig'),dest=document.getElementById('routeDest');
    var total=+years.dataset.years||0;
    if(matchMedia('(min-width:761px)').matches){
      gsap.set([orig,dest],{opacity:0,y:10});
      ScrollTrigger.create({trigger:scrolly,start:'top 55%',end:'+=120%',pin:true,scrub:1.2,
        onUpdate:function(self){var p=self.progress;
          routePath.style.strokeDashoffset=String(len*(1-p));
          years.textContent=('0'+Math.round(p*total)).slice(-2);
          var ko=gsap.utils.clamp(0,1,p/.15),kd=gsap.utils.clamp(0,1,(p-.8)/.2);
          orig.style.opacity=ko;orig.style.transform='translate(-50%,'+(-50+10*(1-ko))+'%)';
          dest.style.opacity=kd;dest.style.transform='translate(-50%,'+(-50+10*(1-kd))+'%)';
        }});
    }else{
      gsap.fromTo(routePath,{strokeDashoffset:len},{strokeDashoffset:0,duration:1.1,ease:'expo.out',
        scrollTrigger:{trigger:scrolly,start:'top 70%',once:true}});
      years.textContent=String(total);
      gsap.set([orig,dest],{opacity:1});
    }
  }
}

fetch('/v2/content.json')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(boot)
  .catch(function(err){document.documentElement.classList.add('no-motion');
    document.getElementById('site').innerHTML='<div class="load-error"><p>No se pudo cargar content.json ('+esc(err.message)+').</p></div>'});
})();
</script>
</body>
</html>
