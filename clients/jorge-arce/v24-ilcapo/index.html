<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARCE — Surgical Cinema · Oral &amp; Maxillofacial Surgery 2.0</title>
<meta name="description" content="The practice of Dr. Jorge Arce, frame by frame. Twenty-seven years of complex oral & maxillofacial surgery in the South Bay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(104px,14vh,168px);

  --black:#000000; --ink:#0A0A0A; --red:#D60001; --white:#F2F2F2; --dim:rgba(242,242,242,.55);
  --serif:'Instrument Serif',Georgia,serif; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--black);color:var(--white);font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--red);color:#fff}
.mono{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase}

/* ---------- nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;
  align-items:center;padding:22px 36px;mix-blend-mode:difference}
.nav .lg{font-family:var(--serif);font-size:22px;letter-spacing:.02em}
.nav .r{display:flex;gap:26px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
.nav .r a{opacity:.8;transition:opacity var(--dur-hover) var(--ease-quick)}
.nav .r a:hover{opacity:1}

/* ---------- hero frame ---------- */
.frame{position:relative;height:100vh;overflow:hidden}
.frame img{width:100%;height:100%;object-fit:cover}
.frame .bars::before,.frame .bars::after{content:"";position:absolute;left:0;right:0;height:7vh;background:var(--black);z-index:3}
.frame .bars::before{top:0}
.frame .bars::after{bottom:0}
.frame .redline{position:absolute;left:0;right:0;bottom:7vh;height:2px;background:var(--red);z-index:4}
.frame .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),transparent 40%,rgba(0,0,0,.5));z-index:2}
.frame .cap{position:absolute;z-index:5;left:36px;bottom:calc(7vh + 26px)}
.frame .cap .t{font-family:var(--serif);font-size:clamp(40px,6.6vw,96px);line-height:.98;letter-spacing:.005em}
.frame .cap .t em{font-style:italic;color:var(--red)}
.frame .cap .s{margin-top:14px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.frame .idx{position:absolute;z-index:5;right:36px;bottom:calc(7vh + 26px);font-family:var(--mono);
  font-size:12px;letter-spacing:.08em;color:var(--dim);text-align:right}
.frame .idx b{display:block;color:var(--white);font-weight:500;font-size:13px}
.hero .cap .t{font-size:clamp(52px,8.6vw,128px)}

/* parallax inner */
.frame .pw{position:absolute;inset:-8% 0;z-index:1}
.frame .pw img{height:116%}

/* ---------- interstice (text between frames) ---------- */
.inter{padding:var(--sec) 36px;max-width:1100px;margin:0 auto}
.inter .k{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--red);margin-bottom:30px;display:flex;align-items:center;gap:12px}
.inter .k::before{content:"";width:26px;height:2px;background:var(--red)}
.inter p.big{font-family:var(--serif);font-size:clamp(26px,3.4vw,46px);line-height:1.3;max-width:900px}
.inter p.big em{font-style:italic;color:var(--red)}
.inter .cols{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:44px}
.inter .cols p{font-size:15px;line-height:1.75;color:var(--dim)}
.inter .cols p strong{color:var(--white);font-weight:500}

/* ---------- discipline reel ---------- */
.reel{border-top:2px solid var(--red);padding:var(--sec) 36px}
.reel .head{max-width:1100px;margin:0 auto 70px}
.reel h2{font-family:var(--serif);font-size:clamp(34px,4.6vw,62px);line-height:1.05}
.reel h2 em{font-style:italic;color:var(--red)}
.rrow{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:90px 1fr 1.4fr;gap:30px;
  align-items:baseline;padding:26px 0;border-top:1px solid rgba(242,242,242,.14);transition:background .25s,padding-left .25s}
.rrow:last-child{border-bottom:1px solid rgba(242,242,242,.14)}
.rrow:hover{background:rgba(214,0,1,.06);padding-left:12px}
.rrow .n{font-family:var(--mono);font-size:12px;color:var(--red)}
.rrow .t{font-family:var(--serif);font-size:clamp(21px,2.4vw,30px)}
.rrow .d{font-size:14px;line-height:1.65;color:var(--dim)}

/* ---------- showreel ---------- */
.showreel{padding:calc(var(--sec)*1.1) 36px;border-top:2px solid var(--red)}
.showreel .in{max-width:1100px;margin:0 auto}
.showreel .k{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--red);margin-bottom:30px;display:flex;align-items:center;gap:12px}
.showreel .k::before{content:"";width:26px;height:2px;background:var(--red)}
.reelframe{position:relative;background:#050505;overflow:hidden}
.reelframe::before,.reelframe::after{content:"";position:absolute;left:0;right:0;height:7%;background:#000;z-index:2}
.reelframe::before{top:0}
.reelframe::after{bottom:0}
.reelframe img{width:100%;aspect-ratio:21/9;object-fit:cover;opacity:.8}
.reelframe .play{position:absolute;z-index:3;left:50%;top:50%;transform:translate(-50%,-50%);
  width:84px;height:84px;border-radius:50%;border:2px solid var(--red);display:flex;align-items:center;
  justify-content:center;color:var(--white);font-size:22px;transition:background .3s,transform .3s}
.reelframe:hover .play{background:var(--red);transform:translate(-50%,-50%) scale(1.06)}
.reelframe .dur{position:absolute;z-index:3;right:20px;bottom:10%;font-family:var(--mono);
  font-size:11px;letter-spacing:.08em;color:var(--dim)}
.showreel .note{margin-top:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--dim)}

/* ---------- productions list ---------- */
.prods{padding:calc(var(--sec)*.9) 36px;border-top:1px solid rgba(242,242,242,.14)}
.prods .in{max-width:1100px;margin:0 auto}
.prods h2{font-family:var(--serif);font-size:clamp(30px,4vw,52px);margin-bottom:54px}
.prods h2 em{font-style:italic;color:var(--red)}
.prow2{display:grid;grid-template-columns:90px 1fr auto auto;gap:26px;align-items:baseline;
  padding:22px 4px;border-top:1px solid rgba(242,242,242,.14);transition:background .25s,padding-left .3s}
.prow2:last-of-type{border-bottom:1px solid rgba(242,242,242,.14)}
.prow2:hover{background:rgba(214,0,1,.06);padding-left:14px}
.prow2 .y{font-family:var(--mono);font-size:12px;color:var(--red)}
.prow2 .t{font-family:var(--serif);font-size:clamp(19px,2.2vw,28px)}
.prow2 .ty{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.prow2 .ar{color:var(--red)}

/* ---------- stats band ---------- */
.stats{padding:calc(var(--sec)*.85) 36px;border-top:2px solid var(--red)}
.stats .inr{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:50px}
.stats .n{font-family:var(--serif);font-size:clamp(52px,6.6vw,96px);line-height:.9}
.stats .n em{font-style:italic;font-size:.55em;color:var(--red)}
.stats .l{margin-top:16px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);line-height:1.8;max-width:240px}

/* ---------- quote frame ---------- */
.qframe{position:relative;padding:150px 36px;text-align:center;overflow:hidden}
.qframe::before,.qframe::after{content:"";position:absolute;left:0;right:0;height:2px;background:var(--red)}
.qframe::before{top:0}
.qframe::after{bottom:0}
.qframe p{font-family:var(--serif);font-style:italic;font-size:clamp(24px,3.4vw,44px);line-height:1.4;max-width:900px;margin:0 auto}
.qframe .who{margin-top:28px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}

/* ---------- close ---------- */
.close{padding:150px 36px 50px;text-align:center}
.close .t{font-family:var(--serif);font-size:clamp(44px,7.4vw,110px);line-height:.98}
.close .t em{font-style:italic;color:var(--red)}
.close .cta{display:inline-block;margin-top:46px;font-family:var(--mono);font-size:12.5px;
  letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--red);color:var(--white);
  padding:16px 34px;transition:background var(--dur-hover) var(--ease-quick),color var(--dur-hover) var(--ease-quick)}
.close .cta:hover{background:var(--red)}
.close .fine{margin-top:130px;padding-top:24px;border-top:1px solid rgba(242,242,242,.14);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--mono);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}

/* ---------- reveals ---------- */
}


/* ---------- rework: dolly + placeholders ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--red);outline-offset:3px}
.frame .pw{position:absolute;inset:0;overflow:hidden}
.frame .pw img{will-change:transform;transform:scale(1.14);transform-origin:center}
html.no-motion .frame .pw img{transform:none}
.phx{display:flex;align-items:center;justify-content:center;background:#101010;color:rgba(242,242,242,.4);font-family:var(--mono,ui-monospace);font-size:12px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px}
.frame .pw .phx{width:100%;height:100%}
.reelframe .phx{aspect-ratio:21/9;width:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:rgba(242,242,242,.5);font-size:14px}
</style></head>
<body>
<nav class="nav"><span class="lg" id="nlogo"></span><div class="r" id="nlinks"></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');
var FRAMEN=0;

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}

var partials={
frame:function(s){
  FRAMEN++;
  var tag=s.hero?'header':'section';
  return'<'+tag+' class="frame'+(s.hero?' hero':'')+'"'+(s.hero?' id="top"':'')+'>'+
  '<div class="pw" data-dolly>'+img(s.img)+'</div>'+
  '<div class="ov"></div><div class="bars"></div><div class="redline"></div>'+
  '<div class="cap" data-r2><div class="t wr">'+rich(s.title)+'</div><div class="s wr">'+rich(s.sub)+'</div></div>'+
  '<div class="idx wr" data-r1><b>Frame '+('0'+FRAMEN).slice(-2)+'</b>'+esc(s.cap)+'</div>'+
  '</'+tag+'>'},
inter:function(s){
  return'<section class="inter" data-r2>'+
  '<div class="k wr">'+esc(s.k)+'</div>'+
  '<p class="big wr">'+rich(s.big)+'</p>'+
  '<div class="cols wr">'+(s.cols||[]).map(function(p){return'<p>'+rich(p)+'</p>'}).join('')+'</div>'+
  '</section>'},
reel:function(s){
  return'<section class="reel"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="head" data-r1><h2 class="wr" style="opacity:1">'+rich(s.title)+'</h2></div>'+
  (s.rows||[]).map(function(r,i){return'<div class="rrow wr" data-r1 data-rule>'+
    '<span class="sc">SC-'+('0'+(i+1)).slice(-2)+'</span>'+
    '<span class="nm">'+esc(r.nm)+'</span>'+
    '<span class="ds">'+rich(r.ds)+'</span>'+
  '</div>'}).join('')+
  '</section>'},
showreel:function(s){
  return'<section class="showreel"><div class="in">'+
  '<div class="k wr" data-r1>'+esc(s.k)+'</div>'+
  '<div class="reelframe wr" data-r4>'+img(s.img,'Showreel still')+
  '<span class="play">▶</span><span class="dur">'+esc(s.dur)+'</span></div>'+
  '<div class="note wr" data-r1>'+esc(s.note)+'</div>'+
  '</div></section>'},
prods:function(s){
  return'<section class="prods"><div class="in">'+
  '<h2 class="wr" data-r1>'+rich(s.title)+'</h2>'+
  (s.rows||[]).map(function(r,i){return'<a class="prow2 wr" data-r1 data-rule href="#close">'+
    '<span class="sc">SC-'+String.fromCharCode(65+i)+'</span>'+
    '<span class="nm">'+esc(r.nm)+'</span>'+
    '<span class="tp">'+esc(r.tp)+'</span><span class="go">→</span>'+
  '</a>'}).join('')+
  '</div></section>'},
stats:function(s){
  return'<section class="stats"><div class="inr" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="wr"><div class="n">'+esc(cl.n)+(cl.u?'<em>'+esc(cl.u)+'</em>':'')+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></section>'},
qframe:function(s){
  return'<section class="qframe" data-r2><p class="wr">'+esc(s.q)+'</p><div class="who wr">'+esc(s.who)+'</div></section>'},
close:function(s){
  return'<section class="close"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<div class="t wr">'+rich(s.title)+'</div>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v24-ilcapo/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('nlinks').innerHTML=(c.nav.links||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    el.style.position='relative';el.style.borderTopColor='transparent';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:-1px;height:1px;background:rgba(242,242,242,.14);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-r4]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 el dolly: cada frame full-bleed hace un movimiento de camara scale 1.14->1 */
  document.querySelectorAll('[data-dolly]').forEach(function(pw){
    var im=pw.querySelector('img,.phx');
    if(!im)return;
    var sec=pw.closest('.frame');
    ScrollTrigger.create({trigger:sec,start:'top bottom',end:'bottom top',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        im.style.transform='scale('+(1.14-.14*p)+') translateY('+((p-.5)*24)+'px)';
      }});
  });
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
