<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vera Nova — Grow Your Business with Confidence</title>
<meta name="description" content="Boutique business-mentor template concept: crimson gradient hero, giant editorial serif, signature script accents. Placeholder content.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Mea+Culpa&family=Archivo:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(110px,15vh,170px);

  --cream:#F8F3ED; --cream2:#ECE7DF; --crimA:#9C190D; --crimB:#D3030A; --ink:#0D0D0D;
  --serif:'Instrument Serif',Georgia,serif; --script:'Mea Culpa',cursive;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--cream);color:var(--ink);font-family:'Archivo',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--crimB);color:var(--cream)}
.lbl{font-size:10.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase}

/* ---------- nav ---------- */
.nav{position:sticky;top:0;z-index:60;background:var(--cream);display:grid;
  grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 26px;gap:20px}
.nav .l,.nav .r{display:flex;gap:22px}
.nav .r{justify-content:flex-end}
.nav a{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;transition:color .3s}
.nav a:hover{color:var(--crimB)}
.nav .lg{font-family:var(--serif);font-size:20px;letter-spacing:.08em;text-align:center;color:var(--crimA)}

/* ---------- hero ---------- */
.hero{position:relative;min-height:94vh;overflow:hidden;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--crimA) 0%,var(--crimB) 55%,#E9564B 100%)}
.hero .ph{position:absolute;inset:0;display:flex;justify-content:center}
.hero .ph img{height:100%;width:auto;object-fit:cover;filter:saturate(.9) contrast(1.05);
  mask-image:linear-gradient(180deg,#000 65%,transparent 98%);-webkit-mask-image:linear-gradient(180deg,#000 65%,transparent 98%)}
.hero .top{position:relative;z-index:2;padding:70px 6vw 0}
.hero .top h2{font-family:var(--serif);font-size:clamp(26px,3.2vw,44px);color:#fff;line-height:1.15}
.hero .top .with{font-family:var(--script);font-size:1.4em;position:relative;padding:0 8px}
.hero .top .with::after{content:"";position:absolute;inset:-4px -6px;border:1.5px solid rgba(255,255,255,.8);border-radius:50%}
.hero .wm{position:relative;z-index:2;margin-top:auto;text-align:center;font-family:var(--serif);
  font-size:clamp(64px,12.6vw,186px);line-height:.82;color:#fff;letter-spacing:.01em;transform:translateY(6%)}
.hero .kicker{position:absolute;z-index:3;right:6vw;bottom:15%;text-align:right;color:#fff}
.hero .kicker .lbl{display:block;line-height:2;letter-spacing:.24em}
.hero .cta{display:inline-block;margin-top:18px;background:var(--crimA);color:#fff;font-size:10.5px;
  font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:15px 30px;border-radius:99px;
  border:1px solid rgba(255,255,255,.5);transition:background .3s}
.hero .cta:hover{background:#7A130A}

/* ---------- intro ---------- */
.intro{padding:150px 6vw 130px;text-align:center}
.intro .script{font-family:var(--script);font-size:clamp(44px,6vw,84px);color:var(--crimB);line-height:.9}
.intro h2{font-family:var(--serif);font-size:clamp(32px,4.8vw,68px);line-height:1.05;max-width:1000px;margin:10px auto 0}
.intro p{margin-top:32px;font-size:14.5px;line-height:1.8;color:#5A554E;max-width:560px;margin-left:auto;margin-right:auto}

/* ---------- numbered method ---------- */
.method{background:var(--cream2);padding:130px 6vw}
.method .head{text-align:center;margin-bottom:70px}
.method .script{font-family:var(--script);font-size:clamp(40px,5vw,68px);color:var(--crimB)}
.method .grid{max-width:1000px;margin:0 auto;display:grid;gap:0}
.mrow{display:grid;grid-template-columns:120px 1fr;gap:30px;align-items:start;padding:44px 0;
  border-top:1px solid rgba(13,13,13,.15)}
.mrow:last-child{border-bottom:1px solid rgba(13,13,13,.15)}
.mrow .n{font-family:var(--serif);font-size:clamp(56px,6vw,96px);line-height:.8;color:var(--crimB)}
.mrow h3{font-family:var(--serif);font-size:clamp(24px,2.8vw,38px)}
.mrow p{margin-top:10px;font-size:14px;line-height:1.75;color:#5A554E;max-width:560px}

/* ---------- program ---------- */
.program{position:relative;background:linear-gradient(160deg,var(--crimA),var(--crimB));color:var(--cream);
  padding:var(--sec) 6vw;overflow:hidden;text-align:center}
.program .marq{position:absolute;top:26px;left:0;right:0;white-space:nowrap;overflow:hidden}
.program .marq span{display:inline-block;font-family:var(--serif);font-size:clamp(40px,6vw,90px);
  text-transform:uppercase;color:rgba(248,243,237,.22);will-change:transform;padding-right:40px}

.program .lbl{color:#F3B8B2}
.program h2{font-family:var(--serif);font-size:clamp(34px,5vw,72px);line-height:1.02;max-width:900px;margin:16px auto 0}
.program h2 em{font-style:italic}
.program p{margin-top:28px;font-size:14.5px;line-height:1.8;max-width:540px;margin-left:auto;margin-right:auto;color:#FBDCD8}
.program .cta{display:inline-block;margin-top:44px;background:var(--cream);color:var(--crimA);
  font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:16px 34px;
  border-radius:99px;transition:transform .3s}
.program .cta:hover{transform:translateY(-2px)}

/* ---------- listen / feature ---------- */
.listen{padding:var(--sec) 6vw}
.listen .in{max-width:1050px;margin:0 auto;display:grid;grid-template-columns:1fr .9fr;gap:70px;align-items:center}
.listen .ph{aspect-ratio:3/4;overflow:hidden;background:#D9C9BC;position:relative}
.listen .ph img{width:100%;height:100%;object-fit:cover;filter:saturate(.9)}
.listen .script{font-family:var(--script);font-size:clamp(44px,5.4vw,72px);color:var(--crimB);line-height:.9}
.listen h2{font-family:var(--serif);font-size:clamp(30px,3.8vw,52px);line-height:1.05;margin-top:8px}
.listen p{margin-top:24px;font-size:14.5px;line-height:1.8;color:#5A554E;max-width:440px}
.listen .ep{margin-top:30px;border-top:1px solid rgba(13,13,13,.15)}
.listen .ep a{display:flex;justify-content:space-between;gap:16px;padding:16px 2px;
  border-bottom:1px solid rgba(13,13,13,.15);font-size:13px;font-weight:500;transition:color .3s}
.listen .ep a:hover{color:var(--crimB)}
.listen .ep .n{color:var(--crimB);font-family:var(--serif)}

/* ---------- voices ---------- */
.voices{background:var(--ink);color:var(--cream);padding:calc(var(--sec)*.95) 6vw;text-align:center;position:relative;overflow:hidden}
.voices .marq2{position:absolute;top:30px;left:0;right:0;white-space:nowrap;overflow:hidden}
.voices .marq2 span{display:inline-block;font-family:var(--serif);font-size:clamp(30px,4.4vw,64px);
  text-transform:uppercase;color:rgba(248,243,237,.14);will-change:transform;padding-right:36px}
.voices q{display:block;font-family:var(--serif);font-size:clamp(26px,3.6vw,48px);line-height:1.25;
  max-width:880px;margin:0 auto;quotes:'“' '”'}
.voices .who{margin-top:28px;font-size:10.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#B9AFa5}
.voices .script{font-family:var(--script);font-size:clamp(36px,4.6vw,60px);color:var(--crimB);display:block;margin-bottom:20px}

/* ---------- close ---------- */
.close{padding:var(--sec) 6vw 60px;text-align:center}
.close .script{font-family:var(--script);font-size:clamp(44px,6vw,80px);color:var(--crimB);line-height:.9}
.close h2{font-family:var(--serif);font-size:clamp(40px,7vw,110px);line-height:.95;margin-top:8px}
.close .cta{display:inline-block;margin-top:44px;background:var(--crimB);color:#fff;font-size:10.5px;
  font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:17px 36px;border-radius:99px;transition:transform .3s}
.close .cta:hover{transform:translateY(-2px)}
.close .fine{margin-top:110px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#A79E93}

/* ---------- reveals ---------- */
[data-hero]{opacity:0;}
[data-hero="2"]{animation-delay:.25s}


@media (max-width:920px){
  .nav{grid-template-columns:1fr auto}
  .nav .l{display:none}
  .listen .in{grid-template-columns:1fr;gap:40px}
  .mrow{grid-template-columns:70px 1fr}
}

/* ---------- rework: profundidad de cartel ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid currentColor;outline-offset:3px}
.hero .ph,.hero .wm{will-change:transform}
html.no-motion .hero .ph,html.no-motion .hero .wm{transform:none!important}
html.no-motion .hero .wm{transform:translateY(6%)!important}
.marq>i,.marq2>i{display:inline-block;will-change:transform;font-style:normal}
.phx{display:flex;align-items:center;justify-content:center;background:#D9C9BC;color:#8a6a5e;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px;width:100%;height:100%}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#8a6a5e;font-size:14px}
</style></head>
<body>
<nav class="nav"><div class="l" id="navl"></div><span class="lg" id="nlogo"></span><div class="r" id="navr"></div></nav>
<main id="site"></main>
<noscript><div style="padding:6vh 28px;text-align:center;font-size:14px">Vera Nova — template concept</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;w&gt;/g,'<span class="with">').replace(/&lt;\/w&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function img(im,alt){
  if(im&&im.src)return'<img src="'+esc(im.src)+'" alt="'+esc(alt||im.alt||'')+'">';
  return'<div class="phx">'+esc((im&&im.label)||'FOTO')+'</div>'}
function marqInner(t,n){var out='';for(var i=0;i<(n||8);i++)out+='<i>'+esc(t)+' </i>';return out}

var partials={
hero:function(s){
  return'<header class="hero" id="top">'+
  '<div class="ph" data-depth="ph">'+img(s.img)+'</div>'+
  '<div class="top wr" data-r1><h2>'+rich(s.h)+'</h2></div>'+
  '<div class="kicker wr" data-r1><span class="lbl">'+rich(s.kicker)+'</span><a class="cta" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a></div>'+
  '<div class="wm" data-depth="wm">'+esc(s.wm)+'</div>'+
  '</header>'},
intro:function(s){
  return'<section class="intro"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<div class="script wr">'+esc(s.script)+'</div>'+
  '<h2 class="wr">'+esc(s.h)+'</h2><p class="wr">'+rich(s.p)+'</p></section>'},
method:function(s){
  return'<section class="method"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="head wr" data-r1><h2>'+esc(s.h)+'</h2></div>'+
  '<div class="grid" data-cards>'+(s.rows||[]).map(function(r,i){return'<div class="mrow wr"><span class="n">'+('0'+(i+1)).slice(-2)+'</span><h3>'+esc(r.t)+'</h3><p>'+rich(r.d)+'</p></div>'}).join('')+'</div>'+
  '</section>'},
program:function(s){
  return'<section class="program"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="marq" aria-hidden="true" data-mq="l">'+marqInner(s.marq)+'</div>'+
  '<div data-r2><span class="lbl wr">'+esc(s.lbl)+'</span>'+
  '<h2 class="wr">'+rich(s.h)+'</h2><p class="wr">'+rich(s.p)+'</p>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a></div>'+
  '</section>'},
listen:function(s){
  return'<section class="listen"'+(s.id?' id="'+esc(s.id)+'"':'')+'><div class="in">'+
  '<div data-r2><div class="script wr">'+esc(s.script)+'</div><h2 class="wr">'+esc(s.h)+'</h2>'+
  '<p class="wr">'+rich(s.p)+'</p>'+
  '<div class="eps">'+(s.eps||[]).map(function(e){return'<div class="ep wr">'+esc(e.t)+'<span>'+esc(e.n)+'</span></div>'}).join('')+'</div></div>'+
  '<div class="ph wr" data-r1>'+img(s.img)+'</div>'+
  '</div></section>'},
voices:function(s){
  return'<section class="voices"'+(s.id?' id="'+esc(s.id)+'"':'')+'>'+
  '<div class="marq2" aria-hidden="true" data-mq="r">'+marqInner(s.marq)+'</div>'+
  '<div data-r2><div class="script wr">'+esc(s.script)+'</div>'+
  '<blockquote class="wr">'+esc(s.q)+'</blockquote>'+
  '<div class="who wr">'+esc(s.who)+'</div></div>'+
  '</section>'},
close:function(s){
  return'<section class="close"'+(s.id?' id="'+esc(s.id)+'"':'')+' data-r2>'+
  '<div class="script wr">'+esc(s.script)+'</div>'+
  '<h2 class="wr">'+esc(s.h)+'</h2>'+
  '<a class="cta wr" href="'+esc(s.cta.h)+'">'+esc(s.cta.t)+'</a>'+
  '<div class="fine">'+(s.fine||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</section>'}
};

fetch('/v35-astramaven/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.nav){document.getElementById('navl').innerHTML=(c.nav.l||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('');
    document.getElementById('nlogo').textContent=c.nav.logo||'';
    document.getElementById('navr').innerHTML=(c.nav.r||[]).map(function(n){return'<a href="'+esc(n.h)+'">'+esc(n.t)+'</a>'}).join('')}
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=new Lenis({lerp:.25});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(function(t){lenis.raf(t*1000)});
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5 profundidad de cartel: retrato y wordmark se separan al salir */
  var ph=document.querySelector('[data-depth="ph"]'),wm=document.querySelector('[data-depth="wm"]');
  if(ph&&wm){
    ScrollTrigger.create({trigger:'.hero',start:'top top',end:'bottom top',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        ph.style.transform='translateY('+(p*10)+'%)';
        wm.style.transform='translateY('+(6-p*10)+'%)';
      }});
  }
  /* marquesinas contrarrotantes mapeadas al viewport */
  document.querySelectorAll('[data-mq]').forEach(function(mq){
    var dir=mq.getAttribute('data-mq')==='r'?1:-1;
    var sec=mq.closest('section');
    ScrollTrigger.create({trigger:sec,start:'top bottom',end:'bottom top',scrub:.4,
      onUpdate:function(self){mq.style.transform='translateX('+(dir*self.progress*18-9*dir)+'%)'}});
  });
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
