<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jorge Arce — Oral &amp; Maxillofacial Surgeon · Since 1999</title>
<meta name="description" content="Board-certified oral & maxillofacial surgeon. The story of a career spent on the difficult cases — from Colombia to the South Bay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-quick:cubic-bezier(.33,1,.68,1);
  --dur-hover:.2s;
  --sec:clamp(110px,15vh,170px);

  --bg:#050505; --bg2:#0B0B0D; --panel:#0E0E11;
  --white:#F4F4F5; --grey:#B8B8B8; --mid:#545454; --dim:#363636; --line:#2A2A2E;
  --serif:'Lora',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--bg);color:var(--white);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
::selection{background:var(--white);color:var(--bg)}

/* ---------- starfield ---------- */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.sky::before{content:"";position:absolute;inset:-20%;
  background:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.55) 50%,transparent 51%),
    radial-gradient(1px 1px at 34% 62%,rgba(255,255,255,.4) 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 58% 24%,rgba(255,255,255,.5) 50%,transparent 51%),
    radial-gradient(1px 1px at 71% 76%,rgba(255,255,255,.35) 50%,transparent 51%),
    radial-gradient(1px 1px at 88% 41%,rgba(255,255,255,.5) 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 22% 84%,rgba(255,255,255,.35) 50%,transparent 51%),
    radial-gradient(1px 1px at 46% 8%,rgba(255,255,255,.45) 50%,transparent 51%),
    radial-gradient(1px 1px at 79% 12%,rgba(255,255,255,.4) 50%,transparent 51%),
    radial-gradient(1px 1px at 5% 47%,rgba(255,255,255,.3) 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 64% 92%,rgba(255,255,255,.4) 50%,transparent 51%),
    radial-gradient(1px 1px at 93% 66%,rgba(255,255,255,.3) 50%,transparent 51%),
    radial-gradient(1px 1px at 41% 38%,rgba(255,255,255,.28) 50%,transparent 51%);
  background-size:900px 900px;}
.sky::after{content:"";position:absolute;inset:0;
  background:radial-gradient(60% 45% at 62% 30%,rgba(120,130,160,.10),transparent 70%),
             radial-gradient(45% 40% at 20% 80%,rgba(90,80,120,.07),transparent 70%)}
}

/* ---------- chrome ---------- */
.bar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  background:linear-gradient(180deg,rgba(5,5,5,.85),rgba(5,5,5,0))}
.bar .mid-info{color:var(--grey);font-weight:500;display:flex;gap:10px;align-items:center}
.bar .mid-info .dot{width:3px;height:3px;border-radius:50%;background:var(--mid)}
.bar .right{display:flex;align-items:center;gap:16px}
.bar .kbd{border:1px solid var(--line);border-radius:6px;padding:5px 10px;color:var(--mid);font-weight:500}
.burger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--white)}
.burger span:last-child{width:14px;margin-left:auto}

.rail{position:fixed;left:40px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:26px}
.rail a{display:flex;align-items:center;gap:12px;font-size:10.5px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--mid);transition:color var(--dur-hover) var(--ease-quick)}
.rail a::before{content:"";width:14px;height:1.5px;background:var(--dim);transition:background var(--dur-hover) var(--ease-quick)}
.rail a.on{color:var(--white)}
.rail a.on::before{width:26px;background:var(--white)}
.rail a:hover{color:var(--grey)}

/* ---------- layout ---------- */
.wrap{max-width:1400px;margin:0 auto;padding:0 40px;position:relative;z-index:2}
section{position:relative;z-index:2}

/* ---------- hero ---------- */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 0 150px;position:relative}
.giant{font-weight:600;line-height:.82;letter-spacing:-.045em;text-transform:uppercase;user-select:none}
.giant .l1{font-size:clamp(88px,15.4vw,216px);color:var(--white);display:block}
.giant .l2{font-size:clamp(88px,15.4vw,216px);color:var(--grey);opacity:.82;display:block;text-align:right;margin-top:.04em}
.since{font-size:12px;font-weight:600;letter-spacing:.2em;color:var(--grey);margin:34px 0 0;text-transform:uppercase}
.hero-state{display:flex;justify-content:flex-end;margin-top:60px}
.hero-state .box{max-width:760px}
.statement{font-size:clamp(21px,2.3vw,31px);font-weight:700;line-height:1.32;letter-spacing:-.015em}
.statement .g{color:var(--mid)}
.statement .h{color:var(--grey)}
.hero-note{font-family:var(--serif);font-style:italic;font-size:16.5px;color:var(--mid);margin-top:26px;line-height:1.55;max-width:520px}
.scrolldn{position:absolute;bottom:48px;left:0;display:flex;align-items:center;gap:14px;font-size:10.5px;
  font-weight:600;letter-spacing:.2em;color:var(--mid);text-transform:uppercase}
.scrolldn::after{content:"";width:70px;height:1px;background:var(--dim)}

/* ---------- serif interlude ---------- */
.interlude{padding:160px 0}
.interlude p{font-family:var(--serif);font-weight:500;font-size:clamp(32px,4.9vw,68px);line-height:1.18;
  letter-spacing:-.01em;max-width:1080px}
.interlude .it{font-style:italic;color:var(--grey)}
.interlude .who{margin-top:44px;font-family:'Inter';font-size:12px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--mid);display:flex;align-items:center;gap:14px}
.interlude .who::before{content:"";width:36px;height:1px;background:var(--dim)}

/* ---------- about ---------- */
.about{padding:60px 0 140px}
.about .grid{display:grid;grid-template-columns:1fr 1.15fr;gap:90px;align-items:center}
.frame{position:relative}
.frame img{border-radius:10px;filter:grayscale(.25) contrast(1.04);aspect-ratio:4/5;object-fit:cover;width:100%}
.frame::after{content:"ARCE — 01";position:absolute;bottom:16px;left:16px;font-size:10px;font-weight:600;
  letter-spacing:.22em;color:rgba(255,255,255,.75);background:rgba(5,5,5,.5);padding:7px 12px;border-radius:6px;backdrop-filter:blur(6px)}
.k{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);display:flex;align-items:center;gap:14px;margin-bottom:26px}
.k::before{content:"";width:26px;height:1.5px;background:var(--dim)}
.about h2{font-size:clamp(34px,4vw,56px);font-weight:600;letter-spacing:-.03em;line-height:1.04;margin-bottom:28px}
.about h2 .g{color:var(--mid)}
.about p{font-size:16.5px;line-height:1.7;color:var(--grey);margin-bottom:18px;max-width:560px}
.about p strong{color:var(--white);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:30px}
.tags span{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);
  border:1px solid var(--line);border-radius:99px;padding:9px 16px}

/* ---------- work / chapters ---------- */
.workhead{padding:140px 0 20px}
.workhead h2{font-size:clamp(64px,9.4vw,132px);font-weight:600;letter-spacing:-.045em;line-height:.9}
.workhead h2 .g{color:var(--dim)}
.workhead .sub{margin-top:26px;font-size:15px;color:var(--mid);max-width:460px;line-height:1.6}

.chapter{position:relative;padding:var(--sec) 0;border-top:1px solid var(--line)}
.chapter .ghost{position:absolute;top:40px;right:-10px;font-size:clamp(180px,26vw,380px);font-weight:700;
  letter-spacing:-.05em;line-height:1;color:transparent;-webkit-text-stroke:1px var(--line);opacity:.8;
  pointer-events:none;user-select:none;z-index:0}
.chapter.alt .ghost{right:auto;left:-10px}
.chapter .inner{position:relative;z-index:2;display:grid;grid-template-columns:1.1fr .9fr;gap:80px;align-items:center}
.chapter.alt .inner{grid-template-columns:.9fr 1.1fr}
.chapter.alt .inner .txt{order:2}
.chapter .num{font-size:clamp(84px,10vw,144px);font-weight:600;letter-spacing:-.04em;line-height:1;color:var(--white)}
.chapter .num em{font-style:normal;color:var(--dim)}
.chapter h3{font-size:clamp(38px,4.6vw,66px);font-weight:600;letter-spacing:-.035em;line-height:.98;margin:22px 0 24px}
.chapter h3 .g{color:var(--grey)}
.chapter .meta{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}
.chapter p{font-size:16px;line-height:1.72;color:var(--grey);max-width:520px;margin-bottom:16px}
.chapter p strong{color:var(--white);font-weight:600}
.chapter .ph{position:relative}
.chapter .ph img{border-radius:12px;aspect-ratio:4/3;object-fit:cover;width:100%;filter:grayscale(.2) contrast(1.05);
  box-shadow:0 40px 80px rgba(0,0,0,.5)}
.chapter .ph .cap{position:absolute;bottom:14px;right:14px;font-size:10px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(255,255,255,.8);background:rgba(5,5,5,.55);padding:7px 12px;border-radius:6px;backdrop-filter:blur(6px)}
.chapter .serifline{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--mid);line-height:1.55;
  border-left:2px solid var(--line);padding-left:20px;margin-top:26px;max-width:480px}

/* pill */
.pill{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:99px;
  padding:16px 28px;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--white);
  background:rgba(255,255,255,.03);backdrop-filter:blur(8px);transition:background .3s,border-color .3s;margin-top:30px}
.pill .arr{transition:transform .3s}
.pill:hover{background:rgba(255,255,255,.09);border-color:var(--mid)}
.pill:hover .arr{transform:translateX(5px)}

/* ---------- record strip ---------- */
.record{padding:130px 0;border-top:1px solid var(--line)}
.record .row{display:grid;grid-template-columns:repeat(3,1fr);gap:60px}
.record .cell .n{font-size:clamp(48px,5.6vw,80px);font-weight:600;letter-spacing:-.04em;line-height:1}
.record .cell .n em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--grey);font-size:.62em}
.record .cell .l{margin-top:14px;font-size:13px;color:var(--mid);line-height:1.55;max-width:240px}

/* ---------- contact ---------- */
.contact{padding:170px 0 60px;border-top:1px solid var(--line)}
.contact .k{margin-bottom:36px}
.contact h2{font-size:clamp(44px,7vw,104px);font-weight:600;letter-spacing:-.04em;line-height:.94;margin-bottom:40px}
.contact h2 .g{color:var(--mid)}
.dev{font-size:clamp(17px,1.8vw,22px);font-weight:500;color:var(--grey);display:flex;flex-wrap:wrap;gap:12px 34px;align-items:center}
.dev .lbl{color:var(--dim);font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
.dev a{border-bottom:1px solid var(--line);padding-bottom:3px;transition:color .3s,border-color .3s}
.dev a:hover{color:var(--white);border-color:var(--white)}
.foot{margin-top:130px;padding:34px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;
  flex-wrap:wrap;gap:14px;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--mid)}

@media (min-width:1100px){
  .wrap{padding-left:190px}
}

/* ---------- reveals ---------- */
}



/* ---------- rework ---------- */
.wr{opacity:0}
html.no-motion .wr{opacity:1}
a:focus-visible,button:focus-visible{outline:2px solid var(--white,#F4F4F5);outline-offset:3px}
html.no-motion .chapter .ghost{color:rgba(244,244,245,.06)}
.rail .spine{position:absolute;left:-14px;top:-8px;bottom:-8px;width:1px;background:rgba(244,244,245,.12)}
.rail .spine i{position:absolute;inset:0;background:#F4F4F5;transform-origin:top;transform:scaleY(0);display:block}
.rail a::before{width:var(--tick,14px)}
.phx{display:flex;align-items:center;justify-content:center;background:#101014;color:rgba(244,244,245,.4);font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:12px;min-height:380px}
.err{min-height:60vh;display:flex;align-items:center;justify-content:center;color:#545454;font-size:14px}
</style></head>
<body>
<div class="sky" aria-hidden="true" id="sky"></div>
<header class="bar">
  <div id="blogo"></div>
  <div class="mid-info"><span id="bloc"></span><span class="dot"></span><span id="clock">--:--</span></div>
  <div class="right"><span class="kbd" id="bkbd"></span></div>
</header>
<nav class="rail" aria-label="Sections" id="rail" style="position:fixed"><div class="spine"><i id="spinefill"></i></div></nav>
<main id="site"></main>
<noscript><div style="padding:40vh 28px;text-align:center;font-size:15px">Dr. Jorge Arce — Oral &amp; Maxillofacial Surgery · (310) 327-4166 · Redondo Beach &amp; Torrance, CA</div></noscript>
<script src="/vendor/gsap.min.js"></script>
<script src="/vendor/ScrollTrigger.min.js"></script>
<script src="/vendor/lenis.min.js"></script>
<script>
(function(){
var REDUCED=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
var MOTION=!REDUCED&&typeof gsap!=='undefined'&&typeof Lenis!=='undefined';
if(!MOTION)document.documentElement.classList.add('no-motion');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function rich(s){return esc(s)
  .replace(/&lt;b&gt;/g,'<strong>').replace(/&lt;\/b&gt;/g,'</strong>')
  .replace(/&lt;i&gt;/g,'<span class="it">').replace(/&lt;\/i&gt;/g,'</span>')
  .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
  .replace(/&lt;g&gt;/g,'<span class="g">').replace(/&lt;\/g&gt;/g,'</span>')
  .replace(/&lt;h&gt;/g,'<span class="h">').replace(/&lt;\/h&gt;/g,'</span>')
  .replace(/&lt;br&gt;/g,'<br>')
  .replace(/&amp;nbsp;/g,'&nbsp;')}
function ph(img,cls){
  if(img&&img.src)return'<div class="'+cls+'"><img src="'+esc(img.src)+'" alt="'+esc(img.alt||'')+'">'+(img.cap?'<div class="cap">'+esc(img.cap)+'</div>':'')+'</div>';
  return'<div class="'+cls+'"><div class="phx">'+esc((img&&img.label)||(img&&img.cap)||'FOTO')+'</div>'+(img&&img.cap?'<div class="cap">'+esc(img.cap)+'</div>':'')+'</div>'}

var partials={
hero:function(s){
  return'<section class="hero" id="'+esc(s.id||'intro')+'"><div class="wrap" data-r2>'+
  '<h1 class="giant"><span class="l1 wr">'+esc(s.l1)+'</span><span class="l2 wr">'+esc(s.l2)+'</span></h1>'+
  '<div class="since wr">'+esc(s.since)+'</div>'+
  '<div class="hero-state wr"><div class="box">'+
  '<p class="statement">'+rich(s.statement)+'</p>'+
  '<p class="hero-note">'+rich(s.note)+'</p>'+
  '</div></div>'+
  '<div class="scrolldn wr">'+esc(s.scroll||'Scroll')+'</div>'+
  '</div></section>'},
interlude:function(s){
  return'<section class="interlude"><div class="wrap" data-r1>'+
  '<p class="wr" style="opacity:1">'+rich(s.quote)+'</p>'+
  '<div class="who">'+esc(s.who)+'</div>'+
  '</div></section>'},
about:function(s){
  return'<section class="about" id="'+esc(s.id||'about')+'"><div class="wrap"><div class="grid">'+
  ph(s.img,'frame wr')+
  '<div class="txt" data-r2><div class="k wr">'+esc(s.k)+'</div>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  (s.paras||[]).map(function(p){return'<p class="wr">'+rich(p)+'</p>'}).join('')+
  '<div class="tags wr">'+(s.tags||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></div></div></section>'},
workhead:function(s){
  return'<section class="workhead" id="'+esc(s.id||'story')+'"><div class="wrap" data-r2>'+
  '<h2 class="wr">'+rich(s.title)+'</h2><p class="sub wr">'+rich(s.sub)+'</p>'+
  '</div></section>'},
chapters:function(s){
  var n=(s.items||[]).length;
  return(s.items||[]).map(function(ch,i){
    var num=('0'+(i+1)).slice(-2);
    return'<section class="chapter'+(i%2?' alt':'')+'" data-rule>'+
    '<div class="ghost" data-ghost>'+num+'</div>'+
    '<div class="wrap"><div class="inner">'+
    '<div class="txt" data-r2>'+
      '<div class="num wr">'+num+'<em>/'+('0'+n).slice(-2)+'</em></div>'+
      '<div class="meta wr">'+esc(ch.meta)+'</div>'+
      '<h3 class="wr">'+rich(ch.title)+'</h3>'+
      '<p class="wr">'+rich(ch.body)+'</p>'+
      (ch.serif?'<p class="serifline wr">'+rich(ch.serif)+'</p>':'')+
      (ch.cta?'<p class="wr" style="margin-top:26px"><a class="pill" href="'+esc(ch.cta.h)+'">'+esc(ch.cta.t)+'</a></p>':'')+
    '</div>'+
    ph(ch.img,'ph wr')+
    '</div></div></section>'}).join('')},
record:function(s){
  return'<section class="record" data-rule><div class="wrap"><div class="row" data-cards>'+
  (s.cells||[]).map(function(cl){return'<div class="cell wr"><div class="n">'+rich(cl.n)+'</div><div class="l">'+rich(cl.l)+'</div></div>'}).join('')+
  '</div></div></section>'},
contact:function(s){
  return'<section class="contact" id="'+esc(s.id||'contact')+'" data-rule><div class="wrap" data-r2>'+
  '<div class="k wr">'+esc(s.k)+'</div>'+
  '<h2 class="wr">'+rich(s.title)+'</h2>'+
  '<div class="dev wr">'+(s.meta||[]).map(function(m){
    var v=m.tel?'<a href="tel:+13103274166">'+esc(m.v)+'</a>':'<span>'+esc(m.v)+'</span>';
    return'<span class="lbl">'+esc(m.k)+'</span>'+v}).join('')+'</div>'+
  '<div class="foot">'+(s.foot||[]).map(function(t){return'<span>'+esc(t)+'</span>'}).join('')+'</div>'+
  '</div></section>'}
};

fetch('/v19-cunliffe/content.json').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(c){
  if(c.meta){document.title=c.meta.title||document.title;
    var md=document.querySelector('meta[name="description"]');
    if(md&&c.meta.description)md.setAttribute('content',c.meta.description)}
  if(c.bar){document.getElementById('blogo').textContent=c.bar.logo||'';
    document.getElementById('bloc').textContent=c.bar.loc||'';
    document.getElementById('bkbd').textContent=c.bar.kbd||''}
  var rail=document.getElementById('rail');
  rail.innerHTML=rail.innerHTML+(c.rail||[]).map(function(r,i){return'<a href="'+esc(r.h)+'"'+(i===0?' class="on"':'')+'>'+esc(r.t)+'</a>'}).join('');
  document.getElementById('site').innerHTML=(c.sections||[]).map(function(s){var p=partials[s.type];return p?p(s):''}).join('');
  init();
}).catch(function(e){
  document.getElementById('site').innerHTML='<div class="err">Could not load content ('+esc(e.message)+').</div>';
});

function init(){
  /* reloj real */
  function tick(){var d=new Date(),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
    var pct=window.__readPct!=null&&MOTION?' · '+window.__readPct+'%':'';
    var el=document.getElementById('clock');if(el)el.textContent=hh+':'+mm+pct}
  tick();setInterval(tick,15000);

  if(!MOTION){wireAnchors(null);return}
  gsap.registerPlugin(ScrollTrigger);
  var lenis=null;
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
    lenis=new Lenis({lerp:.3});
    lenis.on('scroll',ScrollTrigger.update);
    gsap.ticker.add(function(t){lenis.raf(t*1000)});
  }
  gsap.ticker.lagSmoothing(0);
  /* re-medir triggers cuando terminan fuentes e imagenes (anti-desfase) */
  (function(){function rf(){if(window.ScrollTrigger)ScrollTrigger.refresh()}
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(rf);
    var pend=Array.prototype.filter.call(document.images,function(im){return !im.complete});
    var left=pend.length;
    pend.forEach(function(im){function done(){if(--left===0)rf()}
      im.addEventListener('load',done);im.addEventListener('error',done)});
  })();
  wireAnchors(lenis);

  document.querySelectorAll('[data-r1]').forEach(function(el){
    gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 88%',once:true}});
  });
  document.querySelectorAll('[data-r2]').forEach(function(g){
    var kids=g.querySelectorAll('.wr');var acc=0;
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:18},{opacity:1,y:0,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 86%',once:true}});
      acc+=[120,80,60][Math.min(i,2)];
    });
  });
  document.querySelectorAll('[data-rule]').forEach(function(el){
    var cs=getComputedStyle(el);
    if(cs.borderTopWidth==='0px')return;
    el.style.borderTopColor='transparent';el.style.position='relative';
    var l=document.createElement('i');
    l.style.cssText='position:absolute;left:0;right:0;top:-1px;height:1px;background:var(--line);transform-origin:left;display:block';
    el.appendChild(l);
    gsap.fromTo(l,{scaleX:0},{scaleX:1,duration:.8,ease:'expo.out',
      scrollTrigger:{trigger:el,start:'top 92%',once:true}});
  });
  document.querySelectorAll('[data-cards]').forEach(function(g){
    var kids=g.querySelectorAll(':scope > .wr');var acc=0;var steps=[90,70,55,45,40,40];
    kids.forEach(function(el,i){
      gsap.fromTo(el,{opacity:0,y:14,scale:.988},{opacity:1,y:0,scale:1,duration:.7,ease:'expo.out',delay:acc/1000,
        scrollTrigger:{trigger:g,start:'top 84%',once:true}});
      acc+=steps[Math.min(i,steps.length-1)];
    });
  });

  /* R5a tinta fantasma */
  document.querySelectorAll('.chapter').forEach(function(sec){
    var ghost=sec.querySelector('[data-ghost]');
    if(!ghost)return;
    ScrollTrigger.create({trigger:sec,start:'top 80%',end:'bottom 45%',scrub:.4,
      onUpdate:function(self){var p=self.progress;
        var bell=1-Math.abs(p-.5)*2;
        ghost.style.color='rgba(244,244,245,'+(Math.max(0,bell)*.10).toFixed(3)+')';
        ghost.style.transform='translateY('+((p-.5)*80)+'px)';
      }});
  });
  /* R5b espina + progreso global + reloj % + sky */
  var fill=document.getElementById('spinefill'),sky=document.getElementById('sky');
  var links=Array.prototype.slice.call(document.querySelectorAll('.rail a'));
  var targets=links.map(function(a){return document.querySelector(a.getAttribute('href'))});
  ScrollTrigger.create({start:0,end:'max',scrub:.4,
    onUpdate:function(self){var p=self.progress;
      if(fill)fill.style.transform='scaleY('+p+')';
      window.__readPct=Math.round(p*100);
      if(sky)sky.style.transform='translateY('+(-p*220)+'px)';
      var vhMid=window.innerHeight*.45;
      var best=-1,bd=1e9;
      targets.forEach(function(t,i){if(!t)return;
        var r=t.getBoundingClientRect();
        if(r.top<=vhMid&&r.bottom>=vhMid){best=i;bd=0;return}
        var d=Math.min(Math.abs(r.top-vhMid),Math.abs(r.bottom-vhMid));
        if(bd>0&&d<bd){bd=d;best=i}
      });
      links.forEach(function(a,i){
        a.classList.toggle('on',i===best);
        var t=targets[i];
        var d=t?Math.min(Math.abs(t.getBoundingClientRect().top-vhMid),Math.abs(t.getBoundingClientRect().bottom-vhMid)):1e9;
        var k=(i===best)?1:Math.max(0,1-d/(window.innerHeight*1.2));
        a.style.setProperty('--tick',(14+12*k)+'px');
      });
    }});
}
function wireAnchors(lenis){
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(!t)return;e.preventDefault();
      if(lenis)lenis.scrollTo(t);else t.scrollIntoView({behavior:'smooth'});
    });
  });
}
})();
</script>
</body>
</html>
